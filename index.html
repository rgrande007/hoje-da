                  <div style={{ height: 5, background: 'rgba(255,255,255,0.12)', borderRadius: 99, overflow: 'hidden' }}>
                    <div style={{ height: '100%', borderRadius: 99, background: 'rgba(255,255,255,0.5)', width: `${w}%` }} />
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Mensagem motivacional */}
      <div style={{ padding: '0 16px', marginBottom: 24, textAlign: 'center' }}>
        <div style={{ fontSize: 13, color: 'rgba(255,255,255,0.5)', lineHeight: 1.6 }}>
          {positivo
            ? `Você terminou o ciclo com saldo positivo. Que tal usar ${fmt(Math.abs(economizado))} como reserva no próximo?`
            : `Você gastou ${fmt(Math.abs(economizado))} além do planejado. No próximo ciclo, ajuste o valor para uma meta mais realista.`}
        </div>
      </div>

      {/* CTAs */}
      <div style={{ padding: '0 16px 40px', display: 'flex', flexDirection: 'column', gap: 10, marginTop: 'auto' }}>
        <button onClick={onNovoMes} style={{
          height: 60, borderRadius: 999, border: 'none', cursor: 'pointer',
          background: positivo ? 'linear-gradient(135deg, #34D399, #059669)' : 'linear-gradient(135deg, #60A5FA, #2563EB)',
          color: '#fff', fontSize: 17, fontWeight: 700, fontFamily: T.font,
          boxShadow: positivo ? '0 8px 24px rgba(52,211,153,0.4)' : '0 8px 24px rgba(96,165,250,0.4)',
          letterSpacing: 0.1,
        }}>
          Iniciar próximo ciclo
        </button>
        <button onClick={onHistorico} style={{
          height: 50, borderRadius: 999, border: '1px solid rgba(255,255,255,0.2)', cursor: 'pointer',
          background: 'transparent', color: 'rgba(255,255,255,0.7)', fontSize: 14, fontWeight: 600, fontFamily: T.font,
        }}>
          Ver histórico completo
        </button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// CalculationBreakdownSheet — Bottom sheet "Como chegamos aqui"
// ═══════════════════════════════════════════════════════════════
function CalculationBreakdownSheet({ dailyQuota, todaySpent, carryBeforeToday, availableNow, totalEntradas = 0, onClose }) {
  const [visible, setVisible] = React.useState(false);
  React.useEffect(() => { const t = setTimeout(() => setVisible(true), 10); return () => clearTimeout(t); }, []);
  const handleClose = () => { setVisible(false); setTimeout(onClose, 350); };

  const todayOverflow   = Math.max(0, todaySpent - dailyQuota);
  const usedPlanBuffer  = Math.min(carryBeforeToday, todayOverflow);
  const remainingBuffer = carryBeforeToday - usedPlanBuffer;
  const withinQuota     = todaySpent <= dailyQuota;
  const isNegative      = availableNow < 0;
  const hasCarry        = carryBeforeToday > 0;

  const resultPositive = !isNegative;
  const resultValue    = withinQuota ? dailyQuota - todaySpent : isNegative ? Math.abs(availableNow) : remainingBuffer;
  const resultTitle    = withinQuota ? 'Ainda dá hoje' : isNegative ? 'Saiu do plano' : 'Ainda sobra no plano';
  const resultSubtitle = withinQuota
    ? 'É o quanto você ainda pode gastar'
    : isNegative
      ? 'Você passou do valor disponível para este período'
      : 'É o que você ainda pode gastar';

  const IconCircle = ({ bg, border, emoji }) => (
    <div style={{
      width: 36, height: 36, borderRadius: '50%',
      background: bg, border: `1.5px solid ${border}`,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      flexShrink: 0, fontSize: 16,
    }}>{emoji}</div>
  );

  const CalcRow = ({ icon, title, subtitle, value, valueColor }) => (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 12,
      paddingTop: 14, paddingBottom: 14,
      borderBottom: '1px solid rgba(15,23,42,0.06)',
    }}>
      {icon}
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 14, fontWeight: 600, color: T.text }}>{title}</div>
        {subtitle && <div style={{ fontSize: 12, color: T.textSec, marginTop: 1 }}>{subtitle}</div>}
      </div>
      <div style={{ fontSize: 15, fontWeight: 700, color: valueColor || T.text, flexShrink: 0 }}>{value}</div>
    </div>
  );

  return (
    <div onClick={handleClose} style={{
      position: 'fixed', inset: 0, zIndex: 1000,
      background: visible ? 'rgba(0,0,0,0.35)' : 'rgba(0,0,0,0)',
      transition: 'background 0.25s',
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        position: 'fixed', bottom: 0, left: 0, right: 0,
        background: '#fff', borderRadius: '24px 24px 0 0',
        maxHeight: '90vh', overflowY: 'auto', padding: '0 20px 40px',
        transform: visible ? 'translateY(0)' : 'translateY(100%)',
        transition: 'transform 0.35s cubic-bezier(.2,.8,.3,1)',
        fontFamily: T.font,
      }}>

        {/* Handle */}
        <div style={{ display: 'flex', justifyContent: 'center', paddingTop: 12, paddingBottom: 8 }}>
          <div style={{ width: 36, height: 4, borderRadius: 99, background: 'rgba(15,23,42,0.12)' }} />
        </div>

        {/* Header */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
          <div style={{ fontSize: 18, fontWeight: 800, color: T.text }}>Como chegamos aqui</div>
          <button onClick={handleClose} aria-label="Fechar" style={{
            width: 32, height: 32, borderRadius: '50%',
            background: 'rgba(15,23,42,0.06)', border: 'none',
            cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontFamily: T.font, flexShrink: 0,
          }}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M1 1l12 12M13 1L1 13" stroke={T.text} strokeWidth="2" strokeLinecap="round"/>
            </svg>
          </button>
        </div>

        {/* RESULTADO — hero no topo, conclusão antes da prova */}
        <div style={{
          borderRadius: 16, padding: '16px',
          background: resultPositive ? T.greenLight : T.redLight,
          border: `1px solid ${resultPositive ? 'rgba(49,164,108,0.2)' : 'rgba(227,93,106,0.2)'}`,
          display: 'flex', alignItems: 'center', gap: 12,
          marginBottom: 14,
        }}>
          <div style={{
            width: 36, height: 36, borderRadius: '50%',
            background: resultPositive ? T.green : T.red,
            display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
          }}>
            {resultPositive
              ? <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2.5 8.5l4 4 7-8" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
              : <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3v6M8 11.5v1" stroke="#fff" strokeWidth="2.2" strokeLinecap="round"/></svg>
            }
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: resultPositive ? '#3D8A60' : '#9B4A55' }}>{resultTitle}</div>
            <div style={{ fontSize: 12, color: resultPositive ? '#3D8A60' : '#9B4A55', marginTop: 1, opacity: 0.85, lineHeight: '16px' }}>{resultSubtitle}</div>
          </div>
          <div style={{ fontSize: 17, fontWeight: 800, color: resultPositive ? T.green : T.red, flexShrink: 0 }}>{fmt(resultValue)}</div>
        </div>

        {/* EQUAÇÃO — orienta o usuário antes do detalhe */}
        {!withinQuota && hasCarry && (
          <div style={{
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
            padding: '10px 16px', marginBottom: 12,
            background: '#F8FAFC', borderRadius: 12,
            border: '1px solid rgba(15,23,42,0.06)',
          }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: T.green }}>+{fmt(carryBeforeToday)}</span>
            <span style={{ fontSize: 14, color: T.textSec, fontWeight: 600 }}>−</span>
            <span style={{ fontSize: 13, fontWeight: 700, color: T.red }}>{fmt(usedPlanBuffer)}</span>
            <span style={{ fontSize: 14, color: T.textSec, fontWeight: 600 }}>=</span>
            <span style={{ fontSize: 13, fontWeight: 800, color: resultPositive ? T.green : T.red }}>
              {isNegative ? `−${fmt(Math.abs(availableNow))}` : fmt(remainingBuffer)}
            </span>
          </div>
        )}

        {/* CONTEXTO — sobe para acima das linhas, só quando excedeu */}
        {!withinQuota && (
          <div style={{
            borderRadius: 12, padding: '10px 14px', marginBottom: 4,
            background: T.blueLight, border: '1px solid rgba(47,111,237,0.15)',
            display: 'flex', alignItems: 'flex-start', gap: 8,
          }}>
            <span style={{ fontSize: 12, color: T.blue, fontWeight: 800, flexShrink: 0, marginTop: 1 }}>i</span>
            <div style={{ fontSize: 12, color: '#3B5EA6', lineHeight: '17px' }}>
              Você gastou mais do que o valor de hoje, então usamos sua folga acumulada para manter o plano equilibrado.
            </div>
          </div>
        )}

        {/* LINHAS DE CÁLCULO — prova da conta */}
        <div style={{ marginBottom: 8 }}>

          {/* 1. Cota de hoje */}
          <CalcRow
            icon={<IconCircle bg={T.blueLight} border={T.blue} emoji="📅" />}
            title="Cota de hoje"
            subtitle={!withinQuota ? 'Cota diária' : undefined}
            value={fmt(dailyQuota)}
          />

          {/* 2. Gasto de hoje */}
          <CalcRow
            icon={<IconCircle bg={T.redLight} border={T.red} emoji="💸" />}
            title="Gasto de hoje"
            value={fmt(todaySpent)}
          />

          {/* 3. Quanto passou — só quando excedeu */}
          {!withinQuota && (
            <CalcRow
              icon={<IconCircle bg={T.redLight} border={T.red} emoji="⬆️" />}
              title="Quanto você passou hoje"
              value={fmt(todayOverflow)}
              valueColor={T.red}
            />
          )}

          {/* 4. Folga acumulada — só quando excedeu e há carry */}
          {!withinQuota && hasCarry && (
            <CalcRow
              icon={<IconCircle bg={T.greenLight} border={T.green} emoji="✨" />}
              title="Folga acumulada"
              subtitle={totalEntradas > 0 ? 'Dias anteriores + entradas' : 'Dos dias anteriores'}
              value={`+ ${fmt(carryBeforeToday)}`}
              valueColor={T.green}
            />
          )}

          {/* Conector — torna a causalidade explícita */}
          {!withinQuota && hasCarry && (
            <div style={{
              textAlign: 'center', fontSize: 11, color: T.textSec,
              paddingTop: 4, paddingBottom: 4, fontWeight: 500,
            }}>
              usamos parte dela:
            </div>
          )}

          {/* 5. Quanto foi usado da folga — só quando excedeu e há carry */}
          {!withinQuota && hasCarry && (
            <CalcRow
              icon={<IconCircle bg="#FFF3E0" border="#F97316" emoji="🔄" />}
              title="Quanto foi usado da folga"
              subtitle="Para cobrir o que passou"
              value={`− ${fmt(usedPlanBuffer)}`}
              valueColor={T.red}
            />
          )}

        </div>

      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// TELA 2 — Painel principal  (v4 — hierarquia reestruturada)
// ═══════════════════════════════════════════════════════════════
function TelaPainel({ state, flashId, flashType, onRegistrarGasto, onAdicionarExtra, onHistorico, onOpenMenu, onAnalise, onEditar, onExcluir, onConfig, onFechamento }) {
  const stats = React.useMemo(() => calcStats(state), [state]);
  const hoje = new Date();
  const dataHoje = hoje.toLocaleDateString('pt-BR', { weekday: 'short', day: 'numeric', month: 'long', year: 'numeric' });
  const dataHojeDisplay = (dataHoje.charAt(0).toUpperCase() + dataHoje.slice(1)).replace('.,', ',').replace(/\.(\s|$)/, '$1');
  const margemAteHoje = stats.disponivelHoje;
  const ratioMargem = stats.valorDiarioBase > 0 ? margemAteHoje / stats.valorDiarioBase : 0;
  const orcamentoUsadoPct = state.valorMensal > 0 ? (stats.totalGastos / (state.valorMensal + stats.totalEntradas)) * 100 : 0;
  const hojeKey = fmtDateKey(new Date().toISOString());
  const gastosHoje = state.transacoes.filter(t => t && t.tipo === 'gasto' && fmtDateKey(t.data) === hojeKey).reduce((s, t) => s + t.valor, 0);
  const isPositive = margemAteHoje >= 0;
  const [showBreakdown, setShowBreakdown] = React.useState(false);
  const accBufferStart = Math.max(0, margemAteHoje + gastosHoje - stats.valorDiarioBase);

  const cardBg    = T.card;
  const cardBorder = T.border;
  const cardColor  = isPositive ? T.green : T.red;
  const cardSub    = isPositive ? '#3D8A60' : '#9B4A55';
  const statusObj = getStatusDiario(stats, { gastosHoje, ratioMargem });
  const PILL_LABELS = {
    'Ciclo acima do planejado': 'Passou',
    'Saiu do plano': 'Passou',
    'Passou da cota hoje ⚡': 'Apertado',
    'Hoje está apertado 👀': 'Apertado',
    'Você está no plano ✅': 'No plano',
    'Você está com folga 🌿': 'Com folga',
  };
  const statusLabel = PILL_LABELS[statusObj.titulo] || 'No plano';
  const statusColor = { vermelho: T.red, amarelo: T.yellow, azul: T.blue, verde: T.green }[statusObj.nivel] || T.blue;

  const pct          = Math.min(orcamentoUsadoPct, 100);
  const restantePct  = Math.max(0, 100 - pct);
  const donutColor   = restantePct > 40 ? T.green : restantePct > 15 ? T.yellow : T.red;
  const flashColor   = flashType === 'gasto' ? T.red : flashType === 'extra' ? T.green : null;

  return (
    <div style={{ background: T.bg, minHeight: '100%', overflowY: 'auto', overflowX: 'hidden', padding: '24px 24px 40px' }}>

      {/* ── Header ───────────────────────────────────────────── */}
      <div style={{ paddingBottom: 20, borderBottom: '1px solid rgba(15,23,42,0.07)' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            {/* Botão de configuração — canto esquerdo antes do logo */}
            <button onClick={onConfig} aria-label="Editar configuração do ciclo" style={{
              width: 44, height: 44, borderRadius: 12,
              background: T.blueLight, border: 'none',
              cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
              flexShrink: 0,
            }} title="Editar configuração do ciclo">
              <IcoEdit c={T.blue} s={16} />
            </button>
            <img src="/icons/icon-512.png" width="28" height="28" alt="Hoje Dá" style={{ borderRadius: 7, flexShrink: 0 }} />
            <span style={{ fontSize: 22, fontWeight: 800, color: T.text, letterSpacing: -0.5 }}>Hoje Dá</span>
          </div>
          <button onClick={onOpenMenu} aria-label="Abrir menu" style={{
            width: 44, height: 44, borderRadius: 12, cursor: 'pointer',
            background: T.card, border: T.border,
            boxShadow: '0 2px 6px rgba(15,23,42,0.05)',
            display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
          }}>
            <IcoGear c="#64748B" s={18} />
          </button>
        </div>
        <div style={{ fontSize: 12, color: T.textTer, marginTop: 3, marginBottom: 2, letterSpacing: 0.2 }}>
          Clareza. Controle. Liberdade.
        </div>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: 4 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <IcoCalHdr />
            <span style={{ fontSize: 13, fontWeight: 500, color: T.textSec }}>{dataHojeDisplay}</span>
          </div>
          <span style={{ fontSize: 12, fontWeight: 700, color: T.textTer, background: T.bgAlt, borderRadius: 99, padding: '3px 10px' }}>
            Dia {stats.diaAtual} de {state.diasDoMes}
          </span>
        </div>
      </div>

      {/* ── Banner ciclo expirado ─────────────────────────────── */}
      {stats.diasRestantes <= 0 && (
        <button onClick={onFechamento} style={{
          width: '100%', margin: '16px 0 0', borderRadius: T.r16, padding: '14px 16px',
          background: 'linear-gradient(135deg, #163B75, #2F6FED)',
          border: 'none', cursor: 'pointer', fontFamily: T.font,
          display: 'flex', alignItems: 'center', gap: 12, textAlign: 'left',
          boxShadow: '0 8px 24px rgba(47,111,237,0.3)',
        }}>
          <span style={{ fontSize: 24, flexShrink: 0 }}>🏆</span>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 14, fontWeight: 800, color: '#fff' }}>Seu ciclo encerrou!</div>
            <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.7)', marginTop: 2 }}>Ver resumo e iniciar próximo ciclo →</div>
          </div>
        </button>
      )}

      {/* ── Card principal ───────────────────────────────────── */}
      {(() => {
        const base        = stats.valorDiarioBase;
        const avail       = margemAteHoje; // disponivelHoje = saldo vivo do ciclo
        const isNeg       = avail < 0;
        const noTx        = state.transacoes.length === 0;

        const totalCapacity  = base + accBufferStart;
        // Margem que sobra depois de descontar o excesso de hoje
        const todayOverflow       = Math.max(0, gastosHoje - base);
        const remainingPlanMargin = Math.max(0, accBufferStart - todayOverflow);
        const quotaZonePct = totalCapacity > 0 ? (base / totalCapacity) * 100 : 100;
        const buffZonePct  = 100 - quotaZonePct;
        const spendPct     = totalCapacity > 0 ? Math.min((gastosHoje / totalCapacity) * 100, 100) : 0;

        // heroColor = statusColor (alinha hero, barra e gauge no mesmo código de cores)
        const heroColor = statusColor;

        // Breakdown do buffer: separar poupança de dias anteriores vs entradas extras
        const gastosAnteriores   = stats.totalGastos - gastosHoje;
        const quotaAcumAnterior  = base * Math.max(0, stats.diaAtual - 1);
        const poupado            = Math.max(0, quotaAcumAnterior - gastosAnteriores);
        const extrasTotal        = stats.totalEntradas;

        return (
        <div style={{
          marginTop: 24, borderRadius: 30, padding: 24,
          background: T.card,
          boxShadow: flashColor
            ? `0 10px 32px rgba(15,23,42,0.09), 0 0 0 3px ${flashColor}55, 0 0 22px ${flashColor}30`
            : '0 10px 32px rgba(15,23,42,0.09)',
          border: T.border,
          transition: 'box-shadow 0.4s cubic-bezier(.2,.8,.3,1)',
        }}>

          {/* Status pill */}
          <div style={{ marginBottom: 14 }}>
            <span style={{
              display: 'inline-flex', alignItems: 'center', gap: 5,
              background: `${statusColor}1A`, border: `1px solid ${statusColor}38`,
              borderRadius: 999, paddingLeft: 9, paddingRight: 11, paddingTop: 4, paddingBottom: 4,
            }}>
              <div style={{ width: 6, height: 6, borderRadius: '50%', background: statusColor, flexShrink: 0 }} />
              <span style={{ fontSize: 11, fontWeight: 800, color: statusColor }}>{statusLabel}</span>
            </span>
          </div>

          {/* Hero: disponível hoje */}
          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: T.textTer, textTransform: 'uppercase', letterSpacing: 1.5, marginBottom: 2 }}>
              {isNeg ? 'saiu do plano em' : noTx ? 'sua cota de hoje' : 'disponível hoje'}
            </div>
            <div key={flashId} className={flashType ? 'num-pop' : undefined}
              style={{ fontSize: 48, fontWeight: 800, color: noTx ? '#0F172A' : heroColor, lineHeight: '54px', letterSpacing: -1.5, transition: 'color 0.3s' }}>
              {noTx ? fmt(base) : isNeg ? fmt(Math.abs(avail)) : fmt(avail)}
            </div>

            {/* Microcopy contextual */}
            <div style={{ fontSize: 13, fontWeight: 500, color: statusColor === T.blue ? T.textSec : statusColor, marginTop: 4 }}>
              {noTx ? '✏️ Registre seu primeiro gasto do dia' : statusObj.frase}
            </div>

          </div>

          {/* Barra de duas zonas proporcionais (cota → acumulado) */}
          {!isNeg ? (
            <div style={{ marginBottom: 14 }}>
              {/* Barra estilo bateria — fundo cinza (cota mais claro, acumulado mais escuro) + fill na cor do status */}
              <div style={{ position: 'relative', height: 14, borderRadius: 999, overflow: 'hidden', background: '#E2E8F0' }}>
                {buffZonePct > 2 && (
                  <div style={{ position: 'absolute', right: 0, top: 0, bottom: 0, width: `${buffZonePct}%`, background: '#CBD5E1' }} />
                )}
                {gastosHoje > 0 && (
                  <div style={{
                    position: 'absolute', left: 0, top: 0, bottom: 0,
                    width: `${spendPct}%`, background: heroColor, borderRadius: 999,
                    transition: 'width 0.5s cubic-bezier(.2,.8,.3,1), background 0.3s',
                  }} />
                )}
                {buffZonePct > 4 && (
                  <div style={{ position: 'absolute', left: `${quotaZonePct}%`, top: 0, bottom: 0, width: 2, background: 'rgba(255,255,255,0.85)', transform: 'translateX(-50%)', zIndex: 2 }} />
                )}
              </div>

              {/* Texto de apoio abaixo da barra */}
              <div style={{ fontSize: 11, color: T.textSec, marginTop: 7, lineHeight: 1.4 }}>
                {noTx
                  ? `Cota de hoje: ${fmt(base)}`
                  : accBufferStart > 1
                  ? (() => {
                      const quotaLeft = Math.max(0, base - gastosHoje);
                      const bufferLabel = extrasTotal > 1 && poupado > 1
                        ? 'poupado e entradas'
                        : extrasTotal > 1
                        ? 'de entradas extras'
                        : 'de dias anteriores';
                      if (quotaLeft > 0) {
                        return <>{fmt(quotaLeft)} <span style={{ opacity: 0.6 }}>da cota</span> · {fmt(accBufferStart)} <span style={{ opacity: 0.6 }}>{bufferLabel}</span></>;
                      }
                      return <>{fmt(accBufferStart)} <span style={{ opacity: 0.6 }}>{bufferLabel}</span></>;
                    })()
                  : gastosHoje > 0
                  ? <>{fmt(Math.max(0, base - gastosHoje))} <span style={{ opacity: 0.6 }}>restam da cota de hoje</span></>
                  : null
                }
              </div>
            </div>
          ) : (
            <div style={{ marginBottom: 14 }}>
              <div style={{ height: 14, borderRadius: 999, background: T.red, opacity: 0.75 }} />
              <div style={{ fontSize: 11, fontWeight: 600, color: T.red, marginTop: 6 }}>
                {stats.diasRestantes > 0 ? `${stats.diasRestantes} dias restantes para recuperar` : 'Ciclo encerrado acima do plano'}
              </div>
            </div>
          )}

          {/* Divisor */}
          <div style={{ height: 1, background: 'rgba(15,23,42,0.06)', marginBottom: 14 }} />

          <SpendingGauge ratioMargem={ratioMargem} flashColor={flashColor} />

          {!noTx && (
            <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: 10 }}>
              <button onClick={() => setShowBreakdown(true)} aria-label="Ver como o valor disponível foi calculado" style={{
                display: 'flex', alignItems: 'center', gap: 6,
                background: T.blueLight, border: `1.5px solid ${T.blue}33`,
                borderRadius: 99, padding: '8px 16px',
                cursor: 'pointer', fontSize: 12, fontWeight: 700,
                color: T.blue, fontFamily: T.font, minHeight: 44,
              }}>
                <span style={{ fontSize: 14 }}>🧮</span>
                Como chegamos aqui?
              </button>
            </div>
          )}
        </div>
        );
      })()}

      {/* ── Botões de ação ───────────────────────────────────── */}
      <div style={{ marginTop: 16, display: 'flex', gap: 12, alignItems: 'center' }}>
        {/* Gastei! — ação primária */}
        <button onClick={onRegistrarGasto} style={{
          flex: 1, height: 68, borderRadius: 999, border: 'none', cursor: 'pointer',
          background: T.blueDark,
          color: '#fff', fontSize: 18, fontWeight: 800, fontFamily: T.font,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          boxShadow: '0 8px 24px rgba(15,23,42,0.28)',
          letterSpacing: -0.3,
        }}>
          Gastei!
        </button>
        {/* Recebi — ação secundária */}
        <button onClick={onAdicionarExtra} style={{
          width: 120, height: 68, borderRadius: 999, cursor: 'pointer',
          background: T.greenLight,
          border: `2px solid ${T.green}`,
          color: T.green, fontSize: 14, fontWeight: 700, fontFamily: T.font,
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
          flexShrink: 0,
        }}>
          <IcoPlus c={T.green} s={16} />
          Recebi
        </button>
      </div>

      {/* ── Esta semana ──────────────────────────────────────── */}
      <WeeklyMiniChart transacoes={state.transacoes} valorDiarioBase={stats.valorDiarioBase} onAnalise={onAnalise} showLegend={false} />

      {/* ── Resumo do mês ────────────────────────────────────── */}
      <div style={{ marginTop: 12 }}>
        <div style={{
          background: '#FFFFFF', borderRadius: 24, padding: '20px',
          boxShadow: '0 4px 16px rgba(15,23,42,0.06)', border: '1px solid rgba(15,23,42,0.05)',
        }}>
          <div style={{ fontSize: 16, fontWeight: 800, color: T.text, marginBottom: 16 }}>Resumo do ciclo</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 20 }}>
            <MiniDonutChart pct={pct} color={donutColor} size={88} />
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ marginBottom: 10 }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: T.textTer, textTransform: 'uppercase', letterSpacing: 0.8 }}>Gasto até agora</div>
                <div style={{ fontSize: 19, fontWeight: 800, color: T.text, letterSpacing: -0.5, marginTop: 2 }}>{fmt(stats.totalGastos)}</div>
              </div>
              <div style={{ height: 1, background: 'rgba(15,23,42,0.06)', marginBottom: 10 }} />
              <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                <div>
                  <div style={{ fontSize: 10, fontWeight: 700, color: T.textTer, textTransform: 'uppercase', letterSpacing: 0.8 }}>Saldo restante</div>
                  <div style={{ fontSize: 14, fontWeight: 800, color: stats.saldoTotalRestante >= 0 ? T.green : T.red, letterSpacing: -0.3, marginTop: 2 }}>
                    {fmt(stats.saldoTotalRestante)}
                  </div>
                </div>
                <div style={{ textAlign: 'right' }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: T.textTer, textTransform: 'uppercase', letterSpacing: 0.8 }}>Dias restantes</div>
                  <div style={{ fontSize: 14, fontWeight: 800, color: T.text, letterSpacing: -0.3, marginTop: 2 }}>{stats.diasRestantes}</div>
                </div>
              </div>
            </div>
          </div>
          {stats.diaAtual >= 5 ? (
            <div style={{
              marginTop: 14, padding: '10px 14px', borderRadius: 14,
              background: stats.projecaoDiff >= 0 ? T.greenLight : T.redLight,
              border: `1px solid ${stats.projecaoDiff >= 0 ? 'rgba(49,164,108,0.2)' : 'rgba(227,93,106,0.2)'}`,
              display: 'flex', alignItems: 'center', gap: 8,
            }}>
              <span style={{ fontSize: 15 }}>{stats.projecaoDiff >= 0 ? '📈' : '📉'}</span>
              <span style={{ fontSize: 12, fontWeight: 600, color: stats.projecaoDiff >= 0 ? '#3D8A60' : '#9B4A55', lineHeight: 1.4 }}>
                Projeção: vai {stats.projecaoDiff >= 0 ? 'sobrar' : 'passar'}{' '}
                {fmt(Math.abs(stats.projecaoDiff))}{' '}
                {stats.projecaoDiff >= 0 ? 'no fim do ciclo' : 'acima do plano'}
              </span>
            </div>
          ) : (
            <div style={{
              marginTop: 14, padding: '10px 14px', borderRadius: 14,
              background: T.bgAlt, border: T.border,
            }}>
              <span style={{ fontSize: 12, fontWeight: 600, color: T.textSec }}>
                Projeção disponível após 5 dias de uso — dia {stats.diaAtual} de {state.diasDoMes}.
              </span>
            </div>
          )}
        </div>
      </div>

      {/* ── Estado vazio ─────────────────────────────────────── */}
      {state.transacoes.length === 0 && (
        <div style={{
          marginTop: 20, textAlign: 'center', padding: '28px 20px',
          background: T.card, borderRadius: 24,
          border: T.border, boxShadow: '0 4px 16px rgba(15,23,42,0.05)',
        }}>
          <div style={{ fontSize: 48, marginBottom: 10 }}>✍️</div>
          <div style={{ fontSize: 15, fontWeight: 700, color: T.text, marginBottom: 6 }}>Nenhum movimento ainda</div>
          <div style={{ fontSize: 13, color: T.textSec, lineHeight: 1.6 }}>
            Use os botões acima para registrar<br />seu primeiro gasto ou entrada.
          </div>
        </div>
      )}

      {/* ── Últimas movimentações ────────────────────────────── */}
      {state.transacoes.length > 0 && (
        <div style={{ marginTop: 20 }}>
          <div style={{ background: '#FFFFFF', borderRadius: 28, overflow: 'hidden', boxShadow: '0 8px 24px rgba(15,23,42,0.07)', border: '1px solid rgba(15,23,42,0.05)' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '24px 24px 16px' }}>
              <span style={{ fontSize: 21, fontWeight: 800, color: T.text }}>Últimos movimentos</span>
              <button onClick={onHistorico} style={{
                background: 'none', border: 'none', cursor: 'pointer',
                fontSize: 15, color: T.blue, fontWeight: 700, fontFamily: T.font,
              }}>
                Ver tudo
              </button>
            </div>
            <div style={{ paddingBottom: 8 }}>
              {[...state.transacoes].sort((a, b) => new Date(b.data) - new Date(a.data)).slice(0, 3).map((t, i) => {
                const isGasto = t.tipo === 'gasto';
                const cat = isGasto ? getCat(t.categoria) : (t.categoria ? getIncomeCat(t.categoria) : null);
                const isToday = fmtDateKey(t.data) === fmtDateKey(new Date().toISOString());
                const dateLabel = isToday ? `Hoje, ${fmtTime(t.data)}` : fmtDate(t.data);
                return (
                  <div key={t.id}>
                    {i > 0 && <div style={{ height: 1, background: 'rgba(60,60,67,0.06)', marginLeft: 80 }} />}
                    <button onClick={() => onEditar && onEditar(t)} style={{
                      display: 'flex', alignItems: 'center', gap: 14, padding: '14px 24px',
                      width: '100%', background: 'none', border: 'none', cursor: 'pointer', fontFamily: T.font,
                      textAlign: 'left',
                    }}>
                      <div style={{
                        width: 46, height: 46, borderRadius: 14, flexShrink: 0,
                        background: isGasto ? '#FFF0F1' : '#ECFDF5',
                        display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22,
                      }}>{cat ? cat.emoji : '💚'}</div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 15, fontWeight: 600, color: '#0F172A', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                          {t.descricao || (cat ? cat.label : 'Recebimento')}
                        </div>
                        <div style={{ fontSize: 13, color: '#94A3B8', marginTop: 2 }}>
                          {cat ? cat.label : 'Entrada'} · {dateLabel}
                        </div>
                      </div>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0 }}>
                        <div style={{ textAlign: 'right' }}>
                          <span style={{ fontSize: 15, fontWeight: 700, color: isGasto ? T.red : T.green }}>
                            {isGasto ? '−' : '+'}{fmt(t.valor)}
                          </span>
                          <div style={{ fontSize: 10, color: T.textTer, marginTop: 1 }}>editar</div>
                        </div>
                        {onExcluir && (
                          <button
                            onClick={e => { e.stopPropagation(); haptic('light'); onExcluir(t.id); }}
                            style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4, display: 'flex', alignItems: 'center', color: T.textTer, borderRadius: 8 }}
                          >
                            <IcoTrash c={T.textTer} s={15} />
                          </button>
                        )}
                      </div>
                    </button>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {showBreakdown && (
        <CalculationBreakdownSheet
          dailyQuota={stats.valorDiarioBase}
          todaySpent={gastosHoje}
          carryBeforeToday={accBufferStart}
          availableNow={margemAteHoje}
          totalEntradas={stats.totalEntradas}
          onClose={() => setShowBreakdown(false)}
        />
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// TELA 3/4 — Registrar gasto / Adicionar extra (+ Editar)
// ═══════════════════════════════════════════════════════════════
function TelaEntrada({ tipo, onSalvar, onVoltar, initialData = null, minDate = null }) {
  const tipoValido = (tipo === 'gasto' || tipo === 'extra') ? tipo : 'gasto';
  const isGasto = tipoValido === 'gasto';
  const isEdit  = !!initialData;
  const [valor, setValor]       = React.useState(initialData ? initialData.valor : 0);
  const [desc, setDesc]         = React.useState(initialData ? (initialData.descricao || '') : '');
  const [categoria, setCategoria] = React.useState(
    isGasto ? (initialData?.categoria || localStorage.getItem(SK_LAST_CAT) || 'alimentacao') : 'outros'
  );
  const [incomeCategoria, setIncomeCategoria] = React.useState(
    !isGasto ? (initialData?.categoria || localStorage.getItem(SK_LAST_INCOME_CAT) || 'salario') : 'salario'
  );
  const [saved, setSaved]       = React.useState(false);
  const [confirmSaida, setConfirmSaida] = React.useState(false);

  function handleBack() {
    if (!isEdit && valor > 0 && !confirmSaida) { setConfirmSaida(true); return; }
    onVoltar();
  }

  const todayStr = fmtDateKey(new Date().toISOString());
  const [dataLancamento, setDataLancamento] = React.useState(
    initialData?.data ? initialData.data.split('T')[0] : todayStr
  );
  const isRetroativo = dataLancamento !== todayStr;
  const cor  = isGasto ? T.red   : T.green;
  const bgCor = isGasto ? T.redLight : T.greenLight;

  function salvar() {
    if (!valor || valor <= 0) return;
    setConfirmSaida(false);
    haptic('success');
    if (isGasto) localStorage.setItem(SK_LAST_CAT, categoria);
    else localStorage.setItem(SK_LAST_INCOME_CAT, incomeCategoria);
    onSalvar({ valor, descricao: desc.trim(), categoria: isGasto ? categoria : incomeCategoria, dataLancamento });
    setSaved(true);
    setTimeout(() => { setSaved(false); onVoltar(tipoValido); }, 700);
  }

  const selectedCat = getCat(categoria);
  const selectedIncomeCat = getIncomeCat(incomeCategoria);

  return (
    <div style={{ background: T.bg, minHeight: '100%', display: 'flex', flexDirection: 'column' }} className="screen-enter">
      <ScreenHeader
        title={isEdit ? 'Editar lançamento' : (isGasto ? 'Quanto você gastou? 💸' : 'Quanto entrou? 💰')}
        onBack={handleBack}
      />
      {confirmSaida && (
        <div className="fade-in" style={{
          background: T.yellowLight, padding: '12px 16px',
          display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12,
          borderBottom: `1px solid ${T.yellow}44`,
        }}>
          <span style={{ fontSize: 13, fontWeight: 600, color: '#7A5A00', flex: 1 }}>
            Descartar as alterações?
          </span>
          <div style={{ display: 'flex', gap: 8, flexShrink: 0 }}>
            <button type="button" onClick={() => setConfirmSaida(false)} style={{
              height: 32, padding: '0 12px', borderRadius: 99, border: `1.5px solid ${T.blue}`,
              background: T.blueLight, color: T.blue, fontSize: 12, fontWeight: 700,
              fontFamily: T.font, cursor: 'pointer',
            }}>Continuar</button>
            <button type="button" onClick={() => onVoltar()} style={{
              height: 32, padding: '0 12px', borderRadius: 99, border: 'none',
              background: T.red, color: '#fff', fontSize: 12, fontWeight: 700,
              fontFamily: T.font, cursor: 'pointer',
            }}>Descartar</button>
          </div>
        </div>
      )}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column' }}>

        {/* Badge tipo */}
        <div style={{ textAlign: 'center', padding: '12px 0 4px' }}>
          <span style={{ background: bgCor, color: cor, fontSize: 13, fontWeight: 700, padding: '6px 18px', borderRadius: 100 }}>
            {isGasto ? `${selectedCat.emoji} ${selectedCat.label}` : `${selectedIncomeCat.emoji} ${selectedIncomeCat.label}`}
          </span>
        </div>

        {/* Teclado */}
        <MoneyInput value={valor} onChange={setValor} />

        {/* Categorias de renda — só entradas */}
        {!isGasto && (
          <div style={{ padding: '8px 16px 0' }}>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 7 }}>
              {INCOME_CATS.map(c => {
                const sel = incomeCategoria === c.id;
                return (
                  <button key={c.id} onClick={() => { setIncomeCategoria(c.id); haptic('light'); }} style={{
                    height: 56, borderRadius: T.r14, border: `1.5px solid ${sel ? c.cor : 'rgba(15,23,42,0.06)'}`,
                    background: sel ? `${c.cor}15` : T.card,
                    display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 3,
                    cursor: 'pointer', transition: 'all 0.15s',
                    boxShadow: sel ? `0 4px 12px ${c.cor}28` : 'none',
                  }}>
                    <span style={{ fontSize: 19 }}>{c.emoji}</span>
                    <span style={{ fontSize: 9, fontWeight: sel ? 700 : 500, color: sel ? c.cor : T.textTer, fontFamily: T.font, lineHeight: 1 }}>
                      {c.label}
                    </span>
                  </button>
                );
              })}
            </div>
          </div>
        )}

        {/* Categorias — só gastos */}
        {isGasto && (
          <div style={{ padding: '8px 16px 0' }}>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 7 }}>
              {CATS.map(c => {
                const sel = categoria === c.id;
                return (
                  <button key={c.id} onClick={() => { setCategoria(c.id); haptic('light'); }} style={{
                    height: 56, borderRadius: T.r14, border: `1.5px solid ${sel ? c.cor : 'rgba(15,23,42,0.06)'}`,
                    background: sel ? `${c.cor}15` : T.card,
                    display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 3,
                    cursor: 'pointer', transition: 'all 0.15s',
                    boxShadow: sel ? `0 4px 12px ${c.cor}28` : 'none',
                  }}>
                    <span style={{ fontSize: 19 }}>{c.emoji}</span>
                    <span style={{ fontSize: c.label.length > 7 ? 8 : 9, fontWeight: sel ? 700 : 500, color: sel ? c.cor : T.textTer, fontFamily: T.font, lineHeight: 1.2, textAlign: 'center', display: 'block', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', maxWidth: '100%' }}>
                      {c.label}
                    </span>
                  </button>
                );
              })}
            </div>
          </div>
        )}

        {/* Descrição */}
        <div style={{ padding: '10px 16px 0' }}>
          <div style={{ background: T.card, borderRadius: T.r14, padding: '0 16px', display: 'flex', alignItems: 'center', gap: 10, border: '1px solid rgba(15,23,42,0.06)' }}>
            <span style={{ fontSize: 16, flexShrink: 0 }}>{isGasto ? '📝' : '💬'}</span>
            <input
              value={desc}
              onChange={e => setDesc(e.target.value)}
              placeholder={isGasto ? 'Adicione uma descrição...' : 'De onde veio esse dinheiro?'}
              maxLength={40}
              style={{
                flex: 1, background: 'none', border: 'none', outline: 'none',
                fontSize: 14, color: T.text, fontFamily: T.font, fontWeight: 500, padding: '15px 0',
              }}
            />
          </div>
        </div>

        {/* Data do lançamento */}
        <div style={{ padding: '8px 16px 0' }}>
          <NativeDatePicker
            label="Data do lançamento"
            value={dataLancamento}
            onChange={setDataLancamento}
            minValue={minDate || undefined}
            maxValue={todayStr}
          />
          {isRetroativo && (
            <div style={{ textAlign: 'center', marginTop: 6 }}>
              <span style={{ fontSize: 11, color: T.blue, fontWeight: 700, background: T.blueLight, padding: '3px 8px', borderRadius: 8 }}>
                Retroativo
              </span>
            </div>
          )}
        </div>

        <div style={{ flex: 1 }} />

        {/* Botão confirmar */}
        <div style={{ padding: '16px' }}>
          <button onClick={salvar} disabled={saved || !valor || valor <= 0} style={{
            width: '100%', height: 60, borderRadius: 18, border: 'none',
            cursor: valor > 0 ? 'pointer' : 'default',
            background: saved ? T.green : ((!valor || valor <= 0) ? '#E2ECFF' : cor),
            color: (!valor || valor <= 0) ? '#93C5FD' : '#fff',
            fontSize: 17, fontWeight: 800, fontFamily: T.font,
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
            boxShadow: (valor > 0 && !saved) ? `0 8px 20px ${cor}44` : 'none',
            transition: 'all 0.22s',
            opacity: (!valor || valor <= 0) ? 0.6 : 1,
          }}>
            {saved ? <><IcoCheck /> Pronto, anotado ✅</> : (isEdit ? 'Salvar alteração' : 'Confirmar')}
          </button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// TELA 5 — Histórico
// ═══════════════════════════════════════════════════════════════
function TelaHistorico({ transacoes, ciclosAnteriores = [], onExcluir, onEditar, onVoltar }) {
  const [expandido, setExpandido] = React.useState(null);
  const [busca, setBusca] = React.useState('');
  const [confirmandoId, setConfirmandoId] = React.useState(null);
  const [filtroTipo, setFiltroTipo] = React.useState('todos');

  const query = busca.trim().toLowerCase();
  const transacoesFiltradas = (() => {
    let res = filtroTipo === 'gastos'   ? transacoes.filter(t => t.tipo === 'gasto')
            : filtroTipo === 'entradas' ? transacoes.filter(t => t.tipo === 'extra')
            : transacoes;
    if (!query) return res;
    return res.filter(t => {
      const cat = t.tipo === 'gasto' ? getCat(t.categoria) : (t.categoria ? getIncomeCat(t.categoria) : null);
      const desc = (t.descricao || '').toLowerCase();
      const catLabel = (cat?.label || '').toLowerCase();
      return desc.includes(query) || catLabel.includes(query);
    });
  })();

  const grupos = {};
  transacoesFiltradas.forEach(t => {
    const d = fmtDateKey(t.data);
    if (!grupos[d]) grupos[d] = [];
    grupos[d].push(t);
  });
  Object.values(grupos).forEach(items => items.sort((a, b) => b.data.localeCompare(a.data)));

  const totalGastos = transacoes.filter(t => t.tipo === 'gasto').reduce((s, t) => s + t.valor, 0);
  const totalEntradas = transacoes.filter(t => t.tipo === 'extra').reduce((s, t) => s + t.valor, 0);

  return (
    <div style={{ background: T.bg, minHeight: '100%', paddingBottom: 28 }} className="screen-enter">
      <ScreenHeader title="Movimentos" onBack={onVoltar} />

      {/* Totais */}
      {transacoes.length > 0 && (
        <div style={{ display: 'flex', gap: 10, padding: '14px 16px 0' }}>
          <div style={{ flex: 1, background: T.redLight, borderRadius: T.r14, padding: '12px 14px' }}>
            <div style={{ fontSize: 11, color: T.red, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 3 }}>Gasto total</div>
            <div style={{ fontSize: 17, fontWeight: 800, color: T.red }}>{fmt(totalGastos)}</div>
          </div>
          <div style={{ flex: 1, background: T.greenLight, borderRadius: T.r14, padding: '12px 14px' }}>
            <div style={{ fontSize: 11, color: T.green, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 3 }}>Entradas</div>
            <div style={{ fontSize: 17, fontWeight: 800, color: T.green }}>{fmt(totalEntradas)}</div>
          </div>
        </div>
      )}

      {/* Filtros por tipo */}
      {transacoes.length > 0 && (
        <div style={{ display: 'flex', gap: 8, padding: '10px 16px 0' }}>
          {[
            { id: 'todos',    label: 'Todos'    },
            { id: 'gastos',   label: 'Gastos'   },
            { id: 'entradas', label: 'Entradas' },
          ].map(f => (
            <button key={f.id} onClick={() => { setFiltroTipo(f.id); setExpandido(null); }} style={{
              height: 30, paddingLeft: 14, paddingRight: 14, borderRadius: 99, cursor: 'pointer',
              border: filtroTipo === f.id ? 'none' : `1px solid rgba(15,23,42,0.1)`,
              background: filtroTipo === f.id ? T.blue : T.bg,
              color: filtroTipo === f.id ? '#fff' : T.textSec,
              fontSize: 13, fontWeight: 700, fontFamily: T.font,
            }}>{f.label}</button>
          ))}
        </div>
      )}

      {/* Campo de busca */}
      {transacoes.length > 0 && (
        <div style={{ padding: '12px 16px 0' }}>
          <div style={{
            background: T.card, borderRadius: T.r14, padding: '0 14px',
            display: 'flex', alignItems: 'center', gap: 10,
            border: `1px solid ${busca ? T.blue : 'rgba(15,23,42,0.07)'}`,
            transition: 'border-color 0.15s',
          }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <circle cx="11" cy="11" r="7" stroke={busca ? T.blue : T.textTer} strokeWidth="2"/>
              <path d="M16.5 16.5l4 4" stroke={busca ? T.blue : T.textTer} strokeWidth="2" strokeLinecap="round"/>
            </svg>
            <input
              value={busca}
              onChange={e => { setBusca(e.target.value); setExpandido(null); }}
              placeholder="Buscar por descrição ou categoria..."
              style={{
                flex: 1, background: 'none', border: 'none', outline: 'none',
                fontSize: 14, color: T.text, fontFamily: T.font, fontWeight: 500, padding: '13px 0',
              }}
            />
            {busca && (
              <button onClick={() => setBusca('')} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 0, display: 'flex' }}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <circle cx="12" cy="12" r="9" fill={T.sep}/>
                  <path d="M9 9l6 6M15 9l-6 6" stroke={T.textTer} strokeWidth="2" strokeLinecap="round"/>
                </svg>
              </button>
            )}
          </div>
        </div>
      )}

      {transacoes.length === 0 && (
        <div style={{ textAlign: 'center', padding: '72px 24px 32px' }}>
          <div style={{ fontSize: 48, marginBottom: 16 }}>📭</div>
          <div style={{ fontSize: 17, fontWeight: 800, color: T.text, marginBottom: 6 }}>Nenhum movimento ainda</div>
          <div style={{ fontSize: 14, color: T.textSec, lineHeight: 1.5 }}>Use os botões na tela principal<br/>para registrar gastos ou entradas.</div>
        </div>
      )}

      {transacoes.length > 0 && transacoesFiltradas.length === 0 && (
        <div style={{ textAlign: 'center', padding: '48px 24px 32px' }}>
          <div style={{ fontSize: 36, marginBottom: 12 }}>🔍</div>
          <div style={{ fontSize: 15, fontWeight: 700, color: T.text, marginBottom: 4 }}>Nada encontrado</div>
          <div style={{ fontSize: 13, color: T.textSec }}>Tente outra descrição ou categoria.</div>
        </div>
      )}

      {Object.entries(grupos).sort(([a], [b]) => b.localeCompare(a)).map(([key, items]) => (
        <div key={key} style={{ padding: '14px 16px 0' }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: T.textTer, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 8 }}>{fmtDate(items[0].data)}</div>
          <Card>
            {items.map((t, i) => {
              const isGasto = t.tipo === 'gasto';
              const cat = isGasto ? getCat(t.categoria) : (t.categoria ? getIncomeCat(t.categoria) : null);
              const aberto = expandido === t.id;
              return (
                <div key={t.id}>
                  {i > 0 && <Divider left={66} />}
                  <div
                    onClick={() => { haptic('light'); setExpandido(p => p === t.id ? null : t.id); setConfirmandoId(null); }}
                    style={{
                      display: 'flex', alignItems: 'center', gap: 12, padding: '14px 16px',
                      cursor: 'pointer', background: aberto ? T.bg : 'transparent',
                      transition: 'background 0.15s',
                    }}
                  >
                    <div style={{
                      width: 44, height: 44, borderRadius: 13, flexShrink: 0,
                      background: isGasto ? T.redLight : T.greenLight,
                      display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20,
                    }}>{cat ? cat.emoji : '💚'}</div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 14, fontWeight: 600, color: T.text, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                        {t.descricao || (cat ? cat.label : 'Recebimento')}
                      </div>
                      <div style={{ fontSize: 12, color: T.textTer, marginTop: 2 }}>
                        {cat ? cat.label : 'Entrada'} · {fmtTime(t.data)}
                      </div>
                    </div>
                    <div style={{ textAlign: 'right' }}>
                      <div style={{ fontSize: 14, fontWeight: 700, color: isGasto ? T.red : T.green }}>
                        {isGasto ? '−' : '+'}{fmt(t.valor)}
                      </div>
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" style={{ marginTop: 4, transform: aberto ? 'rotate(90deg)' : 'none', transition: 'transform 0.2s ease' }}>
                        <path d="M9 6l6 6-6 6" stroke={aberto ? T.blue : T.textTer} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
                      </svg>
                    </div>
                  </div>
                  {aberto && (
                    <div className="fade-in" style={{ display: 'flex', gap: 8, padding: '0 16px 14px' }}>
                      {confirmandoId !== t.id ? (
                        <>
                          <button onClick={() => { haptic('light'); onEditar(t); }} style={{
                            flex: 1, height: 40, borderRadius: T.r12,
                            border: `1.5px solid rgba(47,111,237,0.2)`, background: T.blueLight, color: T.blue,
                            fontSize: 13, fontWeight: 700, fontFamily: T.font, cursor: 'pointer',
                            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 5,
                          }}>
                            <IcoEdit /> Editar
                          </button>
                          <button onClick={() => { haptic('light'); setConfirmandoId(t.id); }} style={{
                            flex: 1, height: 40, borderRadius: T.r12,
                            border: `1.5px solid rgba(216,36,50,0.2)`, background: T.redLight, color: T.red,
                            fontSize: 13, fontWeight: 700, fontFamily: T.font, cursor: 'pointer',
                            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 5,
                          }}>
                            <IcoTrash /> Excluir
                          </button>
                        </>
                      ) : (
                        <>
                          <button onClick={() => { haptic('light'); setConfirmandoId(null); }} style={{
                            flex: 1, height: 40, borderRadius: T.r12,
                            border: `1.5px solid rgba(15,23,42,0.08)`, background: T.bg, color: T.textSec,
                            fontSize: 13, fontWeight: 700, fontFamily: T.font, cursor: 'pointer',
                          }}>
                            Cancelar
                          </button>
                          <button onClick={() => { haptic('error'); onExcluir(t.id); setExpandido(null); setConfirmandoId(null); }} style={{
                            flex: 1, height: 40, borderRadius: T.r12,
                            border: 'none', background: T.red, color: '#fff',
                            fontSize: 13, fontWeight: 700, fontFamily: T.font, cursor: 'pointer',
                            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 5,
                            boxShadow: '0 4px 12px rgba(227,93,106,0.35)',
                          }}>
                            <IcoTrash c="#fff" /> Confirmar exclusão
                          </button>
                        </>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </Card>
        </div>
      ))}
      {/* Ciclos anteriores arquivados */}
      {ciclosAnteriores.length > 0 && (
        <div style={{ padding: '24px 16px 0' }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: T.textTer, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 10 }}>
            Ciclos anteriores
          </div>
          {[...ciclosAnteriores].reverse().map((c, i) => {
            const inicio = c.dataInicio ? new Date(c.dataInicio).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' }) : '?';
            const fim    = c.dataFim    ? new Date(c.dataFim).toLocaleDateString('pt-BR',    { day: '2-digit', month: 'short', year: 'numeric' }) : '?';
            const positivo = (c.saldoFinal || 0) >= 0;
            return (
              <div key={i} style={{
                background: T.card, borderRadius: T.r14, padding: '14px 16px', marginBottom: 10,
                border: T.border, display: 'flex', alignItems: 'center', justifyContent: 'space-between',
              }}>
                <div>
                  <div style={{ fontSize: 12, fontWeight: 700, color: T.text, marginBottom: 2 }}>
                    {inicio} – {fim}
                  </div>
                  <div style={{ fontSize: 11, color: T.textTer }}>
                    {(c.transacoes || []).filter(t => t.tipo === 'gasto').length} gastos · cota {fmt(c.valorMensal / Math.max(1, c.diasDoMes))}/dia
                  </div>
                </div>
                <div style={{ textAlign: 'right' }}>
                  <div style={{ fontSize: 13, fontWeight: 800, color: positivo ? T.green : T.red }}>
                    {positivo ? '+' : ''}{fmt(c.saldoFinal || 0)}
                  </div>
                  <div style={{ fontSize: 11, color: T.textTer }}>saldo final</div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      <div style={{ height: 28 }} />
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// TELA 6 — Análise (gráfico de evolução + calendário 7 dias)
// ═══════════════════════════════════════════════════════════════
function TelaAnalise({ state, onVoltar }) {
  const stats = React.useMemo(() => calcStats(state), [state]);
  const hoje = new Date();
  const inicioDate = new Date(state.dataInicio);

  // ── Gráfico de evolução: saldo acumulado por dia (O(n) otimizado) ────────────
  const diasDecorridos = stats.diaAtual;
  const inicioMidnight = new Date(inicioDate);
  inicioMidnight.setHours(0, 0, 0, 0);
  const gastosPorDia = new Array(diasDecorridos).fill(0);
  const extrasPorDia = new Array(diasDecorridos).fill(0);
  state.transacoes.forEach(t => {
    const td = new Date(t.data);
    td.setHours(0, 0, 0, 0);
    const idx = Math.floor((td - inicioMidnight) / 86400000);
    if (idx >= 0 && idx < diasDecorridos) {
      if (t.tipo === 'gasto') gastosPorDia[idx] += t.valor;
      else extrasPorDia[idx] += t.valor;
    }
  });
  const maxGasto = Math.max(...gastosPorDia, stats.valorDiarioBase * 1.5, 1);
  const fmtY = v => v >= 1000 ? `${(v / 1000).toFixed(1).replace('.0', '')}k` : `${Math.round(v)}`;

  // ── Próximos 7 dias: projeção com ritmo real ──────────────────
  // delta diário = base − média gasta → reflete velocidade atual de consumo
  const saldoAtual = stats.disponivelHoje;
  const deltaLiquido = stats.valorDiarioBase - stats.mediaGastoPorDia;
  const proximos7 = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(hoje);
    d.setDate(hoje.getDate() + i + 1);
    const diaProj = i + 1;
    const projecao = saldoAtual + deltaLiquido * diaProj;
    const diaSemana = d.toLocaleDateString('pt-BR', { weekday: 'short' }).replace('.', '');
    const diaNum = d.getDate();
    return { diaNum, diaSemana, projecao };
  });

  const projecaoDiff = stats.projecaoDiff;
  const projecaoPos = projecaoDiff >= 0;
  const highlightColor = projecaoPos ? T.blue : T.red;

  return (
    <div style={{ background: T.bg, minHeight: '100%', paddingBottom: 28 }} className="screen-enter">
      <ScreenHeader title="Análise do ciclo" onBack={onVoltar} />

      {/* ── Projeção do mês — insight principal ──────────────── */}
      <div style={{ margin: '14px 16px 0' }}>
        <div style={{
          background: projecaoPos
            ? 'linear-gradient(135deg, #163B75 0%, #2F6FED 100%)'
            : 'linear-gradient(135deg, #7B1928 0%, #E35D6A 100%)',
          borderRadius: 22, padding: '18px 20px',
          boxShadow: projecaoPos
            ? '0 8px 28px rgba(47,111,237,0.32)'
            : '0 8px 28px rgba(227,93,106,0.32)',
          display: 'flex', alignItems: 'center', gap: 16,
        }}>
          <div style={{
            width: 48, height: 48, borderRadius: 14, flexShrink: 0,
            background: 'rgba(255,255,255,0.15)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            <IcoTrend c="#fff" up={projecaoPos} />
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: 'rgba(255,255,255,0.7)', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 4 }}>
              Como o ciclo vai terminar
            </div>
            <div style={{ fontSize: 34, fontWeight: 800, color: '#fff', letterSpacing: -1, lineHeight: 1, marginBottom: 6 }}>
              {projecaoPos ? '+' : ''}{fmt(projecaoDiff)}
            </div>
            <div style={{ fontSize: 13, fontWeight: 500, color: 'rgba(255,255,255,0.8)', lineHeight: 1.4 }}>
              {projecaoPos
                ? 'No ritmo atual, você deve terminar no positivo.'
                : 'No ritmo atual, você passa do planejado. Ainda dá tempo de ajustar.'}
            </div>
            {stats.diaAtual < 5 && (
              <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.55)', marginTop: 5, fontStyle: 'italic' }}>
                * Projeção baseada em menos de 5 dias — pode variar.
              </div>
            )}
          </div>
        </div>
      </div>

      {/* ── Resumo rápido ─────────────────────────────────────── */}
      <div style={{ margin: '10px 16px 0', display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 8 }}>
        {[
          { label: 'Média/dia', value: fmt(stats.mediaGastoPorDia), color: T.red,  grad: 'linear-gradient(135deg,#FDECEF,#fff)' },
          { label: 'Meta/dia',  value: fmt(stats.valorDiarioBase),  color: T.blue, grad: 'linear-gradient(135deg,#EEF4FF,#fff)' },
          { label: 'Diferença', value: fmt(stats.valorDiarioBase - stats.mediaGastoPorDia),
            color: stats.mediaGastoPorDia <= stats.valorDiarioBase ? T.green : T.red,
            grad:  stats.mediaGastoPorDia <= stats.valorDiarioBase ? 'linear-gradient(135deg,#EAF7F0,#fff)' : 'linear-gradient(135deg,#FDECEF,#fff)' },
        ].map(c => (
          <div key={c.label} style={{ background: c.grad, borderRadius: T.r14, padding: '12px 12px', boxShadow: T.shadow, border: T.border }}>
            <div style={{ fontSize: 10, color: T.textSec, fontWeight: 600, marginBottom: 5, textTransform: 'uppercase', letterSpacing: 0.4 }}>{c.label}</div>
            <div style={{ fontSize: 14, fontWeight: 800, color: c.color }}>{c.value}</div>
          </div>
        ))}
      </div>

      {/* ── Gráfico: gasto por dia ────────────────────────────── */}
      <div style={{ margin: '12px 16px 0' }}>
        <Card>
          <div style={{ padding: '16px 16px 18px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 3 }}>
              <span style={{ fontSize: 15, fontWeight: 800, color: T.text }}>Gasto por dia</span>
              <span style={{ fontSize: 12, color: T.textTer, fontWeight: 600 }}>
                dia {diasDecorridos} de {state.diasDoMes}
              </span>
            </div>
            <div style={{ fontSize: 13, color: T.textSec, marginBottom: 14, fontWeight: 500 }}>
              Comparado à sua meta diária
            </div>

            {(() => {
              const totalDias = state.diasDoMes;
              const CHART_H = 110;
              const metaPct = Math.min(stats.valorDiarioBase / maxGasto, 1);
              const avgPct  = diasDecorridos > 0 ? Math.min(stats.mediaGastoPorDia / maxGasto, 1) : 0;
              const metaBottom = `${metaPct * 100}%`;
              const avgBottom  = `${avgPct  * 100}%`;
              const displayGastos = Array.from({ length: totalDias }, (_, i) => gastosPorDia[i] || 0);
              const xFontSize = totalDias > 20 ? 7 : 8;
              function barCor(g) {
                if (g > stats.valorDiarioBase) return T.red;
                if (g > stats.valorDiarioBase * 0.75) return T.yellow;
                return T.green;
              }
              return (
                <div>
                  <div style={{ display: 'flex', gap: 0, alignItems: 'stretch' }}>
                    {/* Y-axis labels */}
                    <div style={{ width: 36, flexShrink: 0, height: CHART_H, position: 'relative' }}>
                      <span style={{ position: 'absolute', top: 0, right: 4, fontSize: 9, color: T.textTer, fontWeight: 600, lineHeight: 1 }}>
                        {fmtY(maxGasto)}
                      </span>
                      <span style={{ position: 'absolute', top: '50%', right: 4, fontSize: 9, color: T.textTer, fontWeight: 600, transform: 'translateY(-50%)', lineHeight: 1 }}>
                        {fmtY(maxGasto / 2)}
                      </span>
                      <span style={{ position: 'absolute', bottom: 0, right: 4, fontSize: 9, color: T.textTer, fontWeight: 600, lineHeight: 1 }}>
                        0
                      </span>
                    </div>
                    {/* Chart area */}
                    <div style={{ flex: 1, height: CHART_H, position: 'relative' }}>
                      {/* Grid lines */}
                      {[0, 50, 100].map(p => (
                        <div key={p} style={{ position: 'absolute', left: 0, right: 0, bottom: `${p}%`, height: 1, background: 'rgba(15,23,42,0.05)' }} />
                      ))}
                      {/* Meta line */}
                      <div style={{ position: 'absolute', left: 0, right: 0, bottom: metaBottom, height: 1.5, background: T.blue, opacity: 0.55, zIndex: 2 }} />
                      <span style={{ position: 'absolute', left: 2, bottom: metaBottom, fontSize: 8, fontWeight: 700, color: T.blue, lineHeight: 1, transform: 'translateY(-2px)', zIndex: 3 }}>Meta</span>
                      {/* Média line */}
                      {diasDecorridos > 0 && (
                        <>
                          <div style={{ position: 'absolute', left: 0, right: 30, bottom: avgBottom, height: 0, borderTop: '1.5px dashed rgba(100,116,139,0.55)', zIndex: 2 }} />
                          <span style={{ position: 'absolute', right: 0, bottom: avgBottom, background: '#334155', color: '#fff', fontSize: 8, fontWeight: 700, borderRadius: 4, padding: '2px 4px', transform: 'translateY(50%)', zIndex: 3, whiteSpace: 'nowrap' }}>~{fmtY(stats.mediaGastoPorDia)}</span>
                        </>
                      )}
                      {/* Bars */}
                      <div style={{ display: 'flex', alignItems: 'flex-end', gap: 2, height: '100%', paddingBottom: 1 }}>
                        {displayGastos.map((g, i) => {
                          const isFuture = i >= diasDecorridos;
                          const isToday  = i === diasDecorridos - 1;
                          const cor = barCor(g);
                          const barH = isFuture ? 4 : Math.max((g / maxGasto) * (CHART_H - 2), g > 0 ? 5 : 2);
                          return (
                            <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'flex-end', height: '100%' }}>
                              <div style={{
                                borderRadius: isFuture ? 4 : '3px 3px 0 0',
                                height: barH,
                                background: isFuture ? 'transparent' : (g === 0 ? 'rgba(15,23,42,0.08)' : cor),
                                border: isFuture ? '1.5px dashed #CBD5E1' : 'none',
                                opacity: (isToday || isFuture) ? 1 : 0.65,
                                boxShadow: isToday && g > 0 ? `0 2px 8px ${cor}55` : 'none',
                                transition: 'height 0.3s ease',
                              }} />
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                  {/* X-axis */}
                  <div style={{ display: 'flex', marginLeft: 36, gap: 2, marginTop: 5 }}>
                    {displayGastos.map((_, i) => (
                      <div key={i} style={{ flex: 1, textAlign: 'center' }}>
                        <span style={{ fontSize: xFontSize, color: i === diasDecorridos - 1 ? T.blue : T.textTer, fontWeight: i === diasDecorridos - 1 ? 700 : 400 }}>
                          {i + 1}
                        </span>
                      </div>
                    ))}
                  </div>
                  {/* Legend */}
                  <div style={{ display: 'flex', gap: 10, marginTop: 10, flexWrap: 'wrap' }}>
                    {[
                      { bg: T.green, label: 'Abaixo da meta' },
                      { bg: T.yellow, label: 'Próximo da meta' },
                      { bg: T.red,   label: 'Acima da meta'  },
                    ].map(x => (
                      <div key={x.label} style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                        <div style={{ width: 8, height: 8, borderRadius: 2, background: x.bg }} />
                        <span style={{ fontSize: 9, color: T.textSec }}>{x.label}</span>
                      </div>
                    ))}
                    <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                      <div style={{ width: 14, height: 4, borderRadius: 2, border: '1.5px dashed #CBD5E1' }} />
                      <span style={{ fontSize: 9, color: T.textSec }}>Futuro</span>
                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                      <div style={{ width: 14, height: 0, borderTop: '1.5px dashed rgba(100,116,139,0.6)' }} />
                      <span style={{ fontSize: 9, color: T.textSec }}>Média atual</span>
                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                      <div style={{ width: 14, height: 1.5, background: T.blue, opacity: 0.55 }} />
                      <span style={{ fontSize: 9, color: T.textSec }}>Meta/dia</span>
                    </div>
                  </div>
                </div>
              );
            })()}
          </div>
        </Card>
      </div>

      {/* ── Gastos por categoria ─────────────────────────────── */}
      {(() => {
        const gastosPorCat = {};
        state.transacoes.filter(t => t.tipo === 'gasto').forEach(t => {
          gastosPorCat[t.categoria] = (gastosPorCat[t.categoria] || 0) + t.valor;
        });
        const catItems = CATS.map(c => ({ ...c, total: gastosPorCat[c.id] || 0 })).filter(c => c.total > 0).sort((a, b) => b.total - a.total);
        if (catItems.length === 0) return null;
        const maxCat = catItems[0].total;
        const totalCat = catItems.reduce((s, c) => s + c.total, 0);
        return (
          <div style={{ margin: '12px 16px 0' }}>
            <Card>
              <div style={{ padding: '16px 16px 12px' }}>
                <div style={{ fontSize: 15, fontWeight: 800, color: T.text, marginBottom: 3 }}>Gastos por categoria</div>
                <div style={{ fontSize: 13, color: T.textSec, marginBottom: 14, fontWeight: 500 }}>Distribuição dos seus gastos no ciclo</div>
                {catItems.map((c, i) => {
                  const pct = totalCat > 0 ? Math.round((c.total / totalCat) * 100) : 0;
                  const barPct = maxCat > 0 ? (c.total / maxCat) * 100 : 0;
                  return (
                    <div key={c.id}>
                      {i > 0 && <Divider left={0} />}
                      <div style={{ padding: '10px 0', display: 'flex', alignItems: 'center', gap: 12 }}>
                        <div style={{ width: 36, height: 36, borderRadius: 10, flexShrink: 0, background: `${c.cor}20`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18 }}>{c.emoji}</div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                            <span style={{ fontSize: 13, fontWeight: 600, color: T.text }}>{c.label}</span>
                            <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                              <span style={{ fontSize: 10, fontWeight: 600, color: T.textTer }}>{pct}%</span>
                              <span style={{ fontSize: 13, fontWeight: 800, color: T.text }}>{fmt(c.total)}</span>
                            </div>
                          </div>
                          <div style={{ height: 5, background: T.bg, borderRadius: 100, overflow: 'hidden' }}>
                            <div style={{ height: '100%', borderRadius: 100, background: c.cor, width: `${barPct}%`, transition: 'width 0.5s ease' }} />
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </Card>
          </div>
        );
      })()}

      {/* ── Calendário próximos 7 dias ────────────────────────── */}
      <div style={{ margin: '12px 16px 0' }}>
        <Card>
          <div style={{ padding: '16px 16px 8px' }}>
            <div style={{ fontSize: 15, fontWeight: 800, color: T.text, marginBottom: 3 }}>Próximos 7 dias</div>
            <div style={{ fontSize: 13, color: T.textSec, marginBottom: 16, fontWeight: 500 }}>
              Projeção se manter o ritmo atual
            </div>
            {proximos7.map((d, i) => {
              const { cor: dCor, bg: dBg } = corSaldo(d.projecao, stats.valorDiarioBase);
              return (
                <div key={i}>
                  {i > 0 && <Divider left={0} />}
                  <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '11px 0' }}>
                    <div style={{
                      width: 44, height: 44, borderRadius: 12, flexShrink: 0,
                      background: dBg,

// ─── Diálogo ajustar orçamento ────────────────────────────────────────────────
function DialogAjustarOrcamento({ valorAtual, state, onConfirmar, onCancelar }) {
  const [novoValor, setNovoValor] = React.useState(valorAtual);
  const [inputText, setInputText] = React.useState(
    valorAtual > 0 ? valorAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : ''
  );
  const [isFocused, setIsFocused] = React.useState(false);
  const inputRef = React.useRef(null);
  const stats = React.useMemo(() => calcStats(state), [state]);

  function handleFocus() {
    setIsFocused(true);
    setInputText(novoValor > 0 ? (novoValor % 1 === 0 ? String(novoValor) : novoValor.toFixed(2).replace('.', ',')) : '');
  }
  function handleBlur() {
    setIsFocused(false);
    const raw = (inputRef.current?.value || '').replace(/\./g, '').replace(',', '.');
    setNovoValor(parseFloat(raw) || 0);
  }
  function handleChange(e) {
    const text = e.target.value.replace(/[^0-9,.]/g, '');
    setInputText(text);
    const raw = text.replace(/\./g, '').replace(',', '.');
    const v = parseFloat(raw);
    if (!isNaN(v) && v >= 0) setNovoValor(v);
  }

  const displayValue = isFocused
    ? inputText
    : (novoValor > 0 ? novoValor.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '');

  const podeConfirmar = novoValor > 0;

  return (
    <div style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)',
      display: 'flex', alignItems: 'flex-end', justifyContent: 'center',
      zIndex: 100,
    }}>
      <div className="pop-in" style={{
        background: T.card, borderRadius: '20px 20px 0 0',
        padding: '6px 20px 32px', width: '100%',
      }}>
        <div style={{ width: 36, height: 4, borderRadius: 100, background: T.sep, margin: '12px auto 20px' }} />
        <div style={{ fontSize: 18, fontWeight: 800, color: T.text, marginBottom: 6 }}>Ajustar orçamento</div>
        <div style={{ fontSize: 14, color: T.textSec, lineHeight: 1.5, marginBottom: 18 }}>
          O novo valor substituirá o orçamento planejado. Suas movimentações serão mantidas.
        </div>
        <div
          onClick={() => inputRef.current?.focus()}
          style={{
            border: `1.5px solid ${isFocused ? T.blue : '#E2E8F0'}`,
            borderRadius: 14, padding: '10px 16px',
            display: 'flex', alignItems: 'center',
            background: isFocused ? '#F0F6FF' : '#FAFAFA',
            transition: 'border-color 0.15s, background 0.15s',
            cursor: 'text', marginBottom: 20,
          }}
        >
          <span style={{ fontSize: 18, fontWeight: 600, color: '#334155', marginRight: 8, flexShrink: 0 }}>R$</span>
          <input
            ref={inputRef}
            type="text"
            inputMode="decimal"
            value={displayValue}
            onChange={handleChange}
            onFocus={handleFocus}
            onBlur={handleBlur}
            placeholder="0,00"
            style={{
              border: 'none', outline: 'none', flex: 1, minWidth: 0,
              fontSize: 34, fontWeight: 700,
              color: novoValor > 0 ? '#0F172A' : '#CBD5E1',
              fontFamily: T.font, background: 'transparent', letterSpacing: -1,
            }}
          />
        </div>
        {/* Preview de impacto */}
        {podeConfirmar && (() => {
          const novaBase = stats.diasRestantes > 0 ? novoValor / state.diasDoMes : 0;
          const baseAtual = stats.valorDiarioBase;
          const diff = novaBase - baseAtual;
          const diffPos = diff >= 0;
          return (
            <div style={{
              background: T.bgAlt, borderRadius: T.r12, padding: '12px 14px', marginBottom: 14,
              display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            }}>
              <div>
                <div style={{ fontSize: 11, color: T.textSec, fontWeight: 600, marginBottom: 3 }}>Base/dia atual</div>
                <div style={{ fontSize: 15, fontWeight: 800, color: T.text }}>{fmt(baseAtual)}</div>
              </div>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M9 6l6 6-6 6" stroke={T.textTer} strokeWidth="2" strokeLinecap="round"/>
              </svg>
              <div style={{ textAlign: 'right' }}>
                <div style={{ fontSize: 11, color: T.textSec, fontWeight: 600, marginBottom: 3 }}>Nova base/dia</div>
                <div style={{ fontSize: 15, fontWeight: 800, color: diffPos ? T.green : T.red }}>{fmt(novaBase)}</div>
              </div>
              <div style={{
                background: diffPos ? T.greenLight : T.redLight,
                color: diffPos ? T.green : T.red,
                fontSize: 12, fontWeight: 800, borderRadius: 8, padding: '4px 8px',
              }}>
                {diffPos ? '+' : ''}{fmt(diff)}
              </div>
            </div>
          );
        })()}

        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          <button
            onClick={() => { if (podeConfirmar) { haptic('success'); onConfirmar(novoValor); } }}
            style={{
              width: '100%', height: 54, borderRadius: T.r16, border: 'none',
              background: podeConfirmar ? T.blue : '#E2ECFF',
              color: podeConfirmar ? '#fff' : '#93C5FD',
              fontSize: 16, fontWeight: 800, fontFamily: T.font,
              cursor: podeConfirmar ? 'pointer' : 'default',
              boxShadow: podeConfirmar ? '0 8px 20px rgba(47,111,237,0.28)' : 'none',
            }}
          >
            Confirmar novo valor
          </button>
          <button onClick={onCancelar} style={{
            width: '100%', height: 44, borderRadius: T.r14,
            border: 'none', background: 'none', cursor: 'pointer',
            color: T.textSec, fontSize: 14, fontWeight: 600, fontFamily: T.font,

        </div>
      </div>
    </div>
  );
