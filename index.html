const SK = 'orcamento_diario_v6';
const SK_LEGACY = 'orcamento_diario_v5';
const loadState = () => {
  try {
    const raw = localStorage.getItem(SK) ?? localStorage.getItem(SK_LEGACY);
    if (!raw) return null;
    const parsed = JSON.parse(raw) || null;
    if (parsed && !localStorage.getItem(SK)) {
      localStorage.setItem(SK, raw);
      localStorage.removeItem(SK_LEGACY);
    }
    if (parsed) {
      if (Array.isArray(parsed.transacoes)) {
        parsed.transacoes = parsed.transacoes.filter(t => {
          if (t == null || !t.tipo) return false;
          const v = Number(t.valor);
          if (!isFinite(v) || v <= 0) return false;
          t.valor = v;
          if (!t.data || isNaN(new Date(t.data).getTime())) return false;
          return true;
        });
      } else {
        parsed.transacoes = [];
      }
      parsed.valorMensal = Math.max(0, Number(parsed.valorMensal) || 0);
      parsed.diasDoMes   = Math.max(1, Math.round(Number(parsed.diasDoMes) || 1));
    }
    return parsed;
  } catch { return null; }
};

// ─── Háptico + Sonoro ─────────────────────────────────────────────────────────
let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx || _audioCtx.state === 'closed') {
    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return _audioCtx;
}

function haptic(type = 'light') {
  if (navigator.vibrate) {
    const map = { light: [8], medium: [25], success: [8, 40, 15], error: [35, 25, 35] };
    navigator.vibrate(map[type] || [8]);
  }
  try {
    const ctx = getAudioCtx();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    const now = ctx.currentTime;
    if (type === 'success') { o.frequency.value = 900; g.gain.setValueAtTime(0.07, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.15); }
    else if (type === 'error') { o.frequency.value = 200; g.gain.setValueAtTime(0.07, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.2); }
    else { o.frequency.value = 660; g.gain.setValueAtTime(0.04, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.08); }
    o.start(); o.stop(now + 0.25);
  } catch {}
}

// ─── Lógica central ───────────────────────────────────────────────────────────
function calcStats(state) {
  const hoje = new Date();
  const hojeDate  = new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate());
  const inicioRaw = new Date(state.dataInicio);
  const inicioDate = isNaN(inicioRaw.getTime())
    ? hojeDate
    : new Date(inicioRaw.getFullYear(), inicioRaw.getMonth(), inicioRaw.getDate());
  const safeDias = Math.max(1, state.diasDoMes || 1);
  const diaAtual = Math.max(1, Math.min(
    Math.floor((hojeDate - inicioDate) / 86400000) + 1,
    safeDias
  ));
  const diasRestantes    = safeDias - diaAtual;
  const valorDiarioBase  = state.valorMensal / safeDias;
  // Filtrar transações futuras — não entram nos totais
  const hoje_ts  = hojeDate.getTime();
  const inicio_ts = inicioDate.getTime();
  const txValidas = (state.transacoes || []).filter(t => {
    if (!t || !t.data) return false;
    const d = new Date(t.data);
    const d0 = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
    return !isNaN(d.getTime()) && d0 <= hoje_ts && d0 >= inicio_ts;
  });
  const totalGastos      = txValidas.filter(t => t.tipo === 'gasto').reduce((s, t) => s + (Number(t.valor) || 0), 0);
  const totalEntradas      = txValidas.filter(t => t.tipo === 'extra').reduce((s, t) => s + (Number(t.valor) || 0), 0);
  const saldoTotalRestante = state.valorMensal + totalEntradas - totalGastos;
  const disponivelHoje   = valorDiarioBase * diaAtual + totalEntradas - totalGastos;

  const mediaGastoPorDia = diaAtual > 0 ? totalGastos / diaAtual : 0;
  const projecaoFinal    = mediaGastoPorDia * state.diasDoMes;
  const projecaoDiff     = (state.valorMensal + totalEntradas) - projecaoFinal;

  let metaRecuperacaoDiaria = null;
  if (disponivelHoje < 0 && diasRestantes > 0) {
    const deficitPlano = Math.abs(disponivelHoje);
    metaRecuperacaoDiaria = valorDiarioBase - (deficitPlano / diasRestantes);
  }

  const r2 = v => Math.round(v * 100) / 100;

  return {
    diaAtual, diasRestantes,
    valorDiarioBase:       r2(valorDiarioBase),
    totalGastos:           r2(totalGastos),
    totalEntradas:         r2(totalEntradas),
    saldoTotalRestante:    r2(saldoTotalRestante),
    disponivelHoje:        r2(disponivelHoje),
    projecaoDiff:          r2(projecaoDiff),
    mediaGastoPorDia:      r2(mediaGastoPorDia),
    metaRecuperacaoDiaria: metaRecuperacaoDiaria != null ? r2(metaRecuperacaoDiaria) : null,
  };
}


function corSaldo(v, base) {
  if (v < 0) return { cor: T.red, bg: T.redLight };
  if (v < base * 0.25) return { cor: T.yellow, bg: T.yellowLight };
  return { cor: T.green, bg: T.greenLight };
}

function getStatusDiario(stats, { gastosHoje = 0, ratioMargem = 0 } = {}) {
  const base = (isFinite(stats.valorDiarioBase) && stats.valorDiarioBase > 0) ? stats.valorDiarioBase : 1;
  const margem = stats.disponivelHoje;
  const cotaDiaExcedida = gastosHoje > base;
  const excesoHoje = Math.max(0, gastosHoje - base);

  // Estado 1 — ciclo no negativo (déficit acumulado)
  if (margem < 0) {
    if (stats.diasRestantes <= 0) {
      return {
        titulo: 'Ciclo acima do planejado',
        frase: 'Esse ciclo terminou acima do planejado. Ajuste no próximo.',
        nivel: 'vermelho',
      };
    }
    if (stats.metaRecuperacaoDiaria != null && stats.metaRecuperacaoDiaria > 0) {
      return {
        titulo: 'Saiu do plano',
        frase: `Gaste até ${fmt(stats.metaRecuperacaoDiaria)}/dia nos próximos ${stats.diasRestantes} ${stats.diasRestantes === 1 ? 'dia' : 'dias'} e você volta ao trilho — é possível.`,
        nivel: 'vermelho',
      };
    }
    return {
      titulo: 'Saiu do plano',
      frase: 'O ritmo atual torna a recuperação difícil. Registre uma entrada extra para ajudar a reequilibrar.',
      nivel: 'vermelho',
    };
  }

  // Estado 2 — ciclo ok, mas cota do dia ultrapassada
  if (cotaDiaExcedida) {
    return {
      titulo: 'Passou da cota hoje ⚡',
      frase: `Você passou ${fmt(excesoHoje)} acima da cota (${fmt(base)}), mas tem ${fmt(margem)} de margem acumulada — o ciclo ainda está ok.`,
      nivel: 'amarelo',
    };
  }

  // Estado 3 — ciclo ok, dentro da cota do dia
  if (ratioMargem < 0.25) {
    return {
      titulo: 'Hoje está apertado 👀',
      frase: 'Ainda tem margem, mas é melhor gastar pouco para não pressionar os próximos dias.',
      nivel: 'amarelo',
    };
  }

  if (ratioMargem < 1.5) {
    return {
      titulo: 'Você está no plano ✅',
      frase: margem > 0 ? `Você tem ${fmt(margem)} disponíveis. Continue nesse ritmo.` : 'Continue nesse ritmo.',
      nivel: 'azul',
    };
  }

  return {
    titulo: 'Você está com folga 🌿',
    frase: margem > 0 ? `Você tem ${fmt(margem)} disponíveis e tá com folga no ciclo. Ótimo ritmo!` : 'Você está com folga no ciclo. Bom trabalho.',
    nivel: 'verde',
  };
}

// ─── Teclado numérico reutilizável ────────────────────────────────────────────
function MoneyInput({ value, onChange, wrapperStyle = {}, valueStyle = {} }) {
  const [raw, setRaw] = React.useState(value ? String(Math.round(value * 100)) : '');

  const onChangeRef = React.useRef(onChange);
  React.useEffect(() => { onChangeRef.current = onChange; });

  React.useEffect(() => {
    onChangeRef.current(parseInt(raw || '0', 10) / 100);
  }, [raw]);

  function pressKey(k) {
    if (k === '⌫') { haptic('light'); setRaw(r => r.slice(0, -1)); return; }
    if (raw.length >= 7) return;
    haptic('light');
    setRaw(r => r + k);
  }

  const cents = parseInt(raw || '0', 10);
  const display = (cents / 100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  const pad = ['1','2','3','4','5','6','7','8','9','','0','⌫'];

  return (
    <div>
      {/* Valor display */}
      <div style={{ textAlign: 'center', padding: '18px 20px 14px', ...wrapperStyle }}>
        <div style={{
          fontSize: cents > 0 ? 46 : 40, fontWeight: 700,
          color: cents > 0 ? T.text : T.textTer,
          letterSpacing: -2, lineHeight: 1,
          transition: 'font-size 0.15s, color 0.2s',
          ...valueStyle,
        }}>{cents > 0 ? display : 'R$ 0,00'}</div>
      </div>
      {/* Pad */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 8, padding: '0 16px' }}>
        {pad.map((k, i) => (
          <button key={i} onClick={() => k && pressKey(k)} style={{
            height: 56, borderRadius: T.r14, border: 'none',
            background: k === '⌫' ? '#F1F5F9' : (k === '' ? 'transparent' : T.card),
            color: T.text, fontSize: k === '⌫' ? 20 : 23,
            fontWeight: k === '⌫' ? 500 : 600, fontFamily: T.font,
            cursor: k ? 'pointer' : 'default',
            boxShadow: (k && k !== '⌫') ? '0 2px 6px rgba(15,23,42,0.06)' : 'none',
            transition: 'background 0.1s',
          }}>{k}</button>
        ))}
      </div>
    </div>
  );
}

// ─── DateSpinner — seletor de data com segmentos dia / mês / ano ─────────────
function DateSpinner({ label, value, onChange, minValue, maxValue }) {
  const d = new Date(value + 'T12:00:00');
  const day   = d.getDate();
  const month = d.getMonth();
  const year  = d.getFullYear();
  const MO = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const [blocked, setBlocked] = React.useState(false);

  function daysIn(m, y) { return new Date(y, m + 1, 0).getDate(); }
  function apply(nd, nm, ny) {
    const safe = Math.min(nd, daysIn(nm, ny));
    const str  = `${ny}-${String(nm+1).padStart(2,'0')}-${String(safe).padStart(2,'0')}`;
    if (minValue && str < minValue) {
      haptic('error');
      setBlocked(true);
      setTimeout(() => setBlocked(false), 420);
      return;
    }
    if (maxValue && str > maxValue) {
      haptic('error');
      setBlocked(true);
      setTimeout(() => setBlocked(false), 420);
      return;
    }
    haptic('light');
    onChange(str);
  }

  const ChevUp   = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.8" strokeLinecap="round"><path d="M18 15l-6-6-6 6"/></svg>;
  const ChevDown = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.8" strokeLinecap="round"><path d="M6 9l6 6 6-6"/></svg>;

  const btnSt = { width: 44, height: 44, borderRadius: 11, border: 'none', background: T.blueLight, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', color: T.blue };

  function Seg({ title, onUp, onDown, wide }) {
    return (
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, flex: wide ? 1.4 : 1 }}>
        <button onClick={onUp}   style={btnSt}><ChevUp /></button>
        <div style={{ fontSize: 15, fontWeight: 800, color: T.text, textAlign: 'center', minWidth: wide ? 48 : 32 }}>{title}</div>
        <button onClick={onDown} style={btnSt}><ChevDown /></button>
      </div>
    );
  }

  const maxD = daysIn(month, year);

  return (
    <div>
      <div style={{ fontSize: 11, fontWeight: 700, color: T.textSec, marginBottom: 8, textTransform: 'uppercase', letterSpacing: 0.5 }}>{label}</div>
      <div className={blocked ? 'shake' : ''} style={{ background: blocked ? '#FFF5F5' : '#F8FAFC', borderRadius: 16, border: `1.5px solid ${blocked ? T.red+'66' : '#E2E8F0'}`, padding: '12px 16px', transition: 'background 0.2s, border-color 0.2s' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <Seg title={String(day).padStart(2,'0')}
            onUp={()   => apply(day >= maxD ? 1 : day + 1, month, year)}
            onDown={()  => apply(day <= 1   ? maxD : day - 1, month, year)} />
          <div style={{ width: 1, height: 52, background: '#E2E8F0', flexShrink: 0 }} />
          <Seg title={MO[month]} wide
            onUp={()   => { const nm=(month+1)%12; apply(day, nm, month===11?year+1:year); }}
            onDown={()  => { const nm=(month+11)%12; apply(day, nm, month===0?year-1:year); }} />
          <div style={{ width: 1, height: 52, background: '#E2E8F0', flexShrink: 0 }} />
          <Seg title={String(year)}
            onUp={()   => apply(day, month, year + 1)}
            onDown={()  => apply(day, month, year - 1)} />
        </div>
      </div>
    </div>
  );
}

// ─── NativeDatePicker — seletor de data com input nativo ─────────────────────
function NativeDatePicker({ label, value, onChange, minValue, maxValue }) {
  const inputRef = React.useRef(null);
  const [isFocused, setIsFocused] = React.useState(false);

  function openPicker() {
    if (!inputRef.current) return;
    try {
      if (typeof inputRef.current.showPicker === 'function') {
        inputRef.current.showPicker();
      } else {
        inputRef.current.click();
      }
    } catch { inputRef.current.focus(); }
  }

  const d = value ? new Date(value + 'T12:00:00') : null;
  const monthShort = d ? d.toLocaleDateString('pt-BR', { month: 'short' }).replace('.', '').toUpperCase() : '---';
  const dayNum = d ? String(d.getDate()).padStart(2, '0') : '--';
  const weekday = d
    ? (() => { const w = d.toLocaleDateString('pt-BR', { weekday: 'long' }); return w.charAt(0).toUpperCase() + w.slice(1); })()
    : 'Selecione uma data';
  const fullDate = d
    ? d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' })
    : 'Toque para selecionar';

  return (
    <div>
      <div style={{ fontSize: 11, fontWeight: 700, color: T.textSec, marginBottom: 8, textTransform: 'uppercase', letterSpacing: 0.5 }}>{label}</div>
      <div onClick={openPicker} style={{
        background: isFocused ? '#EEF4FF' : '#F8FAFC',
        borderRadius: 16,
        border: `1.5px solid ${isFocused ? T.blue : '#E2E8F0'}`,
        padding: '12px 14px',
        display: 'flex', alignItems: 'center', gap: 12,
        cursor: 'pointer',
        transition: 'background 0.15s, border-color 0.15s, box-shadow 0.18s',
        boxShadow: isFocused ? '0 0 0 4px rgba(47,111,237,0.10)' : 'none',
      }}>
        <div style={{
          width: 50, height: 50, borderRadius: 13, flexShrink: 0,
          background: isFocused ? T.blue : '#E2E8F0',
          display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
          transition: 'background 0.15s',
        }}>
          <div style={{ fontSize: 8, fontWeight: 800, color: isFocused ? 'rgba(255,255,255,0.75)' : T.textSec, letterSpacing: 1 }}>{monthShort}</div>
          <div style={{ fontSize: 22, fontWeight: 800, color: isFocused ? '#fff' : T.text, lineHeight: 1 }}>{dayNum}</div>
        </div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 15, fontWeight: 700, color: T.text, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{weekday}</div>
          <div style={{ fontSize: 12, color: T.textSec, fontWeight: 500, marginTop: 1 }}>{fullDate}</div>
        </div>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style={{ flexShrink: 0 }}>
          <path d="M9 6l6 6-6 6" stroke={isFocused ? T.blue : T.textTer} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </div>
      <input
        ref={inputRef}
        type="date"
        value={value}
        min={minValue}
        max={maxValue}
        onChange={e => { if (e.target.value) { haptic('light'); onChange(e.target.value); } }}
        onFocus={() => setIsFocused(true)}
        onBlur={() => setIsFocused(false)}
        style={{ position: 'absolute', opacity: 0, width: 1, height: 1, overflow: 'hidden', pointerEvents: 'none' }}
      />
    </div>
  );
}

// TELA 1 — Configuração

function TelaConfig({ onIniciar, saldoAnterior = 0, onCancelar = null, initialConfig = null }) {
  const hoje = new Date();
  const todayStr  = fmtDateKey(hoje.toISOString());
  const fimMesStr = fmtDateKey(new Date(hoje.getFullYear(), hoje.getMonth() + 1, 0).toISOString());

  const initValor = initialConfig?.configurado
    ? (initialConfig.valorMensal || 0)
    : 0;
  const initDataInicio = (() => {
    if (initialConfig?.dataInicio) {
      const d = new Date(initialConfig.dataInicio);
      if (!isNaN(d.getTime())) return fmtDateKey(d.toISOString());
    }
    return todayStr;
  })();
  const initDataFim = (() => {
    if (initialConfig?.dataInicio && initialConfig?.diasDoMes) {
      const d = new Date(initialConfig.dataInicio);
      if (!isNaN(d.getTime())) {
        d.setDate(d.getDate() + Math.max(1, initialConfig.diasDoMes) - 1);
        return fmtDateKey(d.toISOString());
      }
    }
    return fimMesStr;
  })();

  const [valor, setValor]         = React.useState(initValor);
  const [inputText, setInputText] = React.useState(initValor > 0 ? initValor.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '');
  const [isFocused, setIsFocused] = React.useState(false);
  const [dataInicio, setDataInicio] = React.useState(initDataInicio);
  const [dataFim, setDataFim]       = React.useState(initDataFim);
  const inputRef = React.useRef(null);

  React.useEffect(() => {
    const t = setTimeout(() => inputRef.current?.focus(), 350);
    return () => clearTimeout(t);
  }, []);

  const dInicio = new Date(dataInicio + 'T00:00:00');
  const dFim    = new Date(dataFim    + 'T00:00:00');
  const dias = Math.max(1, Math.round((dFim - dInicio) / 86400000) + 1);

  const temSaldoAnterior = saldoAnterior !== 0;
  const totalEfetivo = valor + saldoAnterior;
  const valorDiario  = dias > 0 ? totalEfetivo / dias : 0;
  const podeIniciar  = valor > 0 && dias > 0 && dFim >= dInicio;

  function handleFocus() {
    setIsFocused(true);
    setInputText(valor > 0 ? valor.toFixed(2).replace('.', ',') : '');
  }
  function handleBlur() {
    setIsFocused(false);
    const raw = (inputRef.current?.value || '').replace(/\./g, '').replace(',', '.');
    setValor(parseFloat(raw) || 0);
  }
  function handleChange(e) {
    const text = e.target.value.replace(/[^0-9,.]/g, '');
    setInputText(text);
    const raw = text.replace(/\./g, '').replace(',', '.');
    const v = parseFloat(raw);
    if (!isNaN(v) && v >= 0) setValor(v);
  }



  const displayValue = isFocused
    ? inputText
    : (valor > 0 ? valor.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '');

  const summaryRows = [
    { icon: <IcoWallet2 />,   label: 'Valor do ciclo',   value: fmt(totalEfetivo), blue: false },
    { icon: <IcoCalendar2 />, label: 'Duração do ciclo',  value: `${dias} dias`,    blue: false },
    { icon: <IcoClock2 />,    label: 'Dá por dia',        value: fmt(valorDiario),  blue: true  },
  ];

  return (
    <div style={{
      background: T.bg, minHeight: '100%', overflowY: 'auto', overflowX: 'hidden',
      padding: '20px 20px 36px', boxSizing: 'border-box', fontFamily: T.font,
    }} className="screen-enter">

      {/* Back — visível só quando há ciclo anterior para retornar */}
      {onCancelar && (

          <button onClick={onCancelar} style={{

          }}>
            <IcoBack c={T.blue} s={22} />
          </button>
        </div>
      )}

      <div style={{ textAlign: 'center', marginBottom: 20 }}>
        <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, background: T.blueLight, borderRadius: 99, padding: '4px 12px', marginBottom: 12 }}>
          <div style={{ width: 6, height: 6, borderRadius: '50%', background: T.blue }} />
          <span style={{ fontSize: 11, fontWeight: 700, color: T.blue, letterSpacing: 0.6, textTransform: 'uppercase' }}>Configuração</span>
        </div>
        <div style={{ fontSize: 26, fontWeight: 800, color: T.text, letterSpacing: -0.8, lineHeight: 1.2 }}>
          Defina o valor do ciclo
        </div>
        <div style={{ fontSize: 14, color: T.textSec, lineHeight: 1.5, maxWidth: 270, margin: '8px auto 0' }}>
          Escolha quanto quer usar nos gastos do dia a dia.

      {/* Saldo anterior */}
      {temSaldoAnterior && (
        <div className="pop-in" style={{
          background: saldoAnterior > 0 ? '#ECFDF5' : '#FFF1F2',

// ─── SpendingGauge — régua segmentada de status ──────────────────────────────
function SpendingGauge({ ratioMargem, flashColor }) {
  function mapClamped(value, inMin, inMax, outMin, outMax) {
    const clamped = Math.max(inMin, Math.min(inMax, value));
    return outMin + (clamped - inMin) / (inMax - inMin) * (outMax - outMin);
  }

  let pos;
  if (ratioMargem < 0) {
    pos = mapClamped(ratioMargem, -2, 0, 5, 25);
  } else if (ratioMargem < 0.25) {
    pos = mapClamped(ratioMargem, 0, 0.25, 25, 50);
  } else if (ratioMargem < 1.5) {
    pos = mapClamped(ratioMargem, 0.25, 1.5, 50, 75);
  } else {
    pos = mapClamped(ratioMargem, 1.5, 3, 75, 95);
  }

  const SEGS = [
    { label: 'Passou',    color: '#E35D6A' },
    { label: 'Apertado',  color: '#E8B63E' },
    { label: 'No plano',  color: '#2F6FED' },
    { label: 'Com folga', color: '#31A46C' },
  ];
  const si = ratioMargem < 0 ? 0 : ratioMargem < 0.25 ? 1 : ratioMargem < 1.5 ? 2 : 3;

  return (
    <div style={{ marginTop: 20 }}>
      {/* Label acima */}
      <div style={{ marginBottom: 6 }}>
        <span style={{ fontSize: 10, fontWeight: 700, color: T.textSec, textTransform: 'uppercase', letterSpacing: 1.1 }}>
          Saúde do plano
        </span>
      </div>
      {/* Barra + triângulo marcador */}
      <div style={{ position: 'relative', paddingTop: 16 }}>
        {/* Triângulo apontando para baixo — desliza sobre a barra */}
        <div style={{
          position: 'absolute',
          left: `${pos}%`,
          top: 0,
          transform: 'translateX(-50%)',
          width: 0,
          height: 0,
          borderLeft: '9px solid transparent',
          borderRight: '9px solid transparent',
          borderTop: `13px solid ${SEGS[si].color}`,
          filter: `drop-shadow(0 2px 4px ${SEGS[si].color}88)`,
          transition: 'left 0.5s cubic-bezier(.2,.8,.3,1), border-top-color 0.3s',
          zIndex: 3,
          pointerEvents: 'none',
        }} />
        <div style={{ display: 'flex', height: 20, borderRadius: 999, overflow: 'hidden' }}>
          {SEGS.map((seg, i) => (
            <div key={i} style={{ flex: 1, height: '100%', background: i === si ? seg.color : seg.color + '55' }} />
          ))}
        </div>
      </div>
      {/* Labels de zona */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', marginTop: 5 }}>
        {SEGS.map((seg, i) => (
          <div key={i} style={{ textAlign: 'center' }}>
            <span style={{
              fontSize: 9,
              fontWeight: i === si ? 700 : 400,
              color: i === si ? seg.color : T.textTer,
              letterSpacing: 0.1,
            }}>{seg.label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── WeeklyMiniChart — gráfico da semana atual (Seg–Dom) ─────────────────────
function WeeklyMiniChart({ transacoes, valorDiarioBase, onAnalise, showLegend = true }) {
  const BAR_H = 78;
  const [activeBar, setActiveBar] = React.useState(null);
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const dow = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));

  const dias = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    const label = d.toLocaleDateString('pt-BR', { weekday: 'short' }).replace('.', '');
    const capitalized = label.charAt(0).toUpperCase() + label.slice(1, 3);
    return {
      key: fmtDateKey(d.toISOString()),
      label: capitalized,
      isToday: d.getTime() === today.getTime(),
      isFuture: d.getTime() > today.getTime(),
    };
  });

  const porDia = {};
  transacoes.filter(t => t && t.tipo === 'gasto').forEach(t => {
    const k = fmtDateKey(t.data);
    porDia[k] = (porDia[k] || 0) + t.valor;
  });

  const values = dias.map(d => porDia[d.key] || 0);
  const maxVal = Math.max(...values, valorDiarioBase, 1);
  const refLineTop = Math.round(BAR_H * (1 - Math.min(valorDiarioBase / maxVal, 1)));

  return (
    <div style={{ marginTop: 20 }}>
      <div style={{
        background: '#FFFFFF', borderRadius: 28, padding: 24,
        boxShadow: '0 8px 24px rgba(15,23,42,0.07)',
        border: '1px solid rgba(15,23,42,0.05)',
        minHeight: 220,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <div style={{ fontSize: 21, fontWeight: 800, color: T.text }}>Esta semana</div>
          {onAnalise && (
            <button onClick={onAnalise} style={{
              background: 'none', border: 'none', cursor: 'pointer', padding: '4px 0',
              fontSize: 13, fontWeight: 700, color: T.blue, fontFamily: T.font,
            }}>Ver análise →</button>
          )}
        </div>
        <div style={{ fontSize: 15, fontWeight: 500, color: T.textSec, marginTop: 4 }}>Seu ritmo de gastos nos últimos dias</div>
        <div style={{ height: 110, marginTop: 14, position: 'relative', padding: '0 2px' }}>
          <div style={{
            position: 'absolute', left: 0, right: 0, top: refLineTop,
            borderTop: `1px dashed ${T.blue}59`,
            pointerEvents: 'none', zIndex: 1,
          }} />
          <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', height: BAR_H, paddingTop: 8 }}>
            {dias.map((d, i) => {
              const val = values[i];
              const isActive = activeBar === i;
              const h = d.isFuture ? 8 : Math.max((val / maxVal) * BAR_H, val > 0 ? 14 : 8);
              const barBg = d.isToday
                ? T.blue
                : d.isFuture
                ? 'transparent'
                : val === 0
                ? '#D1D9E6'
                : val > valorDiarioBase
                ? T.red
                : T.green;
              return (
                <div key={i} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 0, position: 'relative' }}>
                  {isActive && !d.isFuture && (
                    <div style={{
                      position: 'absolute', bottom: h + 10,
                      background: '#1E293B', color: '#fff', fontSize: 10, fontWeight: 700,
                      borderRadius: 7, padding: '4px 8px', whiteSpace: 'nowrap', zIndex: 10,
                    }}>
                      {val === 0 ? 'R$ 0' : fmt(val)}
                    </div>
                  )}
                  <div
                    onClick={() => setActiveBar(isActive ? null : i)}
                    style={{
                      width: 32, height: Math.max(h, 8), minHeight: 8,
                      borderRadius: d.isFuture ? 5 : 10,
                      background: barBg,
                      border: d.isFuture ? `1.5px dashed #CBD5E1` : 'none',
                      boxShadow: d.isToday
                        ? '0 6px 16px rgba(47,111,237,0.32)'
                        : isActive
                        ? '0 0 0 3px rgba(47,111,237,0.35)'
                        : 'none',
                      transition: 'height 0.4s ease',
                      cursor: d.isFuture ? 'default' : 'pointer',
                    }}
                  />
                </div>
              );
            })}
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 8, padding: '0 2px' }}>
            {dias.map((d, i) => (
              <div key={i} style={{ width: 32, textAlign: 'center' }}>
                <span style={{ fontSize: 11, fontWeight: d.isToday ? 800 : 600, color: d.isToday ? T.blue : '#94A3B8' }}>
                  {d.label}
                </span>
              </div>
            ))}
          </div>
          {showLegend && (
          <div style={{ display: 'flex', gap: 12, marginTop: 10 }}>
            {[{bg: T.blue, label: 'Hoje'}, {bg: T.green, label: 'Com gasto'}, {bg: '#CBD5E1', label: 'Sem gasto'}, {bg: 'transparent', border: '1.5px dashed #CBD5E1', label: 'Futuro'}].map(x => (
              <div key={x.label} style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                <div style={{ width: 8, height: 8, borderRadius: 2, background: x.bg, border: x.border }} />
                <span style={{ fontSize: 9, color: T.textTer }}>{x.label}</span>
              </div>
            ))}
          </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── MiniDonutChart — gráfico de rosca de uso do orçamento ──────────────────
function MiniDonutChart({ pct, color, size = 88 }) {
  const stroke = 9;
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const used = Math.min(Math.max(pct, 0), 100);
  const dash = (used / 100) * circ;
  const cx = size / 2, cy = size / 2;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ flexShrink: 0 }}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(15,23,42,0.07)" strokeWidth={stroke} />
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
        transform={`rotate(-90 ${cx} ${cy})`}
      />
      <text x={cx} y={cy + 6} textAnchor="middle" dominantBaseline="middle"
        fontSize="17" fontWeight="800" fill={color} fontFamily="'DM Sans', system-ui, sans-serif">
        {Math.round(used)}%
      </text>
    </svg>
  );
}

function TelaFechamentoCiclo({ state, onNovoMes, onHistorico, onVoltar }) {
  const stats = React.useMemo(() => calcStats(state), [state]);
  const economizado = stats.saldoTotalRestante;
  const positivo = economizado >= 0;
  const pct = state.valorMensal > 0 ? Math.min(stats.totalGastos / state.valorMensal, 1) : 1;
  const diasNoPlanoPct = Math.round((1 - Math.max(0, -economizado) / Math.max(state.valorMensal, 1)) * 100);

  // Gasto por categoria
  const porCat = {};
  (state.transacoes || []).filter(t => t && t.tipo === 'gasto').forEach(t => {
    porCat[t.categoria || 'outros'] = (porCat[t.categoria || 'outros'] || 0) + t.valor;
  });
  const catsSorted = Object.entries(porCat).sort((a, b) => b[1] - a[1]).slice(0, 4);

          Ciclo encerrado
        </div>
        <div style={{ fontSize: 64, lineHeight: 1, marginBottom: 16 }}>
          {positivo ? '🏆' : '💪'}

        <div style={{ fontSize: 14, fontWeight: 600, color: 'rgba(255,255,255,0.6)', marginBottom: 8 }}>
