// ─── Notificações locais ─────────────────────────────────────────────────────
const SK_NOTIF = 'hd_notif';

function getNotifConfig() {
  try { return JSON.parse(localStorage.getItem(SK_NOTIF)) || {}; } catch { return {}; }
}
function saveNotifConfig(c) { try { localStorage.setItem(SK_NOTIF, JSON.stringify(c)); } catch {} }

function agendarLembrete(horaStr) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const cfg = getNotifConfig();
  if (!cfg.ativo) return;
  const hora = horaStr || cfg.hora || '21:00';
  const hoje = new Date().toISOString().split('T')[0];
  if (cfg.ultimoLembrete === hoje) return;
  const [h, m] = hora.split(':').map(Number);
  const alvo = new Date(); alvo.setHours(h, m, 0, 0);
  const delay = alvo - new Date();
  if (delay <= 0) return;
  setTimeout(() => {
    saveNotifConfig({ ...getNotifConfig(), ultimoLembrete: new Date().toISOString().split('T')[0] });
    const title = 'Hoje Dá 💰';
    const body = 'Não esqueça de registrar seus gastos e entradas de hoje!';
    if (navigator.serviceWorker?.controller) {
      navigator.serviceWorker.controller.postMessage({ type: 'SHOW_NOTIFICATION', title, body, icon: '/icons/icon-192.png' });
    } else {
      try { new Notification(title, { body, icon: '/icons/icon-192.png' }); } catch {}
    }
  }, delay);
}

async function ativarNotificacoes(horaStr) {
  if (!('Notification' in window)) return false;
  const perm = Notification.permission === 'granted' ? 'granted' : await Notification.requestPermission();
  if (perm !== 'granted') return false;
  const cfg = getNotifConfig();
  saveNotifConfig({ ...cfg, ativo: true, hora: horaStr || cfg.hora || '21:00' });
  agendarLembrete(horaStr || cfg.hora || '21:00');
  return true;
}

function desativarNotificacoes() {
  saveNotifConfig({ ...getNotifConfig(), ativo: false });
}

function DialogNotificacoes({ onFechar }) {
  const [cfg, setCfg] = React.useState(getNotifConfig);
  const [solicitando, setSolicitando] = React.useState(false);
  const suportado = 'Notification' in window;
  const bloqueado = suportado && Notification.permission === 'denied';

  async function handleToggle() {
    if (cfg.ativo) {
      desativarNotificacoes();
      setCfg(c => ({ ...c, ativo: false }));
    } else {
      setSolicitando(true);
      const ok = await ativarNotificacoes(cfg.hora || '21:00');
      setSolicitando(false);
      if (ok) setCfg(c => ({ ...c, ativo: true }));
    }
  }

  function handleHora(e) {
    const h = e.target.value;
    const newCfg = { ...cfg, hora: h };
    saveNotifConfig(newCfg);
    setCfg(newCfg);
    if (newCfg.ativo && Notification.permission === 'granted') agendarLembrete(h);
  }

  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'flex-end', justifyContent: 'center', zIndex: 100 }} onClick={onFechar}>
      <div className="pop-in" onClick={e => e.stopPropagation()} style={{ background: T.card, borderRadius: '20px 20px 0 0', padding: '6px 20px 32px', width: '100%' }}>
        <div style={{ width: 36, height: 4, borderRadius: 100, background: T.sep, margin: '12px auto 20px' }} />
        <div style={{ fontSize: 18, fontWeight: 800, color: T.text, marginBottom: 6 }}>🔔 Lembretes diários</div>
        <div style={{ fontSize: 14, color: T.textSec, lineHeight: 1.5, marginBottom: 20 }}>
          Receba uma notificação para lembrar de registrar seus gastos e entradas.
        </div>

        {!suportado && (
          <div style={{ background: T.yellowLight, borderRadius: T.r12, padding: '12px 14px', marginBottom: 16 }}>
            <span style={{ fontSize: 13, color: '#7A5A00', fontWeight: 600 }}>Seu navegador não suporta notificações.</span>
          </div>
        )}

        {suportado && bloqueado && (
          <div style={{ background: T.yellowLight, borderRadius: T.r12, padding: '12px 14px', marginBottom: 16 }}>
            <span style={{ fontSize: 13, color: '#7A5A00', fontWeight: 600 }}>Permissão bloqueada. Habilite nas configurações do navegador/sistema.</span>
          </div>
        )}

        {suportado && (
          <div style={{ background: T.bg, borderRadius: T.r14, padding: '14px 16px', marginBottom: 12, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <div>
              <div style={{ fontSize: 15, fontWeight: 700, color: T.text }}>Ativar lembretes</div>
              <div style={{ fontSize: 12, color: T.textSec, marginTop: 2 }}>{cfg.ativo ? 'Lembrete ativo' : 'Desativado'}</div>
            </div>
            <button
              onClick={handleToggle}
              disabled={solicitando || bloqueado}
              style={{
                width: 52, height: 30, borderRadius: 99, border: 'none',
                cursor: bloqueado ? 'not-allowed' : 'pointer',
                background: cfg.ativo ? T.green : '#CBD5E1',
                position: 'relative', transition: 'background 0.2s', flexShrink: 0,
              }}
            >
              <div style={{
                position: 'absolute', top: 3,
                left: cfg.ativo ? 25 : 3,
                width: 24, height: 24, borderRadius: '50%', background: '#fff',
                boxShadow: '0 2px 4px rgba(0,0,0,0.2)',
                transition: 'left 0.2s cubic-bezier(.2,.8,.3,1)',
              }} />
            </button>
          </div>
        )}

        {cfg.ativo && (
          <div className="fade-in" style={{ background: T.bg, borderRadius: T.r14, padding: '14px 16px', marginBottom: 16, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <div>
              <div style={{ fontSize: 15, fontWeight: 700, color: T.text }}>Horário do lembrete</div>
              <div style={{ fontSize: 12, color: T.textSec, marginTop: 2, lineHeight: 1.4 }}>O lembrete dispara enquanto o app estiver aberto. Para lembretes em background, adicione o app à tela inicial.</div>
            </div>
            <input
              type="time"
              value={cfg.hora || '21:00'}
              onChange={handleHora}
              style={{
                border: `1.5px solid ${T.blue}`, borderRadius: T.r12, padding: '6px 10px',
                fontSize: 16, fontWeight: 700, color: T.blue, background: T.blueLight,
                fontFamily: T.font, outline: 'none', cursor: 'pointer',
              }}
            />
          </div>
        )}

        <button onClick={onFechar} style={{ width: '100%', height: 44, borderRadius: T.r14, border: 'none', background: 'none', cursor: 'pointer', color: T.textSec, fontSize: 14, fontWeight: 600, fontFamily: T.font }}>Fechar</button>
      </div>
    </div>
  );
}

function Snackbar({ message, action, onAction }) {
  return (
    <div className="pop-in" style={{
      position: 'absolute', bottom: 72, left: 16, right: 16,
      background: '#1E293B', borderRadius: 14, padding: '13px 16px',
      display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12,
      boxShadow: '0 8px 28px rgba(0,0,0,0.35)', zIndex: 300,
    }}>
      <span style={{ fontSize: 14, color: '#F1F5F9', fontWeight: 500, flex: 1 }}>{message}</span>
      {action && (
        <button onClick={onAction} style={{
          background: 'none', border: 'none', cursor: 'pointer', flexShrink: 0,
          fontSize: 13, fontWeight: 800, color: T.blueMid, fontFamily: T.font, padding: '2px 4px',
        }}>{action}</button>
      )}
    </div>
  );
}

// ─── Error Boundary ───────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { error: null };
  }
  static getDerivedStateFromError(error) { return { error }; }
  render() {
    if (this.state.error) {
      return (
        <div style={{ padding: 32, textAlign: 'center', fontFamily: T.font }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>⚠️</div>
          <div style={{ fontSize: 16, fontWeight: 700, color: T.text, marginBottom: 8 }}>Algo deu errado</div>
          <div style={{ fontSize: 13, color: T.textSec, marginBottom: 24, lineHeight: 1.5 }}>{this.state.error.message}</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10, maxWidth: 280, margin: '0 auto' }}>
            <button onClick={() => this.setState({ error: null })} style={{
              background: T.blue, color: '#fff', border: 'none', borderRadius: T.r12,
              padding: '12px 20px', fontSize: 14, fontWeight: 700, cursor: 'pointer', fontFamily: T.font,
            }}>Tentar novamente</button>
            <button onClick={() => { try { localStorage.clear(); } catch {} window.location.reload(); }} style={{
              background: T.redLight, color: T.red, border: 'none', borderRadius: T.r12,
              padding: '12px 20px', fontSize: 14, fontWeight: 700, cursor: 'pointer', fontFamily: T.font,
            }}>Limpar dados e reiniciar</button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

// ─── Tab Bar ─────────────────────────────────────────────────────────────────
function TabBar({ tela, onChange }) {
  const tabs = [
    { id: 'painel',    label: 'Hoje',      icon: c => <IcoTabHoje c={c} /> },
    { id: 'historico', label: 'Histórico', icon: c => <IcoHistory c={c} s={22} /> },
    { id: 'analise',   label: 'Análise',   icon: c => <IcoChart c={c} s={22} /> },
  ];
  return (
    <div style={{ background: '#FFFFFF', borderTop: '1px solid rgba(15,23,42,0.07)', display: 'flex', padding: '6px 0 calc(10px + env(safe-area-inset-bottom))', flexShrink: 0 }}>
      {tabs.map(tab => {
        const active = tela === tab.id;
        const c = active ? T.blue : T.textTer;
        return (
          <button key={tab.id} onClick={() => onChange(tab.id)} style={{ flex: 1, border: 'none', background: 'none', cursor: 'pointer', fontFamily: T.font, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, padding: '4px 0' }}>
            {tab.icon(c)}
            <span style={{ fontSize: 10, fontWeight: active ? 700 : 500, color: c }}>{tab.label}</span>
          </button>
        );
      })}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// App Root
// ═══════════════════════════════════════════════════════════════
function App() {
  const TELAS = { config: 'config', painel: 'painel', gasto: 'gasto', extra: 'extra', historico: 'historico', editar: 'editar', analise: 'analise', fechamento: 'fechamento' };

  const estadoInicial = () => loadState() || { configurado: false, valorMensal: 0, diasDoMes: 30, dataInicio: null, transacoes: [] };

  const [state, setState]           = React.useState(estadoInicial);
  const [tela, setTela]             = React.useState(() => (loadState()?.configurado ? TELAS.painel : TELAS.config));
  const [showNovoMes, setShowNovoMes]               = React.useState(false);
  const [showMenu, setShowMenu]                     = React.useState(false);
  const [showConfirmRecomecar, setShowConfirmRecomecar] = React.useState(false);
  const [editandoItem, setEditandoItem]             = React.useState(null);
  const [onboardingVisto, setOnboardingVisto]       = React.useState(() => localStorage.getItem('onboardingSeen') === 'true');
  const [flashId, setFlashId]                       = React.useState(0);
  const [flashType, setFlashType]                   = React.useState(null);
  const [snackbar, setSnackbar]                     = React.useState(null);
  const [showNotif, setShowNotif]                   = React.useState(false);

  React.useEffect(() => {
    const cfg = getNotifConfig();
    if (cfg.ativo && typeof Notification !== 'undefined' && Notification.permission === 'granted') {
      agendarLembrete(cfg.hora || '21:00');
    }
  }, []);
  const snackTimerRef  = React.useRef(null);
  const deletedRef     = React.useRef(null);
  const prevStateRef   = React.useRef(null);
  const isNovoCicloRef = React.useRef(false); // distingue "novo ciclo" de "editar config"
  const scrollRef      = React.useRef(null);

  React.useEffect(() => { scrollRef.current?.scrollTo(0, 0); }, [tela]);

  function update(fn) {
    setState(prev => {
      const next = fn(prev);
      try { localStorage.setItem(SK, JSON.stringify(next)); }
      catch { showSnackbar('⚠️ Não foi possível salvar. Verifique o armazenamento do dispositivo.', null, null, 6000); }
      return next;
    });
  }

  function showSnackbar(message, action, onAction, duration = 4000) {
    if (snackTimerRef.current) clearTimeout(snackTimerRef.current);
    setSnackbar({ message, action, onAction });
    snackTimerRef.current = setTimeout(() => { setSnackbar(null); snackTimerRef.current = null; }, duration);
  }

  function triggerFlash(tipo) {
    setFlashType(tipo);
    setFlashId(id => id + 1);
    setTimeout(() => setFlashType(null), 900);
  }

  function handleOnboardingVisto() {
    localStorage.setItem('onboardingSeen', 'true');
    setOnboardingVisto(true);
    if (!loadState()?.configurado) setTela(TELAS.config);
  }

  function handleIniciar({ valorMensal, diasDoMes, dataInicio }) {
    haptic('success');
    const transacoesExistentes = prevStateRef.current?.transacoes ?? [];
    // isEditing = verdadeiro só quando o usuário edita a config do ciclo atual (botão <)
    // isNovoCicloRef = true quando vem do fluxo "Novo ciclo" → não carregar transações antigas
    const isEditing = !isNovoCicloRef.current && prevStateRef.current?.configurado === true;
    const ciclosAnteriores = state.ciclosAnteriores || [];
    isNovoCicloRef.current = false;
    prevStateRef.current = null;
    const inicio = dataInicio ? new Date(dataInicio + 'T00:00:00').toISOString() : new Date().toISOString();
    const next = { configurado: true, valorMensal, diasDoMes, dataInicio: inicio, transacoes: isEditing ? transacoesExistentes : [], ciclosAnteriores };
    saveState(next); setState(next); setTela(TELAS.painel);
  }

  function handleEntrada(tipo, { valor, descricao, categoria, dataLancamento }) {
    const dataObj = dataLancamento ? new Date(dataLancamento + 'T12:00:00') : new Date();
    update(prev => ({
      ...prev,
      transacoes: [{ id: Date.now(), tipo, valor, descricao, categoria, data: dataObj.toISOString() }, ...prev.transacoes],
    }));
    const msg = tipo === 'gasto'
      ? `✅ Gasto de ${fmt(valor)} registrado`
      : `✅ Entrada de ${fmt(valor)} registrada`;
    showSnackbar(msg, null, null, 3000);
  }

  const [editReturnTela, setEditReturnTela] = React.useState(TELAS.historico);
  function handleEditar(item, returnTela = TELAS.historico) { setEditReturnTela(returnTela); setEditandoItem(item); setTela(TELAS.editar); }

  function handleSalvarEdicao({ valor, descricao, categoria, dataLancamento }) {
    haptic('success');
    const dataObj = dataLancamento ? new Date(dataLancamento + 'T12:00:00') : null;
    update(prev => ({ ...prev, transacoes: prev.transacoes.map(t => t.id === editandoItem.id ? { ...t, valor, descricao, categoria, ...(dataObj ? { data: dataObj.toISOString() } : {}) } : t) }));
    triggerFlash(editandoItem?.tipo || 'gasto');
  }

  function handleExcluir(id) {
    haptic('error');
    deletedRef.current = state.transacoes.find(t => t.id === id) || null;
    update(prev => ({ ...prev, transacoes: prev.transacoes.filter(t => t.id !== id) }));
    showSnackbar('Transação excluída', 'Desfazer', () => {
      if (deletedRef.current) {
        update(prev => ({
          ...prev,
          transacoes: [...prev.transacoes, deletedRef.current].sort((a, b) => b.id - a.id),
        }));
        deletedRef.current = null;
      }
      setSnackbar(null);
      if (snackTimerRef.current) { clearTimeout(snackTimerRef.current); snackTimerRef.current = null; }
    });
  }

  function handleNovoMes({ carregarSaldo }) {
    haptic('medium');
    prevStateRef.current = state;
    isNovoCicloRef.current = true;
    const stats = calcStats(state);
    const saldoParaCarregar = carregarSaldo ? stats.saldoTotalRestante : 0;

    // Arquivar o ciclo atual antes de zerar
    const cicloFechado = {
      dataInicio: state.dataInicio,
      dataFim: new Date().toISOString(),
      diasDoMes: state.diasDoMes,
      valorMensal: state.valorMensal,
      transacoes: state.transacoes,
      totalGastos: stats.totalGastos,
      totalEntradas: stats.totalEntradas,
      saldoFinal: stats.saldoTotalRestante,
    };
    const ciclosAnteriores = [...(state.ciclosAnteriores || []).slice(-11), cicloFechado];

    const reset = {
      configurado: false, valorMensal: 0, diasDoMes: 30,
      dataInicio: null, transacoes: [],
      saldoAnterior: saldoParaCarregar,
      ciclosAnteriores,
    };
    saveState(reset); setState(reset); setShowNovoMes(false); setTela(TELAS.config);
  }

  function handleCancelarNovoMes() {
    if (prevStateRef.current) {
      saveState(prevStateRef.current);
      setState(prevStateRef.current);
      prevStateRef.current = null;
      setTela(TELAS.painel);
    }
  }

  function handleVoltarParaOnboarding() {
    localStorage.removeItem('onboardingSeen');
    setOnboardingVisto(false);
  }

  function handleExportarDados() {
    const dados = { exportadoEm: new Date().toISOString(), app: 'Hoje Dá', versao: 'v6', dados: state };
    const blob = new Blob([JSON.stringify(dados, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `hoje-da-backup-${new Date().toISOString().split('T')[0]}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    haptic('success');
  }

  function handleRecomecarDoZero() {
    haptic('medium');
    const reset = { configurado: false, valorMensal: 0, diasDoMes: 30, dataInicio: null, transacoes: [] };
    saveState(reset); setState(reset); setShowConfirmRecomecar(false);
    setTela(TELAS.config);
    localStorage.removeItem('onboardingSeen'); setOnboardingVisto(false);
  }

  const renderTela = () => {
    switch (tela) {
      case TELAS.config:    return <TelaConfig onIniciar={handleIniciar} saldoAnterior={state.saldoAnterior || 0} onCancelar={prevStateRef.current ? handleCancelarNovoMes : handleVoltarParaOnboarding} initialConfig={state.configurado ? state : null} />;
      case TELAS.painel:    return <TelaPainel state={state} flashId={flashId} flashType={flashType} onRegistrarGasto={() => setTela(TELAS.gasto)} onAdicionarExtra={() => setTela(TELAS.extra)} onHistorico={() => setTela(TELAS.historico)} onOpenMenu={() => setShowMenu(true)} onAnalise={() => setTela(TELAS.analise)} onEditar={item => handleEditar(item, TELAS.painel)} onExcluir={handleExcluir} onConfig={() => { prevStateRef.current = state; isNovoCicloRef.current = false; setTela(TELAS.config); }} onFechamento={() => setTela(TELAS.fechamento)} />;
      case TELAS.fechamento: return <TelaFechamentoCiclo state={state} onNovoMes={() => setShowNovoMes(true)} onHistorico={() => setTela(TELAS.historico)} onVoltar={() => setTela(TELAS.painel)} />;
      case TELAS.gasto:     return <TelaEntrada tipo="gasto"  minDate={state.dataInicio ? fmtDateKey(new Date(state.dataInicio).toISOString()) : null} onSalvar={v => handleEntrada('gasto', v)}  onVoltar={(tipo) => { if (tipo) triggerFlash(tipo); setTela(TELAS.painel); }} />;
      case TELAS.extra:     return <TelaEntrada tipo="extra"  minDate={state.dataInicio ? fmtDateKey(new Date(state.dataInicio).toISOString()) : null} onSalvar={v => handleEntrada('extra', v)}  onVoltar={(tipo) => { if (tipo) triggerFlash(tipo); setTela(TELAS.painel); }} />;
      case TELAS.historico: return <TelaHistorico transacoes={state.transacoes} ciclosAnteriores={state.ciclosAnteriores || []} onExcluir={handleExcluir} onEditar={handleEditar} onVoltar={() => setTela(TELAS.painel)} />;
      case TELAS.analise:    return <TelaAnalise state={state} onVoltar={() => setTela(TELAS.painel)} />;
      case TELAS.editar:    return <TelaEntrada tipo={editandoItem?.tipo || 'gasto'} initialData={editandoItem} onSalvar={handleSalvarEdicao} onVoltar={(tipo) => { if (tipo) triggerFlash(tipo); setEditandoItem(null); setTela(editReturnTela); }} />;
      default: return null;
    }
  };

  const showTabBar = ['painel', 'historico', 'analise'].includes(tela);
  const isMobile = useIsMobile();
  const outerStyle = isMobile
    ? { width: '100%', height: '100dvh', display: 'flex', flexDirection: 'column', position: 'relative', fontFamily: T.font, background: T.bg, overflowX: 'hidden' }
    : { width: '100%', height: '100%', display: 'flex', flexDirection: 'column', position: 'relative', fontFamily: T.font, background: T.bg };

  const appContent = (
    <div style={outerStyle}>
          <div ref={scrollRef} style={{ flex: 1, overflowY: 'auto', overflowX: 'hidden' }}>
            {!onboardingVisto ? (
              <OnboardingScreen onComecar={handleOnboardingVisto} />
            ) : renderTela()}
          </div>
          {onboardingVisto && showTabBar && <TabBar tela={tela} onChange={setTela} />}
          {onboardingVisto && (
            <>
              {showNovoMes && <DialogReiniciar onConfirmar={handleNovoMes} onCancelar={() => setShowNovoMes(false)} saldoRestante={calcStats(state).saldoTotalRestante} />}
              {showNotif && <DialogNotificacoes onFechar={() => setShowNotif(false)} />}
              {showMenu && (
                <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'flex-end', justifyContent: 'center', zIndex: 100 }} onClick={() => setShowMenu(false)}>
                  <div className="pop-in" onClick={e => e.stopPropagation()} style={{ background: T.card, borderRadius: '20px 20px 0 0', padding: '6px 20px 32px', width: '100%' }}>
                    <div style={{ width: 36, height: 4, borderRadius: 100, background: T.sep, margin: '12px auto 20px' }} />
                    <div style={{ fontSize: 13, fontWeight: 700, color: T.textTer, textTransform: 'uppercase', letterSpacing: 1.2, marginBottom: 12 }}>Opções</div>
                    {[
                      { label: 'Novo ciclo', sub: 'Encerrar o ciclo atual e começar um novo', ico: '🔄', action: () => { setShowMenu(false); setShowNovoMes(true); }, danger: false },
                      { label: 'Lembretes diários', sub: getNotifConfig().ativo ? 'Lembrete ativo' : 'Ativar notificações', ico: '🔔', action: () => { setShowMenu(false); setShowNotif(true); }, danger: false },
                      { label: 'Exportar dados', sub: 'Baixar backup completo em JSON', ico: '📤', action: () => { setShowMenu(false); handleExportarDados(); }, danger: false },
                      { label: 'Recomeçar do zero', sub: 'Apaga tudo e vai para o início', ico: '🗑️', action: () => { setShowMenu(false); setShowConfirmRecomecar(true); }, danger: true },
                    ].map((item, i) => (
                      <button key={i} onClick={item.action} style={{
                        width: '100%', padding: '14px 16px', borderRadius: 14, border: 'none',
                        background: item.danger ? T.redLight : T.bg,
                        cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 14,
                        marginBottom: 10, fontFamily: T.font, textAlign: 'left',
                      }}>
                        <span style={{ fontSize: 22, flexShrink: 0 }}>{item.ico}</span>
                        <div>
                          <div style={{ fontSize: 15, fontWeight: 700, color: item.danger ? T.red : T.text }}>{item.label}</div>
                          <div style={{ fontSize: 12, color: T.textSec, marginTop: 2, lineHeight: 1.4 }}>{item.sub}</div>
                        </div>
                      </button>
                    ))}
                    <button onClick={() => setShowMenu(false)} style={{ width: '100%', height: 44, borderRadius: T.r14, border: 'none', background: 'none', cursor: 'pointer', color: T.textSec, fontSize: 14, fontWeight: 600, fontFamily: T.font }}>Cancelar</button>
                  </div>
                </div>
              )}
              {snackbar && (
                <Snackbar
                  message={snackbar.message}
                  action={snackbar.action}
                  onAction={snackbar.onAction}
                />
              )}
              {showConfirmRecomecar && (
                <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'flex-end', justifyContent: 'center', zIndex: 100 }}>
                  <div className="pop-in" style={{ background: T.card, borderRadius: '20px 20px 0 0', padding: '6px 20px 32px', width: '100%' }}>
                    <div style={{ width: 36, height: 4, borderRadius: 100, background: T.sep, margin: '12px auto 20px' }} />
                    <div style={{ fontSize: 20, fontWeight: 800, color: T.text, marginBottom: 8 }}>Tem certeza?</div>
                    <div style={{ fontSize: 14, color: T.textSec, lineHeight: 1.55, marginBottom: 24 }}>
                      Todas as suas movimentações, orçamento e histórico serão apagados permanentemente. Essa ação não pode ser desfeita.
                    </div>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                      <button onClick={handleRecomecarDoZero} style={{
                        width: '100%', height: 54, borderRadius: T.r16, border: 'none',
                        background: T.red, color: '#fff', fontSize: 16, fontWeight: 800,
                        fontFamily: T.font, cursor: 'pointer',
                        boxShadow: '0 8px 20px rgba(216,36,50,0.28)',
                      }}>Sim, apagar tudo</button>
                      <button onClick={() => setShowConfirmRecomecar(false)} style={{
                        width: '100%', height: 44, borderRadius: T.r14, border: 'none',
                        background: 'none', cursor: 'pointer',
                        color: T.textSec, fontSize: 14, fontWeight: 600, fontFamily: T.font,
                      }}>Cancelar</button>
                    </div>
                  </div>
                </div>
              )}
            </>
          )}
    </div>
  );

  if (isMobile) return appContent;

  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh' }}>
      <AndroidDevice width={390} height={844} dark={false}>
        {appContent}
      </AndroidDevice>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
<div id="root"></div>
</body>
</html>
