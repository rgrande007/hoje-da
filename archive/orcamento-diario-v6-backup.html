// ─── Diálogo ajustar orçamento ────────────────────────────────────────────────
function DialogAjustarOrcamento({ valorAtual, state, onConfirmar, onCancelar }) {
  const [novoValor, setNovoValor] = React.useState(valorAtual);
  const [inputText, setInputText] = React.useState(
    valorAtual > 0 ? valorAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : ''
  );
  const [isFocused, setIsFocused] = React.useState(false);
  const inputRef = React.useRef(null);

  function handleFocus() {
    setIsFocused(true);
    setInputText(novoValor > 0 ? (novoValor % 1 === 0 ? String(novoValor) : novoValor.toFixed(2).replace('.', ',')) : '');
  }
  function handleBlur() {
    setIsFocused(false);
    const raw = (inputRef.current?.value || '').replace(/\./g, '').replace(',', '.');
    setNovoValor(parseFloat(raw) || 0);
  }
  function handleChange(e) { setInputText(e.target.value.replace(/[^0-9,.]/g, '')); }

  const displayValue = isFocused
    ? inputText
    : (novoValor > 0 ? novoValor.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '');

  const podeConfirmar = novoValor > 0;

  return (
    <div style={{
      position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.5)',
      display: 'flex', alignItems: 'flex-end', justifyContent: 'center',
      zIndex: 100,
    }}>
      <div className="pop-in" style={{
        background: T.card, borderRadius: '20px 20px 0 0',
        padding: '6px 20px 32px', width: '100%',
      }}>
        <div style={{ width: 36, height: 4, borderRadius: 100, background: T.sep, margin: '12px auto 20px' }} />
        <div style={{ fontSize: 18, fontWeight: 800, color: T.text, marginBottom: 6 }}>Ajustar orçamento</div>
        <div style={{ fontSize: 14, color: T.textSec, lineHeight: 1.5, marginBottom: 18 }}>
          O novo valor substituirá o orçamento planejado. Suas movimentações serão mantidas.
        </div>
        <div
          onClick={() => inputRef.current?.focus()}
          style={{
            border: `1.5px solid ${isFocused ? T.blue : '#E2E8F0'}`,
            borderRadius: 14, padding: '10px 16px',
            display: 'flex', alignItems: 'center',
            background: isFocused ? '#F0F6FF' : '#FAFAFA',
            transition: 'border-color 0.15s, background 0.15s',
            cursor: 'text', marginBottom: 20,
          }}
        >
          <span style={{ fontSize: 18, fontWeight: 600, color: '#334155', marginRight: 8, flexShrink: 0 }}>R$</span>
          <input
            ref={inputRef}
            type="text"
            inputMode="decimal"
            value={displayValue}
            onChange={handleChange}
            onFocus={handleFocus}
            onBlur={handleBlur}
            placeholder="0,00"
            style={{
              border: 'none', outline: 'none', flex: 1, minWidth: 0,
              fontSize: 34, fontWeight: 700,
              color: novoValor > 0 ? '#0F172A' : '#CBD5E1',
              fontFamily: T.font, background: 'transparent', letterSpacing: -1,
            }}
          />
        </div>
        {/* Preview de impacto */}
        {podeConfirmar && (() => {
          const stats = calcStats(state);
          const novaBase = stats.diasRestantes > 0 ? novoValor / state.diasDoMes : 0;
          const baseAtual = stats.valorDiarioBase;
          const diff = novaBase - baseAtual;
          const diffPos = diff >= 0;
          return (
            <div style={{
              background: T.bgAlt, borderRadius: T.r12, padding: '12px 14px', marginBottom: 14,
              display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            }}>
              <div>
                <div style={{ fontSize: 11, color: T.textSec, fontWeight: 600, marginBottom: 3 }}>Base/dia atual</div>
                <div style={{ fontSize: 15, fontWeight: 800, color: T.text }}>{fmt(baseAtual)}</div>
              </div>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M9 6l6 6-6 6" stroke={T.textTer} strokeWidth="2" strokeLinecap="round"/>
              </svg>
              <div style={{ textAlign: 'right' }}>
                <div style={{ fontSize: 11, color: T.textSec, fontWeight: 600, marginBottom: 3 }}>Nova base/dia</div>
                <div style={{ fontSize: 15, fontWeight: 800, color: diffPos ? T.green : T.red }}>{fmt(novaBase)}</div>
              </div>
              <div style={{
                background: diffPos ? T.greenLight : T.redLight,
                color: diffPos ? T.green : T.red,
                fontSize: 12, fontWeight: 800, borderRadius: 8, padding: '4px 8px',
              }}>
                {diffPos ? '+' : ''}{fmt(diff)}
              </div>
            </div>
          );
        })()}

        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          <button
            onClick={() => { if (podeConfirmar) { haptic('success'); onConfirmar(novoValor); } }}
            style={{
              width: '100%', height: 54, borderRadius: T.r16, border: 'none',
              background: podeConfirmar ? T.blue : '#E2ECFF',
              color: podeConfirmar ? '#fff' : '#93C5FD',
              fontSize: 16, fontWeight: 800, fontFamily: T.font,
              cursor: podeConfirmar ? 'pointer' : 'default',
              boxShadow: podeConfirmar ? '0 8px 20px rgba(47,111,237,0.28)' : 'none',
            }}
          >
            Confirmar novo valor
          </button>
          <button onClick={onCancelar} style={{
            width: '100%', height: 44, borderRadius: T.r14,
            border: 'none', background: 'none', cursor: 'pointer',
            color: T.textSec, fontSize: 14, fontWeight: 600, fontFamily: T.font,
          }}>Cancelar</button>
        </div>
      </div>
    </div>
  );
}

// ─── Error Boundary ───────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { error: null };
  }
  static getDerivedStateFromError(error) { return { error }; }
  render() {
    if (this.state.error) {
      return (
        <div style={{ padding: 32, textAlign: 'center' }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>⚠️</div>
          <div style={{ fontSize: 16, fontWeight: 700, color: T.text, marginBottom: 8 }}>Algo deu errado</div>
          <div style={{ fontSize: 13, color: T.textSec, marginBottom: 20 }}>{this.state.error.message}</div>
          <button onClick={() => this.setState({ error: null })} style={{
            background: T.blue, color: '#fff', border: 'none', borderRadius: T.r12,
            padding: '10px 20px', fontSize: 14, fontWeight: 700, cursor: 'pointer', fontFamily: T.font,
          }}>Tentar novamente</button>
        </div>
      );
    }
    return this.props.children;
  }
}

// App Root
// ═══════════════════════════════════════════════════════════════
function App() {
  const TELAS = { config: 'config', painel: 'painel', gasto: 'gasto', extra: 'extra', historico: 'historico', editar: 'editar', analise: 'analise' };

  const estadoInicial = () => loadState() || { configurado: false, valorMensal: 0, diasDoMes: 30, dataInicio: null, transacoes: [] };

  const [state, setState]           = React.useState(estadoInicial);
  const [tela, setTela]             = React.useState(() => (loadState()?.configurado ? TELAS.painel : TELAS.config));
  const [showNovoMes, setShowNovoMes]               = React.useState(false);
  const [showMenu, setShowMenu]                     = React.useState(false);
  const [showAjustar, setShowAjustar]               = React.useState(false);
  const [showConfirmRecomecar, setShowConfirmRecomecar] = React.useState(false);
  const [editandoItem, setEditandoItem]             = React.useState(null);
  const [onboardingVisto, setOnboardingVisto]       = React.useState(() => localStorage.getItem('onboardingSeen') === 'true');
  const [flashId, setFlashId]                       = React.useState(0);
  const [flashType, setFlashType]                   = React.useState(null);
  const [snackbar, setSnackbar]                     = React.useState(null);
  const snackTimerRef = React.useRef(null);
  const deletedRef    = React.useRef(null);

  function update(fn) {
    setState(prev => { const next = fn(prev); saveState(next); return next; });
  }

  function showSnackbar(message, action, onAction, duration = 4000) {
    if (snackTimerRef.current) clearTimeout(snackTimerRef.current);
    setSnackbar({ message, action, onAction });
    snackTimerRef.current = setTimeout(() => { setSnackbar(null); snackTimerRef.current = null; }, duration);
  }

  function triggerFlash(tipo) {
    setFlashType(tipo);
    setFlashId(id => id + 1);
    setTimeout(() => setFlashType(null), 900);
  }

  function handleOnboardingVisto() {
    localStorage.setItem('onboardingSeen', 'true');
    setOnboardingVisto(true);
    if (!loadState()?.configurado) setTela(TELAS.config);
  }

  function handleIniciar({ valorMensal, diasDoMes }) {
    haptic('success');
    const next = { configurado: true, valorMensal, diasDoMes, dataInicio: new Date().toISOString(), transacoes: [] };
    saveState(next); setState(next); setTela(TELAS.painel);
  }

  function handleEntrada(tipo, { valor, descricao, categoria, dataLancamento }) {
    const dataObj = dataLancamento ? new Date(dataLancamento + 'T12:00:00') : new Date();
    update(prev => ({
      ...prev,
      transacoes: [{ id: Date.now(), tipo, valor, descricao, categoria, data: dataObj.toISOString() }, ...prev.transacoes],
    }));
  }

  const [editReturnTela, setEditReturnTela] = React.useState(TELAS.historico);
  function handleEditar(item, returnTela = TELAS.historico) { setEditReturnTela(returnTela); setEditandoItem(item); setTela(TELAS.editar); }

  function handleSalvarEdicao({ valor, descricao, categoria, dataLancamento }) {
    haptic('success');
    const dataObj = dataLancamento ? new Date(dataLancamento + 'T12:00:00') : null;
    update(prev => ({ ...prev, transacoes: prev.transacoes.map(t => t.id === editandoItem.id ? { ...t, valor, descricao, categoria, ...(dataObj ? { data: dataObj.toISOString() } : {}) } : t) }));
  }

  function handleExcluir(id) {
    haptic('error');
    deletedRef.current = state.transacoes.find(t => t.id === id) || null;
    update(prev => ({ ...prev, transacoes: prev.transacoes.filter(t => t.id !== id) }));
    showSnackbar('Transação excluída', 'Desfazer', () => {
      if (deletedRef.current) {
        update(prev => ({
          ...prev,
          transacoes: [...prev.transacoes, deletedRef.current].sort((a, b) => b.id - a.id),
        }));
        deletedRef.current = null;
      }
      setSnackbar(null);
      if (snackTimerRef.current) { clearTimeout(snackTimerRef.current); snackTimerRef.current = null; }
    });
  }

  function handleNovoMes({ carregarSaldo }) {
    haptic('medium');
    const stats = calcStats(state);
    const saldoParaCarregar = carregarSaldo ? stats.saldoTotalRestante : 0;
    const reset = {
      configurado: false, valorMensal: 0, diasDoMes: 30,
      dataInicio: null, transacoes: [],
      saldoAnterior: saldoParaCarregar,
    };
    saveState(reset); setState(reset); setShowNovoMes(false); setTela(TELAS.config);
  }

  function handleAjustarOrcamento(novoValor) {
    update(prev => ({ ...prev, valorMensal: novoValor }));
    setShowAjustar(false);
  }

  function handleRecomecarDoZero() {
    haptic('medium');
    const reset = { configurado: false, valorMensal: 0, diasDoMes: 30, dataInicio: null, transacoes: [] };
    saveState(reset); setState(reset); setShowConfirmRecomecar(false);
    setTela(TELAS.config);
    localStorage.removeItem('onboardingSeen'); setOnboardingVisto(false);
  }

  const renderTela = () => {
    switch (tela) {
      case TELAS.config:    return <TelaConfig onIniciar={handleIniciar} saldoAnterior={state.saldoAnterior || 0} />;
      case TELAS.painel:    return <TelaPainel state={state} flashId={flashId} flashType={flashType} onRegistrarGasto={() => setTela(TELAS.gasto)} onAdicionarExtra={() => setTela(TELAS.extra)} onHistorico={() => setTela(TELAS.historico)} onOpenMenu={() => setShowMenu(true)} onAnalise={() => setTela(TELAS.analise)} onEditar={item => handleEditar(item, TELAS.painel)} />;
      case TELAS.gasto:     return <TelaEntrada tipo="gasto"  onSalvar={v => handleEntrada('gasto', v)}  onVoltar={(tipo) => { if (tipo) triggerFlash(tipo); setTela(TELAS.painel); }} />;
      case TELAS.extra:     return <TelaEntrada tipo="extra"  onSalvar={v => handleEntrada('extra', v)}  onVoltar={(tipo) => { if (tipo) triggerFlash(tipo); setTela(TELAS.painel); }} />;
      case TELAS.historico: return <TelaHistorico transacoes={state.transacoes} onExcluir={handleExcluir} onEditar={handleEditar} />;
      case TELAS.analise:    return <TelaAnalise state={state} />;
      case TELAS.editar:    return <TelaEntrada tipo={editandoItem?.tipo || 'gasto'} initialData={editandoItem} onSalvar={handleSalvarEdicao} onVoltar={(tipo) => { if (tipo) triggerFlash(tipo); setEditandoItem(null); setTela(editReturnTela); }} />;
      default: return null;
    }
  };

  const showTabBar = ['painel', 'historico', 'analise'].includes(tela);

  return (
    <div style={{ position: 'relative' }}>
      <AndroidDevice width={390} height={844} dark={false}>
        <div style={{ width: '100%', height: '100%', display: 'flex', flexDirection: 'column', position: 'relative', fontFamily: T.font, background: T.bg }}>
          <div style={{ flex: 1, overflowY: 'auto', overflowX: 'hidden' }}>
            {!onboardingVisto ? (
              <OnboardingScreen onComecar={handleOnboardingVisto} />
            ) : renderTela()}
          </div>
          {onboardingVisto && showTabBar && <TabBar tela={tela} onChange={setTela} />}
          {onboardingVisto && (
            <>
              {showNovoMes && <DialogReiniciar onConfirmar={handleNovoMes} onCancelar={() => setShowNovoMes(false)} saldoRestante={calcStats(state).saldoTotalRestante} />}
              {showAjustar && <DialogAjustarOrcamento valorAtual={state.valorMensal} state={state} onConfirmar={handleAjustarOrcamento} onCancelar={() => setShowAjustar(false)} />}
              {showMenu && (
                <div style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'flex-end', justifyContent: 'center', zIndex: 100 }} onClick={() => setShowMenu(false)}>
                  <div className="pop-in" onClick={e => e.stopPropagation()} style={{ background: T.card, borderRadius: '20px 20px 0 0', padding: '6px 20px 32px', width: '100%' }}>
                    <div style={{ width: 36, height: 4, borderRadius: 100, background: T.sep, margin: '12px auto 20px' }} />
                    <div style={{ fontSize: 13, fontWeight: 700, color: T.textTer, textTransform: 'uppercase', letterSpacing: 1.2, marginBottom: 12 }}>Configurações</div>
                    {[
                      { label: 'Ajustar orçamento', sub: 'Mudar o valor disponível para este ciclo', ico: '📝', action: () => { setShowMenu(false); setShowAjustar(true); }, danger: false },
                      { label: 'Novo mês', sub: 'Encerrar o ciclo atual e começar um novo', ico: '🔄', action: () => { setShowMenu(false); setShowNovoMes(true); }, danger: false },
                      { label: 'Recomeçar do zero', sub: 'Apaga tudo e vai para o início', ico: '🗑️', action: () => { setShowMenu(false); setShowConfirmRecomecar(true); }, danger: true },
                    ].map((item, i) => (
                      <button key={i} onClick={item.action} style={{
                        width: '100%', padding: '14px 16px', borderRadius: 14, border: 'none',
                        background: item.danger ? T.redLight : T.bg,
                        cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 14,
                        marginBottom: 10, fontFamily: T.font, textAlign: 'left',
                      }}>
                        <span style={{ fontSize: 22, flexShrink: 0 }}>{item.ico}</span>
                        <div>
                          <div style={{ fontSize: 15, fontWeight: 700, color: item.danger ? T.red : T.text }}>{item.label}</div>
                          <div style={{ fontSize: 12, color: T.textSec, marginTop: 2, lineHeight: 1.4 }}>{item.sub}</div>
                        </div>
                      </button>
                    ))}
                    <button onClick={() => setShowMenu(false)} style={{ width: '100%', height: 44, borderRadius: T.r14, border: 'none', background: 'none', cursor: 'pointer', color: T.textSec, fontSize: 14, fontWeight: 600, fontFamily: T.font }}>Cancelar</button>
                  </div>
                </div>
              )}
              {snackbar && (
                <Snackbar
                  message={snackbar.message}
                  action={snackbar.action}
                  onAction={snackbar.onAction}
                />
              )}
              {showConfirmRecomecar && (
                <div style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'flex-end', justifyContent: 'center', zIndex: 100 }}>
                  <div className="pop-in" style={{ background: T.card, borderRadius: '20px 20px 0 0', padding: '6px 20px 32px', width: '100%' }}>
                    <div style={{ width: 36, height: 4, borderRadius: 100, background: T.sep, margin: '12px auto 20px' }} />
                    <div style={{ fontSize: 20, fontWeight: 800, color: T.text, marginBottom: 8 }}>Tem certeza?</div>
                    <div style={{ fontSize: 14, color: T.textSec, lineHeight: 1.55, marginBottom: 24 }}>
                      Todas as suas movimentações, orçamento e histórico serão apagados permanentemente. Essa ação não pode ser desfeita.
                    </div>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                      <button onClick={handleRecomecarDoZero} style={{
                        width: '100%', height: 54, borderRadius: T.r16, border: 'none',
                        background: T.red, color: '#fff', fontSize: 16, fontWeight: 800,
                        fontFamily: T.font, cursor: 'pointer',
                        boxShadow: '0 8px 20px rgba(216,36,50,0.28)',
                      }}>Sim, apagar tudo</button>
                      <button onClick={() => setShowConfirmRecomecar(false)} style={{
                        width: '100%', height: 44, borderRadius: T.r14, border: 'none',
                        background: 'none', cursor: 'pointer',
                        color: T.textSec, fontSize: 14, fontWeight: 600, fontFamily: T.font,
                      }}>Cancelar</button>
                    </div>
                  </div>
                </div>
              )}
            </>
          )}
        </div>
      </AndroidDevice>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
<div id="root"></div>
</body>
</html>
