// ─── Háptico + Sonoro ─────────────────────────────────────────────────────────
function haptic(type = 'light') {
  if (navigator.vibrate) {
    const map = { light: [8], medium: [25], success: [8, 40, 15], error: [35, 25, 35] };
    navigator.vibrate(map[type] || [8]);
  }
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    const now = ctx.currentTime;
    if (type === 'success') { o.frequency.value = 900; g.gain.setValueAtTime(0.07, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.15); }
    else if (type === 'error') { o.frequency.value = 200; g.gain.setValueAtTime(0.07, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.2); }
    else { o.frequency.value = 660; g.gain.setValueAtTime(0.04, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.08); }
    o.start(); o.stop(now + 0.25);
  } catch {}
}

// ─── Lógica central ───────────────────────────────────────────────────────────
function calcStats(state) {
  const hoje = new Date();
  const inicio = new Date(state.dataInicio);
  const hojeDate  = new Date(hoje.getFullYear(),  hoje.getMonth(),  hoje.getDate());
  const inicioDate = new Date(inicio.getFullYear(), inicio.getMonth(), inicio.getDate());
  const diaAtual = Math.max(1, Math.min(
    Math.floor((hojeDate - inicioDate) / 86400000) + 1,
    state.diasDoMes
  ));
  const diasRestantes    = state.diasDoMes - diaAtual;
  const valorDiarioBase  = state.valorMensal / state.diasDoMes;
  const totalGastos      = state.transacoes.filter(t => t.tipo === 'gasto').reduce((s, t) => s + t.valor, 0);
  const totalEntradas      = state.transacoes.filter(t => t.tipo === 'extra').reduce((s, t) => s + t.valor, 0);
  const saldoTotalRestante = state.valorMensal + totalEntradas - totalGastos;
  const disponivelHoje   = valorDiarioBase * diaAtual + totalEntradas - totalGastos;

  const mediaGastoPorDia = diaAtual > 0 ? totalGastos / diaAtual : 0;
  const projecaoFinal    = mediaGastoPorDia * state.diasDoMes;
  const projecaoDiff     = (state.valorMensal + totalEntradas) - projecaoFinal;

  return {
    diaAtual, diasRestantes, valorDiarioBase,
    totalGastos, totalEntradas, saldoTotalRestante,
    disponivelHoje, projecaoDiff, mediaGastoPorDia,
  };
}

function corSaldo(v, base) {
  if (v < 0) return { cor: T.red, bg: T.redLight };
  if (v < base * 0.25) return { cor: T.yellow, bg: T.yellowLight };
  return { cor: T.green, bg: T.greenLight };
}

function getStatusDiario(stats) {
  const base = stats.valorDiarioBase || 1;
  const margem = stats.disponivelHoje;

  if (margem < 0) {
    const diasParaRecuperar = Math.ceil(Math.abs(margem) / base);
    const diasStr = diasParaRecuperar === 1 ? '1 dia' : `${diasParaRecuperar} dias`;
    return {
      titulo: 'Hoje passou 😬',
      frase: `Para voltar ao plano, guarde o equivalente a ${diasStr} de margem diária.`,
      nivel: 'vermelho',
    };
  }

  if (margem < base * 0.25) {
    return {
      titulo: 'Hoje está apertado 👀',
      frase: 'Melhor pegar leve para não faltar depois.',
      nivel: 'amarelo',
    };
  }

  if (margem < base) {
    return {
      titulo: 'Você está no plano ✅',
      frase: 'Hoje está tudo certo.',
      nivel: 'verde',
    };
  }

  return {
    titulo: 'Você está com folga 🌿',
    frase: 'Pode gastar até esse valor hoje sem sair do plano.',
    nivel: 'verde',
  };
}

// ─── Teclado numérico reutilizável ────────────────────────────────────────────
function MoneyInput({ value, onChange, wrapperStyle = {}, valueStyle = {} }) {
  const [raw, setRaw] = React.useState(value ? String(Math.round(value * 100)) : '');

  const onChangeRef = React.useRef(onChange);
  React.useEffect(() => { onChangeRef.current = onChange; });

  React.useEffect(() => {
    onChangeRef.current(parseInt(raw || '0', 10) / 100);
  }, [raw]);

  function pressKey(k) {
    if (k === '⌫') { haptic('light'); setRaw(r => r.slice(0, -1)); return; }
    if (raw.length >= 7) return;
    haptic('light');
    setRaw(r => r + k);
  }

  const cents = parseInt(raw || '0', 10);
  const display = (cents / 100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  const pad = ['1','2','3','4','5','6','7','8','9','','0','⌫'];

  return (
    <div>
      {/* Valor display */}
      <div style={{ textAlign: 'center', padding: '18px 20px 14px', ...wrapperStyle }}>
        <div style={{
          fontSize: cents > 0 ? 46 : 40, fontWeight: 700,
          color: cents > 0 ? T.text : T.textTer,
          letterSpacing: -2, lineHeight: 1,
          transition: 'font-size 0.15s, color 0.2s',
          ...valueStyle,
        }}>{cents > 0 ? display : 'R$ 0,00'}</div>
      </div>
      {/* Pad */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 8, padding: '0 16px' }}>
        {pad.map((k, i) => (
          <button key={i} onClick={() => k && pressKey(k)} style={{
            height: 56, borderRadius: T.r14, border: 'none',
            background: k === '⌫' ? '#F1F5F9' : (k === '' ? 'transparent' : T.card),
            color: T.text, fontSize: k === '⌫' ? 20 : 23,
            fontWeight: k === '⌫' ? 500 : 600, fontFamily: T.font,
            cursor: k ? 'pointer' : 'default',
            boxShadow: (k && k !== '⌫') ? '0 2px 6px rgba(15,23,42,0.06)' : 'none',
            transition: 'background 0.1s',
          }}>{k}</button>
        ))}
      </div>
    </div>
  );
}

function TelaConfig({ onIniciar, saldoAnterior = 0 }) {
  const hoje = new Date();
  const totalDiasNoMes = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 0).getDate();
  const diasRestantesDefault = totalDiasNoMes - hoje.getDate() + 1;

  const [valor, setValor] = React.useState(0);
  const [inputText, setInputText] = React.useState('');
  const [isFocused, setIsFocused] = React.useState(false);
  const [dias, setDias] = React.useState(diasRestantesDefault);
  const inputRef = React.useRef(null);

  const temSaldoAnterior = saldoAnterior !== 0;
  const totalEfetivo = valor + saldoAnterior;
  const valorDiario = dias > 0 ? totalEfetivo / dias : 0;
  const podeIniciar = valor > 0 && dias > 0;

  function handleFocus() {
    setIsFocused(true);
    setInputText(valor > 0 ? (valor % 1 === 0 ? String(valor) : valor.toFixed(2).replace('.', ',')) : '');
  }
  function handleBlur() {
    setIsFocused(false);
    const raw = (inputRef.current?.value || '').replace(/\./g, '').replace(',', '.');
    setValor(parseFloat(raw) || 0);
  }
  function handleChange(e) { setInputText(e.target.value.replace(/[^0-9,.]/g, '')); }

  const displayValue = isFocused
    ? inputText
    : (valor > 0 ? valor.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '');


  const btnStep = {
    width: 46, height: 46, borderRadius: '50%',
    border: 'none', background: T.blueLight, color: T.blue,
    fontSize: 26, fontWeight: 300, lineHeight: 1,
    display: 'flex', alignItems: 'center', justifyContent: 'center',
    cursor: 'pointer', fontFamily: T.font, flexShrink: 0, userSelect: 'none',
  };

  const summaryRows = [
    { icon: <IcoWallet2 />,   label: 'Valor do mês',    value: fmt(totalEfetivo), blue: false },
    { icon: <IcoCalendar2 />, label: 'Dias planejados',  value: `${dias} dias`,    blue: false },
    { icon: <IcoClock2 />,    label: 'Dá por dia',       value: fmt(valorDiario),  blue: true  },
  ];

  return (
    <div style={{
      background: '#F0F4F8', minHeight: '100%', overflowY: 'auto', overflowX: 'hidden',
      padding: '20px 20px 36px', boxSizing: 'border-box', fontFamily: T.font,
    }} className="screen-enter">

      {/* Header */}
      <div style={{ textAlign: 'center', marginBottom: 20 }}>
        <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, background: T.blueLight, borderRadius: 99, padding: '4px 12px', marginBottom: 12 }}>
          <div style={{ width: 6, height: 6, borderRadius: '50%', background: T.blue }} />
          <span style={{ fontSize: 11, fontWeight: 700, color: T.blue, letterSpacing: 0.6, textTransform: 'uppercase' }}>Configuração</span>
        </div>
        <div style={{ fontSize: 26, fontWeight: 800, color: T.text, letterSpacing: -0.8, lineHeight: 1.2 }}>
          Defina seu valor do mês
        </div>
        <div style={{ fontSize: 14, color: T.textSec, lineHeight: 1.5, maxWidth: 270, margin: '8px auto 0' }}>
          Escolha quanto quer usar nos gastos do dia a dia.
        </div>
      </div>

      {/* Saldo anterior */}
      {temSaldoAnterior && (
        <div className="pop-in" style={{
          background: saldoAnterior > 0 ? '#ECFDF5' : '#FFF1F2',
          borderRadius: 14, padding: '10px 14px', marginBottom: 12,
          display: 'flex', alignItems: 'center', gap: 10,
        }}>
          <span style={{ fontSize: 18 }}>{saldoAnterior > 0 ? '🎉' : '⚠️'}</span>
          <div>
            <div style={{ fontSize: 11, fontWeight: 700, color: saldoAnterior > 0 ? T.green : T.red, textTransform: 'uppercase', letterSpacing: 0.4 }}>
              {saldoAnterior > 0 ? 'Saldo anterior' : 'Débito anterior'}
            </div>
            <div style={{ fontSize: 13, fontWeight: 700, color: saldoAnterior > 0 ? T.green : T.red }}>
              {saldoAnterior > 0 ? '+' : ''}{fmt(saldoAnterior)} será {saldoAnterior > 0 ? 'somado' : 'descontado'}
            </div>
          </div>
        </div>
      )}

      {/* Card educativo */}
      <div style={{
        background: '#F4F8FF', borderRadius: 20, padding: '16px 18px',
        boxShadow: '0 4px 16px rgba(47,111,237,0.08)', border: '1px solid rgba(47,111,237,0.14)',
        marginBottom: 12,
      }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: T.blue, marginBottom: 16, letterSpacing: 0.4, textTransform: 'uppercase' }}>Como chegar nesse valor</div>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6, flex: 1 }}>
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#2F6FED" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <rect x="1" y="7" width="22" height="14" rx="2"/><path d="M16 3H8L5 7h14L16 3z"/>
            </svg>
            <span style={{ fontSize: 10, color: '#475569', fontWeight: 600, textAlign: 'center', lineHeight: 1.3 }}>Entradas<br/>do mês</span>
          </div>
          <div style={{ fontSize: 18, color: '#94A3B8', fontWeight: 400, flexShrink: 0, lineHeight: 1 }}>−</div>
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6, flex: 1 }}>
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#2F6FED" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>
            </svg>
            <span style={{ fontSize: 10, color: '#475569', fontWeight: 600, textAlign: 'center', lineHeight: 1.3 }}>Investimentos</span>
          </div>
          <div style={{ fontSize: 18, color: '#94A3B8', fontWeight: 400, flexShrink: 0, lineHeight: 1 }}>−</div>
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6, flex: 1 }}>
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#2F6FED" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <span style={{ fontSize: 10, color: '#475569', fontWeight: 600, textAlign: 'center', lineHeight: 1.3 }}>Contas<br/>fixas</span>
          </div>
          <div style={{ fontSize: 18, color: '#94A3B8', fontWeight: 400, flexShrink: 0, lineHeight: 1 }}>=</div>
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6, flex: 1 }}>
            <div style={{ width: 42, height: 42, borderRadius: 12, background: '#DBEAFE', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2F6FED" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>
              </svg>
            </div>
            <span style={{ fontSize: 10, color: T.blue, fontWeight: 700, textAlign: 'center', lineHeight: 1.3 }}>Valor do mês</span>
          </div>
        </div>
      </div>

      {/* Card 1 — Valor */}
      <div style={{
        background: '#FFFFFF', borderRadius: 20, padding: '16px 18px',
        boxShadow: '0 8px 24px rgba(15,23,42,0.07)', border: '1px solid rgba(15,23,42,0.05)',
        marginBottom: 12,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 12 }}>
          <div style={{ width: 44, height: 44, borderRadius: 12, background: '#EFF6FF', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
            <IcoWallet2 />
          </div>
          <div>
            <div style={{ fontSize: 15, fontWeight: 700, color: T.text, lineHeight: 1.3 }}>Valor do mês</div>
            <div style={{ fontSize: 13, color: T.textSec, marginTop: 2, lineHeight: 1.3 }}>Informe o resultado dessa conta.</div>
          </div>
        </div>
        <div
          onClick={() => inputRef.current?.focus()}
          style={{
            border: `1.5px solid ${isFocused ? T.blue : '#E2E8F0'}`,
            borderRadius: 16, padding: '12px 16px',
            display: 'flex', alignItems: 'center',
            background: isFocused ? '#F0F6FF' : '#F8FAFC',
            boxShadow: isFocused ? '0 0 0 4px rgba(47,111,237,0.10)' : 'none',
            transition: 'border-color 0.15s, background 0.15s, box-shadow 0.18s',
            cursor: 'text',
          }}
        >
          <span style={{ fontSize: 20, fontWeight: 600, color: valor > 0 ? '#334155' : '#CBD5E1', marginRight: 8, flexShrink: 0 }}>R$</span>
          <input
            ref={inputRef}
            type="text"
            inputMode="decimal"
            autoComplete="off"
            value={displayValue}
            onChange={handleChange}
            onFocus={handleFocus}
            onBlur={handleBlur}
            onKeyDown={e => {
              if (e.key === 'Enter') {
                const raw = (inputRef.current?.value || '').replace(/\./g, '').replace(',', '.');
                const v = parseFloat(raw) || 0;
                if (v > 0 && dias > 0) {
                  haptic('success');
                  onIniciar({ valorMensal: v + saldoAnterior, diasDoMes: dias });
                } else {
                  inputRef.current?.blur();
                }
              }
            }}
            placeholder="0,00"
            style={{
              border: 'none', outline: 'none', flex: 1, minWidth: 0,
              fontSize: 36, fontWeight: 700,
              color: valor > 0 ? T.text : '#CBD5E1',
              fontFamily: T.font, background: 'transparent', letterSpacing: -1,
            }}
          />
        </div>
        {!isFocused && valor === 0 && (
          <div style={{ textAlign: 'center', fontSize: 11, color: T.textTer, marginTop: 8, letterSpacing: 0.2 }}>
            Toque no campo para digitar o valor
          </div>
        )}
      </div>

      {/* Card 2 — Dias */}
      <div style={{
        background: '#FFFFFF', borderRadius: 20, padding: '16px 18px',
        boxShadow: '0 8px 24px rgba(15,23,42,0.07)', border: '1px solid rgba(15,23,42,0.05)',
        marginBottom: 12,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 14 }}>
          <div style={{ width: 44, height: 44, borderRadius: 12, background: '#EFF6FF', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
            <IcoCalendar2 />
          </div>
          <div>
            <div style={{ fontSize: 15, fontWeight: 700, color: T.text, lineHeight: 1.3 }}>Por quantos dias quer dividir?</div>
            <div style={{ fontSize: 13, color: T.textSec, marginTop: 2, lineHeight: 1.3 }}>Use os dias restantes do mês ou ajuste como preferir.</div>
          </div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 28, marginBottom: 14 }}>
          <button style={btnStep} onClick={() => { haptic('light'); setDias(d => Math.max(1, d - 1)); }}>−</button>
          <div style={{ textAlign: 'center', minWidth: 80 }}>
            <div style={{ fontSize: 52, fontWeight: 800, color: '#0F172A', lineHeight: 1 }}>{dias}</div>
            <div style={{ fontSize: 12, fontWeight: 600, color: T.textSec, marginTop: 3, letterSpacing: 0.3 }}>dias</div>
          </div>
          <button style={btnStep} onClick={() => { haptic('light'); setDias(d => Math.min(60, d + 1)); }}>+</button>
        </div>
        <div style={{ background: T.blueLight, borderRadius: 12, padding: '10px 12px', display: 'flex', alignItems: 'center', gap: 10 }}>
          <IcoInfoCircle />
          <span style={{ fontSize: 13, color: T.blue, fontWeight: 500, lineHeight: 1.4 }}>
            Você pode mudar isso depois.
          </span>
        </div>
      </div>

      {/* Resumo */}
      <div style={{
        background: '#FFFFFF', borderRadius: 20, padding: '16px 18px',
        boxShadow: '0 8px 24px rgba(15,23,42,0.07)', border: '1px solid rgba(15,23,42,0.05)',
        marginBottom: 16,
      }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: T.textSec, marginBottom: 10, textTransform: 'uppercase', letterSpacing: 0.7 }}>Resumo do seu plano</div>
        {summaryRows.map((row, i, arr) => (
          <div key={row.label} style={{
            borderBottom: i < arr.length - 1 ? `1px solid #F1F5F9` : 'none',
            ...(row.blue ? { background: '#EEF4FF', borderRadius: 12, margin: '6px -6px 0', padding: '0 6px' } : {}),
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: row.blue ? '10px 0' : '9px 0' }}>
              <div style={{ width: 32, height: 32, borderRadius: 9, background: row.blue ? '#DBEAFE' : '#EFF6FF', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                {row.icon}
              </div>
              <span style={{ flex: 1, fontSize: 14, fontWeight: row.blue ? 600 : 500, color: row.blue ? T.blue : '#475569' }}>{row.label}</span>
              <span style={{ fontSize: row.blue ? 17 : 15, fontWeight: 800, color: row.blue ? T.blue : T.text }}>{row.value}</span>
            </div>
          </div>
        ))}
      </div>

      {/* CTA */}
      <button
        onClick={() => { if (podeIniciar) { haptic('success'); onIniciar({ valorMensal: totalEfetivo, diasDoMes: dias }); } }}
        style={{
          width: '100%', height: 60, borderRadius: 18, border: 'none',
          background: podeIniciar
            ? 'linear-gradient(135deg, #4284F5 0%, #2563EB 100%)'
            : '#F1F5F9',
          color: podeIniciar ? '#FFFFFF' : '#94A3B8',
          fontSize: 17, fontWeight: 700, fontFamily: T.font,
          boxShadow: podeIniciar ? '0 12px 28px rgba(47,111,237,0.32)' : 'none',
          cursor: podeIniciar ? 'pointer' : 'default',
          letterSpacing: 0.1,
          transition: 'background 0.2s, box-shadow 0.2s',
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
        }}
      >
        <span>Continuar</span>
        {podeIniciar && (
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        )}
      </button>
    </div>
  );
}

// ─── SpendingGauge — régua segmentada de status ──────────────────────────────
function SpendingGauge({ ratioMargem, flashColor }) {
  function mapClamped(value, inMin, inMax, outMin, outMax) {
    const clamped = Math.max(inMin, Math.min(inMax, value));
    return outMin + (clamped - inMin) / (inMax - inMin) * (outMax - outMin);
  }

  let pos;
  if (ratioMargem < 0) {
    pos = mapClamped(ratioMargem, -1, 0, 5, 24);
  } else if (ratioMargem < 0.25) {
    pos = mapClamped(ratioMargem, 0, 0.25, 26, 49);
  } else if (ratioMargem < 1) {
    pos = mapClamped(ratioMargem, 0.25, 1, 51, 74);
  } else {
    pos = mapClamped(ratioMargem, 1, 2, 76, 95);
  }

  const SEGS = [
    { label: 'Passou',    color: '#E35D6A' },
    { label: 'Apertado',  color: '#E8B63E' },
    { label: 'No plano',  color: '#2F6FED' },
    { label: 'Com folga', color: '#31A46C' },
  ];
  const si = ratioMargem < 0 ? 0 : ratioMargem < 0.25 ? 1 : ratioMargem < 1 ? 2 : 3;

  return (
    <div style={{ marginTop: 22 }}>
      {/* paddingTop/Bottom para o marcador 32px não ser clipado */}
      <div style={{ position: 'relative', paddingTop: 12, paddingBottom: 12 }}>
        <div style={{ display: 'flex', height: 14, borderRadius: 999, overflow: 'hidden' }}>
          {SEGS.map((seg, i) => (
            <div key={i} style={{ flex: 1, height: '100%', background: seg.color }} />
          ))}
        </div>
        <div style={{
          position: 'absolute',
          left: `${pos}%`,
          top: '50%', transform: 'translate(-50%, -50%)',
          width: 32, height: 32, borderRadius: '50%',
          background: '#FFFFFF',
          border: `4px solid ${SEGS[si].color}`,
          boxShadow: flashColor
            ? `0 4px 14px rgba(15,23,42,0.22), 0 0 0 6px ${flashColor}44`
            : '0 4px 14px rgba(15,23,42,0.22)',
          transition: 'left 0.5s cubic-bezier(.2,.8,.3,1), box-shadow 0.4s cubic-bezier(.2,.8,.3,1)',
          zIndex: 2,
        }} />
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', marginTop: 6 }}>
        {SEGS.map((seg, i) => (
          <div key={i} style={{ textAlign: 'center' }}>
            <span style={{
              fontSize: i === si ? 11 : 10,
              fontWeight: i === si ? 800 : 600,
              color: seg.color,
              letterSpacing: 0.1,
            }}>{seg.label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── WeeklyMiniChart — gráfico da semana atual (Seg–Dom) ─────────────────────
function WeeklyMiniChart({ transacoes, valorDiarioBase, onAnalise, showLegend = true }) {
  const BAR_H = 62;
  const [activeBar, setActiveBar] = React.useState(null);
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const dow = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));

  const dias = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    const label = d.toLocaleDateString('pt-BR', { weekday: 'short' }).replace('.', '');
    const capitalized = label.charAt(0).toUpperCase() + label.slice(1, 3);
    return {
      key: fmtDate(d.toISOString()),
      label: capitalized,
      isToday: d.getTime() === today.getTime(),
      isFuture: d.getTime() > today.getTime(),
    };
  });

  const porDia = {};
  transacoes.filter(t => t.tipo === 'gasto').forEach(t => {
    const k = fmtDate(t.data);
    porDia[k] = (porDia[k] || 0) + t.valor;
  });

  const values = dias.map(d => porDia[d.key] || 0);
  const maxVal = Math.max(...values, valorDiarioBase, 1);
  const refLineTop = Math.round(BAR_H * (1 - Math.min(valorDiarioBase / maxVal, 1)));

  return (
    <div style={{ marginTop: 20 }}>
      <div style={{
        background: '#FFFFFF', borderRadius: 28, padding: 24,
        boxShadow: '0 8px 24px rgba(15,23,42,0.07)',
        border: '1px solid rgba(15,23,42,0.05)',
        minHeight: 220,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <div style={{ fontSize: 21, fontWeight: 800, color: T.text }}>Esta semana</div>
          {onAnalise && (
            <button onClick={onAnalise} style={{
              background: 'none', border: 'none', cursor: 'pointer', padding: '4px 0',
              fontSize: 13, fontWeight: 700, color: T.blue, fontFamily: T.font,
            }}>Ver análise →</button>
          )}
        </div>
        <div style={{ fontSize: 15, fontWeight: 500, color: T.textSec, marginTop: 4 }}>Seu ritmo de gastos nos últimos dias</div>
        <div style={{ height: 96, marginTop: 14, position: 'relative', padding: '0 2px' }}>
          <div style={{
            position: 'absolute', left: 0, right: 0, top: refLineTop,
            borderTop: `1px dashed ${T.blue}59`,
            pointerEvents: 'none', zIndex: 1,
          }} />
          <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', height: BAR_H, paddingTop: 8 }}>
            {dias.map((d, i) => {
              const val = values[i];
              const isActive = activeBar === i;
              const h = d.isFuture ? 6 : Math.max((val / maxVal) * BAR_H, val > 0 ? 12 : 6);
              const barBg = d.isToday ? T.blue : d.isFuture ? 'transparent' : val === 0 ? '#CBD5E1' : T.green;
              return (
                <div key={i} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 0, position: 'relative' }}>
                  {/* Valor ao tocar */}
                  {isActive && !d.isFuture && (
                    <div style={{
                      position: 'absolute', bottom: h + 8,
                      background: '#1E293B', color: '#fff', fontSize: 10, fontWeight: 700,
                      borderRadius: 6, padding: '3px 6px', whiteSpace: 'nowrap', zIndex: 10,
                    }}>
                      {val === 0 ? 'R$ 0' : fmt(val)}
                    </div>
                  )}
                  <div
                    onClick={() => setActiveBar(isActive ? null : i)}
                    style={{
                      width: 28, height: Math.max(h, 6), minHeight: 6, borderRadius: d.isFuture ? 4 : 8,
                      background: barBg,
                      border: d.isFuture ? `1.5px dashed #CBD5E1` : 'none',
                      boxShadow: d.isToday ? '0 4px 12px rgba(47,111,237,0.28)' : isActive ? '0 0 0 2px rgba(47,111,237,0.4)' : 'none',
                      transition: 'height 0.4s ease',
                      cursor: d.isFuture ? 'default' : 'pointer',
                    }}
                  />
                </div>
              );
            })}
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 8, padding: '0 2px' }}>
            {dias.map((d, i) => (
              <div key={i} style={{ width: 28, textAlign: 'center' }}>
                <span style={{ fontSize: 12, fontWeight: d.isToday ? 800 : 700, color: d.isToday ? T.blue : '#94A3B8' }}>
                  {d.label}
                </span>
              </div>
            ))}
          </div>
          {showLegend && (
          <div style={{ display: 'flex', gap: 12, marginTop: 10 }}>
            {[{bg: T.blue, label: 'Hoje'}, {bg: T.green, label: 'Passado'}, {bg: 'transparent', border: '1.5px dashed #CBD5E1', label: 'Futuro'}].map(x => (
              <div key={x.label} style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                <div style={{ width: 8, height: 8, borderRadius: 2, background: x.bg, border: x.border }} />
                <span style={{ fontSize: 9, color: T.textTer }}>{x.label}</span>
              </div>
            ))}
          </div>
          )}
        </div>
      </div>
    </div>
  );
}

// TELA 2 — Painel principal  (v4 — hierarquia reestruturada)
// ═══════════════════════════════════════════════════════════════
function TelaPainel({ state, flashId, flashType, onRegistrarGasto, onAdicionarExtra, onHistorico, onOpenMenu, onAnalise, onEditar }) {
  const stats = calcStats(state);
  const hoje = new Date();
  const dataHoje = hoje.toLocaleDateString('pt-BR', { weekday: 'short', day: 'numeric', month: 'long', year: 'numeric' });
  const dataHojeDisplay = (dataHoje.charAt(0).toUpperCase() + dataHoje.slice(1)).replace('.,', ',').replace(/\.(\s|$)/, '$1');

  const margemAteHoje = stats.disponivelHoje;
  const ratioMargem = stats.valorDiarioBase > 0 ? margemAteHoje / stats.valorDiarioBase : 0;
  const orcamentoUsadoPct = state.valorMensal > 0 ? (stats.totalGastos / (state.valorMensal + stats.totalEntradas)) * 100 : 0;
  const status = getStatusDiario(stats);
  const isPositive = margemAteHoje >= 0;

  const cardBg    = isPositive ? T.greenLight : T.redLight;
  const cardBorder = isPositive ? `1px solid rgba(49,164,108,0.14)` : `1px solid rgba(227,93,106,0.14)`;
  const cardColor  = isPositive ? T.green : T.red;
  const cardSub    = isPositive ? '#3D8A60' : '#9B4A55';
  const statusLabel = ratioMargem < 0 ? 'Passou' : ratioMargem < 0.25 ? 'Apertado' : ratioMargem < 1 ? 'No plano' : 'Com folga';
  const statusColor = ratioMargem < 0 ? T.red : ratioMargem < 0.25 ? T.yellow : ratioMargem < 1 ? T.blue : T.green;


  const pct          = Math.min(orcamentoUsadoPct, 100);
  const restantePct  = Math.max(0, 100 - pct);
  const donutColor   = restantePct > 40 ? T.green : restantePct > 15 ? T.yellow : T.red;
  const mainNumColor = ratioMargem < 0 ? T.red : ratioMargem < 0.25 ? T.yellow : '#0F172A';
  const flashColor   = flashType === 'gasto' ? T.red : flashType === 'extra' ? T.green : null;
  const hojeKey = fmtDate(new Date().toISOString());
  const gastosHoje = state.transacoes.filter(t => t.tipo === 'gasto' && fmtDate(t.data) === hojeKey).reduce((s, t) => s + t.valor, 0);

  return (
    <div style={{ background: T.bg, minHeight: '100%', overflowY: 'auto', overflowX: 'hidden', padding: '24px 24px 40px' }}>

      {/* ── Header ───────────────────────────────────────────── */}
      <div style={{ paddingBottom: 20, borderBottom: '1px solid rgba(15,23,42,0.07)' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <img src="assets/brand/hoje-da-icon.svg" width="28" height="28" alt="" style={{ borderRadius: 7, flexShrink: 0 }} />
            <span style={{ fontSize: 26, fontWeight: 800, color: T.text, letterSpacing: -0.5 }}>Hoje Dá</span>
          </div>
          <button onClick={onOpenMenu} style={{
            width: 38, height: 38, borderRadius: 12, cursor: 'pointer',
            background: T.card, border: T.border,
            boxShadow: '0 2px 6px rgba(15,23,42,0.05)',
            display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
          }}>
            <IcoGear c="#64748B" s={18} />
          </button>
        </div>
        <div style={{ fontSize: 12, color: T.textTer, marginTop: 3, marginBottom: 2 }}>
          Seu dinheiro, seu dia, tudo sob controle.
        </div>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: 4 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <IcoCalHdr />
            <span style={{ fontSize: 13, fontWeight: 500, color: T.textSec }}>{dataHojeDisplay}</span>
          </div>
          <span style={{ fontSize: 12, fontWeight: 700, color: T.textTer, background: T.bgAlt, borderRadius: 99, padding: '3px 10px' }}>
            Dia {stats.diaAtual} de {state.diasDoMes}
          </span>
        </div>
      </div>

      {/* ── Banner ciclo expirado ─────────────────────────────── */}
      {stats.diasRestantes === 0 && (
        <div style={{
          margin: '16px 0 0', borderRadius: 16, padding: '12px 16px',
          background: T.yellowLight, border: `1px solid ${T.yellow}44`,
          display: 'flex', alignItems: 'center', gap: 10,
        }}>
          <span style={{ fontSize: 20, flexShrink: 0 }}>🔔</span>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13, fontWeight: 800, color: '#7A5A00' }}>Seu ciclo encerrou!</div>
            <div style={{ fontSize: 12, color: '#7A5A00', opacity: 0.8, marginTop: 1 }}>
              Vá em ··· → Novo mês para iniciar o próximo ciclo.
            </div>
          </div>
        </div>
      )}

      {/* ── Card principal ───────────────────────────────────── */}
      <div style={{
        marginTop: 24, borderRadius: 30, padding: 28,
        background: '#FFFFFF',
        boxShadow: flashColor
          ? `0 10px 32px rgba(15,23,42,0.09), 0 0 0 3px ${flashColor}55, 0 0 22px ${flashColor}30`
          : '0 10px 32px rgba(15,23,42,0.09)',
        border: '1px solid rgba(15,23,42,0.05)',
        transition: 'box-shadow 0.4s cubic-bezier(.2,.8,.3,1)',
      }}>
        <div style={{ marginBottom: 10 }}>
          <span style={{
            display: 'inline-flex', alignItems: 'center', gap: 5,
            background: `${statusColor}1A`,
            border: `1px solid ${statusColor}38`,
            borderRadius: 999, paddingLeft: 9, paddingRight: 11, paddingTop: 4, paddingBottom: 4,
          }}>
            <div style={{ width: 6, height: 6, borderRadius: '50%', background: statusColor, flexShrink: 0 }} />
            <span style={{ fontSize: 11, fontWeight: 800, color: statusColor }}>
              {statusLabel}
            </span>
          </span>
        </div>
        <div style={{ fontSize: 11, fontWeight: 600, color: T.textTer, textTransform: 'uppercase', letterSpacing: 1.5, marginBottom: 10 }}>
          {isPositive ? 'Você ainda pode gastar' : 'Você passou do plano'}
        </div>
        <div key={flashId} className={flashType ? 'num-pop' : undefined} style={{ fontSize: 48, fontWeight: 800, color: mainNumColor, lineHeight: '54px', letterSpacing: -1.5, marginBottom: 14, transition: 'color 0.3s' }}>
          {fmt(margemAteHoje)}
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 7, marginBottom: 6 }}>
          {ratioMargem >= 1 ? <IcoStatusOk c={statusColor} /> : ratioMargem >= 0.25 ? <IcoStatusOnTrack c={statusColor} /> : <IcoStatusWarn c={statusColor} />}
          <span style={{ fontSize: 20, fontWeight: 700, color: statusColor, lineHeight: 1.2 }}>{status.titulo}</span>
        </div>
        <div style={{ fontSize: 14, fontWeight: 400, color: '#667085', lineHeight: '20px', maxWidth: '92%', marginBottom: 4 }}>
          {status.frase}
        </div>
        <SpendingGauge ratioMargem={ratioMargem} flashColor={flashColor} />
        <div style={{ marginTop: 20, marginBottom: 20, height: 1, background: 'rgba(15,23,42,0.08)' }} />
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <div>
            <div style={{ fontSize: 11, fontWeight: 700, color: '#94A3B8', textTransform: 'uppercase', letterSpacing: 1.2 }}>Por dia dá:</div>
            <div style={{ fontSize: 24, fontWeight: 800, color: '#0F172A', letterSpacing: -0.5, marginTop: 2 }}>{fmt(stats.valorDiarioBase)}</div>
          </div>
          <div style={{ textAlign: 'right' }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: '#94A3B8', textTransform: 'uppercase', letterSpacing: 1.2 }}>Gastei hoje</div>
            <div style={{ fontSize: 22, fontWeight: 800, color: gastosHoje > 0 ? T.red : T.textTer, letterSpacing: -0.5, marginTop: 2 }}>{fmt(gastosHoje)}</div>
          </div>
        </div>
      </div>

      {/* ── Botões de ação ───────────────────────────────────── */}
      <div style={{ marginTop: 20, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
        <button onClick={onRegistrarGasto} style={{
          height: 76, borderRadius: 20, border: 'none', cursor: 'pointer',
          background: T.red,
          color: '#fff', fontSize: 19, fontWeight: 800, fontFamily: T.font,
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 9,
          boxShadow: `0 8px 20px rgba(227,93,106,0.30)`,
        }}>
          <IcoMinus s={22} /> Gastei
        </button>
        <button onClick={onAdicionarExtra} style={{
          height: 76, borderRadius: 20, border: 'none', cursor: 'pointer',
          background: T.green,
          color: '#fff', fontSize: 19, fontWeight: 800, fontFamily: T.font,
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
          boxShadow: `0 8px 20px rgba(49,164,108,0.28)`,
        }}>
          <IcoPlus s={20} />
          <div style={{ textAlign: 'center', lineHeight: '1.2' }}>Entrou<br/>dinheiro</div>
        </button>
      </div>

      {/* ── Esta semana ──────────────────────────────────────── */}
      <WeeklyMiniChart transacoes={state.transacoes} valorDiarioBase={stats.valorDiarioBase} onAnalise={onAnalise} showLegend={false} />

      {/* ── Métricas rápidas ─────────────────────────────────── */}
      <div style={{ marginTop: 12, display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8 }}>
        <div style={{
          background: '#FFFFFF', borderRadius: 20, padding: '14px 10px',
          boxShadow: '0 6px 20px rgba(15,23,42,0.07)', border: '1px solid rgba(15,23,42,0.05)',
        }}>
          <div style={{ fontSize: 10, fontWeight: 600, color: T.textSec, marginBottom: 5, textTransform: 'uppercase', letterSpacing: 0.3 }}>Gasto acum.</div>
          <div style={{ fontSize: 17, fontWeight: 800, color: T.red, letterSpacing: -0.5, lineHeight: 1 }}>{fmt(stats.totalGastos)}</div>
          <div style={{ fontSize: 10, color: T.textTer, marginTop: 5 }}>em {stats.diaAtual}/{state.diasDoMes} dias</div>
        </div>
        <div style={{
          background: stats.projecaoDiff >= 0 ? T.greenLight : T.redLight,
          borderRadius: 20, padding: '14px 10px',
          boxShadow: '0 6px 20px rgba(15,23,42,0.07)',
          border: `1px solid ${stats.projecaoDiff >= 0 ? 'rgba(49,164,108,0.14)' : 'rgba(227,93,106,0.14)'}`,
        }}>
          <div style={{ fontSize: 10, fontWeight: 600, color: T.textSec, marginBottom: 5, textTransform: 'uppercase', letterSpacing: 0.3 }}>Projeção</div>
          <div style={{ fontSize: 17, fontWeight: 800, letterSpacing: -0.5, lineHeight: 1, color: stats.projecaoDiff >= 0 ? T.green : T.red }}>
            {stats.projecaoDiff >= 0 ? '+' : ''}{fmt(stats.projecaoDiff)}
          </div>
          <div style={{ fontSize: 10, marginTop: 5, color: stats.projecaoDiff >= 0 ? '#3D8A60' : '#9B4A55' }}>
            {stats.projecaoDiff >= 0 ? 'sobra prevista' : 'déficit previsto'}
          </div>
        </div>
        <div style={{
          background: '#FFFFFF', borderRadius: 20, padding: '14px 10px',
          boxShadow: '0 6px 20px rgba(15,23,42,0.07)', border: '1px solid rgba(15,23,42,0.05)',
          display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
        }}>
          <div style={{ position: 'relative', width: 50, height: 50 }}>
            <svg width="50" height="50" viewBox="0 0 60 60">
              <circle cx="30" cy="30" r="24" fill="none" stroke={T.sep} strokeWidth="6" />
              <circle cx="30" cy="30" r="24" fill="none" stroke={donutColor} strokeWidth="6"
                strokeDasharray={`${(restantePct / 100) * 2 * Math.PI * 24} ${2 * Math.PI * 24}`}
                strokeDashoffset="0" strokeLinecap="round" transform="rotate(-90 30 30)"
                style={{ transition: 'stroke 0.4s ease' }} />
            </svg>
            <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <span style={{ fontSize: 11, fontWeight: 800, color: donutColor, lineHeight: 1 }}>{Math.round(restantePct)}%</span>
            </div>
          </div>
          <span style={{ fontSize: 10, fontWeight: 700, color: T.textTer, textTransform: 'uppercase', letterSpacing: 0.3, lineHeight: 1, marginTop: 5 }}>restante</span>
        </div>
      </div>

      {/* ── Últimas movimentações ────────────────────────────── */}
      {state.transacoes.length > 0 && (
        <div style={{ marginTop: 20 }}>
          <div style={{ background: '#FFFFFF', borderRadius: 28, overflow: 'hidden', boxShadow: '0 8px 24px rgba(15,23,42,0.07)', border: '1px solid rgba(15,23,42,0.05)' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '24px 24px 16px' }}>
              <span style={{ fontSize: 21, fontWeight: 800, color: T.text }}>Últimos movimentos</span>
              <button onClick={onHistorico} style={{
                background: 'none', border: 'none', cursor: 'pointer',
                fontSize: 15, color: T.blue, fontWeight: 700, fontFamily: T.font,
              }}>
                Ver tudo
              </button>
            </div>
            <div style={{ paddingBottom: 8 }}>
              {state.transacoes.slice(0, 3).map((t, i) => {
                const isGasto = t.tipo === 'gasto';
                const cat = isGasto ? getCat(t.categoria) : (t.categoria ? getIncomeCat(t.categoria) : null);
                const isToday = fmtDate(t.data) === fmtDate(new Date().toISOString());
                const dateLabel = isToday ? `Hoje, ${fmtTime(t.data)}` : fmtDate(t.data);
                return (
                  <div key={t.id}>
                    {i > 0 && <div style={{ height: 1, background: 'rgba(60,60,67,0.06)', marginLeft: 80 }} />}
                    <button onClick={() => onEditar && onEditar(t)} style={{
                      display: 'flex', alignItems: 'center', gap: 14, padding: '14px 24px',
                      width: '100%', background: 'none', border: 'none', cursor: 'pointer', fontFamily: T.font,
                      textAlign: 'left',
                    }}>
                      <div style={{
                        width: 46, height: 46, borderRadius: 14, flexShrink: 0,
                        background: isGasto ? '#FFF0F1' : '#ECFDF5',
                        display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22,
                      }}>{cat ? cat.emoji : '💚'}</div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 15, fontWeight: 600, color: '#0F172A', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                          {t.descricao || (cat ? cat.label : 'Recebimento')}
                        </div>
                        <div style={{ fontSize: 13, color: '#94A3B8', marginTop: 2 }}>
                          {cat ? cat.label : 'Entrada'} · {dateLabel}
                        </div>
                      </div>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 5, flexShrink: 0 }}>
                        <span style={{ fontSize: 15, fontWeight: 700, color: isGasto ? T.red : T.green }}>
                          {isGasto ? '−' : '+'}{fmt(t.valor)}
                        </span>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#94A3B8" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                      </div>
                    </button>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// TELA 3/4 — Registrar gasto / Adicionar extra (+ Editar)
// ═══════════════════════════════════════════════════════════════
function TelaEntrada({ tipo, onSalvar, onVoltar, initialData = null }) {
  const isGasto = tipo === 'gasto';
  const isEdit  = !!initialData;
  const [valor, setValor]       = React.useState(initialData ? initialData.valor : 0);
  const [desc, setDesc]         = React.useState(initialData ? (initialData.descricao || '') : '');
  const [categoria, setCategoria] = React.useState(
    isGasto
      ? (initialData?.categoria || localStorage.getItem(SK_LAST_CAT) || 'alimentacao')
      : 'alimentacao'
  );
  const [incomeCategoria, setIncomeCategoria] = React.useState(
    !isGasto ? (initialData?.categoria || 'salario') : 'salario'
  );
  const [saved, setSaved]       = React.useState(false);
  const todayStr = new Date().toISOString().split('T')[0];
  const [dataLancamento, setDataLancamento] = React.useState(
    initialData?.data ? initialData.data.split('T')[0] : todayStr
  );
  const isRetroativo = dataLancamento !== todayStr;
  const cor  = isGasto ? T.red   : T.green;
  const bgCor = isGasto ? T.redLight : T.greenLight;

  function salvar() {
    if (!valor || valor <= 0) return;
    haptic('success');
    if (isGasto) localStorage.setItem(SK_LAST_CAT, categoria);
    onSalvar({ valor, descricao: desc.trim(), categoria: isGasto ? categoria : incomeCategoria, dataLancamento });
    setSaved(true);
    setTimeout(() => { setSaved(false); onVoltar(tipo); }, 700);
  }

  const selectedCat = getCat(categoria);
  const selectedIncomeCat = getIncomeCat(incomeCategoria);

  return (
    <div style={{ background: T.bg, minHeight: '100%', display: 'flex', flexDirection: 'column' }} className="screen-enter">
      <ScreenHeader
        title={isEdit ? 'Editar lançamento' : (isGasto ? 'Quanto você gastou? 💸' : 'Quanto entrou? 💰')}
        onBack={onVoltar}
      />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column' }}>

        {/* Badge tipo */}
        <div style={{ textAlign: 'center', padding: '12px 0 4px' }}>
          <span style={{ background: bgCor, color: cor, fontSize: 13, fontWeight: 700, padding: '6px 18px', borderRadius: 100 }}>
            {isGasto ? `${selectedCat.emoji} ${selectedCat.label}` : `${selectedIncomeCat.emoji} ${selectedIncomeCat.label}`}
          </span>
        </div>

        {/* Teclado */}
        <MoneyInput value={valor} onChange={setValor} />

        {/* Categorias de renda — só entradas */}
        {!isGasto && (
          <div style={{ padding: '8px 16px 0' }}>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 7 }}>
              {INCOME_CATS.map(c => {
                const sel = incomeCategoria === c.id;
                return (
                  <button key={c.id} onClick={() => { setIncomeCategoria(c.id); haptic('light'); }} style={{
                    height: 56, borderRadius: T.r14, border: `1.5px solid ${sel ? c.cor : 'rgba(15,23,42,0.06)'}`,
                    background: sel ? `${c.cor}15` : T.card,
                    display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 3,
                    cursor: 'pointer', transition: 'all 0.15s',
                    boxShadow: sel ? `0 4px 12px ${c.cor}28` : 'none',
                  }}>
                    <span style={{ fontSize: 19 }}>{c.emoji}</span>
                    <span style={{ fontSize: 9, fontWeight: sel ? 700 : 500, color: sel ? c.cor : T.textTer, fontFamily: T.font, lineHeight: 1 }}>
                      {c.label}
                    </span>
                  </button>
                );
              })}
            </div>
          </div>
        )}

        {/* Categorias — só gastos */}
        {isGasto && (
          <div style={{ padding: '8px 16px 0' }}>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 7 }}>
              {CATS.map(c => {
                const sel = categoria === c.id;
                return (
                  <button key={c.id} onClick={() => { setCategoria(c.id); haptic('light'); }} style={{
                    height: 56, borderRadius: T.r14, border: `1.5px solid ${sel ? c.cor : 'rgba(15,23,42,0.06)'}`,
                    background: sel ? `${c.cor}15` : T.card,
                    display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 3,
                    cursor: 'pointer', transition: 'all 0.15s',
                    boxShadow: sel ? `0 4px 12px ${c.cor}28` : 'none',
                  }}>
                    <span style={{ fontSize: 19 }}>{c.emoji}</span>
                    <span style={{ fontSize: 9, fontWeight: sel ? 700 : 500, color: sel ? c.cor : T.textTer, fontFamily: T.font, lineHeight: 1 }}>
                      {c.label.length > 8 ? c.label.slice(0,7)+'…' : c.label}
                    </span>
                  </button>
                );
              })}
            </div>
          </div>
        )}

        {/* Descrição */}
        <div style={{ padding: '10px 16px 0' }}>
          <div style={{ background: T.card, borderRadius: T.r14, padding: '0 16px', display: 'flex', alignItems: 'center', gap: 10, border: '1px solid rgba(15,23,42,0.06)' }}>
            <span style={{ fontSize: 16, flexShrink: 0 }}>{isGasto ? '📝' : '💬'}</span>
            <input
              value={desc}
              onChange={e => setDesc(e.target.value)}
              placeholder={isGasto ? 'Adicione uma descrição...' : 'De onde veio esse dinheiro?'}
              maxLength={40}
              style={{
                flex: 1, background: 'none', border: 'none', outline: 'none',
                fontSize: 14, color: T.text, fontFamily: T.font, fontWeight: 500, padding: '15px 0',
              }}
            />
          </div>
        </div>

        {/* Data do lançamento */}
        <div style={{ padding: '8px 16px 0' }}>
          <div style={{
            background: T.card, borderRadius: T.r14, padding: '0 16px',
            display: 'flex', alignItems: 'center', gap: 10,
            border: `1px solid ${isRetroativo ? T.blue : 'rgba(15,23,42,0.06)'}`,
            transition: 'border-color 0.2s',
          }}>
            <span style={{ fontSize: 16, flexShrink: 0 }}>📅</span>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 10, color: T.textTer, fontWeight: 600, paddingTop: 9, textTransform: 'uppercase', letterSpacing: 0.5 }}>
                Data do lançamento
              </div>
              <input
                type="date"
                value={dataLancamento}
                max={todayStr}
                onChange={e => setDataLancamento(e.target.value)}
                style={{
                  border: 'none', outline: 'none', fontSize: 14, color: T.text,
                  fontFamily: T.font, fontWeight: 500, paddingBottom: 10,
                  background: 'transparent', width: '100%',
                }}
              />
            </div>
            {isRetroativo && (
              <span style={{ fontSize: 11, color: T.blue, fontWeight: 700, flexShrink: 0, background: T.blueLight, padding: '3px 8px', borderRadius: 8 }}>
                Retroativo
              </span>
            )}
          </div>
        </div>

        <div style={{ flex: 1 }} />

        {/* Botão confirmar */}
        <div style={{ padding: '16px' }}>
          <button onClick={salvar} disabled={!valor || valor <= 0} style={{
            width: '100%', height: 60, borderRadius: 18, border: 'none',
            cursor: valor > 0 ? 'pointer' : 'default',
            background: saved ? T.green : ((!valor || valor <= 0) ? '#E2ECFF' : cor),
            color: (!valor || valor <= 0) ? '#93C5FD' : '#fff',
            fontSize: 17, fontWeight: 800, fontFamily: T.font,
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
            boxShadow: (valor > 0 && !saved) ? `0 8px 20px ${cor}44` : 'none',
            transition: 'all 0.22s',
            opacity: (!valor || valor <= 0) ? 0.6 : 1,
          }}>
            {saved ? <><IcoCheck /> Pronto, anotado ✅</> : (isEdit ? 'Salvar alteração' : 'Confirmar')}
          </button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// TELA 5 — Histórico
// ═══════════════════════════════════════════════════════════════
function TelaHistorico({ transacoes, onExcluir, onEditar, onVoltar }) {
  const [expandido, setExpandido] = React.useState(null);
  const [busca, setBusca] = React.useState('');
  const [confirmandoId, setConfirmandoId] = React.useState(null);

  const query = busca.trim().toLowerCase();
  const transacoesFiltradas = query
    ? transacoes.filter(t => {
        const cat = t.tipo === 'gasto' ? getCat(t.categoria) : (t.categoria ? getIncomeCat(t.categoria) : null);
        const desc = (t.descricao || '').toLowerCase();
        const catLabel = (cat?.label || '').toLowerCase();
        return desc.includes(query) || catLabel.includes(query);
      })
    : transacoes;

  const grupos = {};
  [...transacoesFiltradas].reverse().forEach(t => {
    const d = fmtDate(t.data);
    if (!grupos[d]) grupos[d] = [];
    grupos[d].push(t);
  });

  const totalGastos = transacoes.filter(t => t.tipo === 'gasto').reduce((s, t) => s + t.valor, 0);
  const totalEntradas = transacoes.filter(t => t.tipo === 'extra').reduce((s, t) => s + t.valor, 0);

  return (
    <div style={{ background: T.bg, minHeight: '100%', paddingBottom: 28 }} className="screen-enter">
      <ScreenHeader title="Movimentos" onBack={onVoltar} />

      {/* Totais */}
      {transacoes.length > 0 && (
        <div style={{ display: 'flex', gap: 10, padding: '14px 16px 0' }}>
          <div style={{ flex: 1, background: T.redLight, borderRadius: T.r14, padding: '12px 14px' }}>
            <div style={{ fontSize: 11, color: T.red, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 3 }}>Gasto total</div>
            <div style={{ fontSize: 17, fontWeight: 800, color: T.red }}>{fmt(totalGastos)}</div>
          </div>
          <div style={{ flex: 1, background: T.greenLight, borderRadius: T.r14, padding: '12px 14px' }}>
            <div style={{ fontSize: 11, color: T.green, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 3 }}>Entradas</div>
            <div style={{ fontSize: 17, fontWeight: 800, color: T.green }}>{fmt(totalEntradas)}</div>
          </div>
        </div>
      )}

      {/* Campo de busca */}
      {transacoes.length > 0 && (
        <div style={{ padding: '12px 16px 0' }}>
          <div style={{
            background: T.card, borderRadius: T.r14, padding: '0 14px',
            display: 'flex', alignItems: 'center', gap: 10,
            border: `1px solid ${busca ? T.blue : 'rgba(15,23,42,0.07)'}`,
            transition: 'border-color 0.15s',
          }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <circle cx="11" cy="11" r="7" stroke={busca ? T.blue : T.textTer} strokeWidth="2"/>
              <path d="M16.5 16.5l4 4" stroke={busca ? T.blue : T.textTer} strokeWidth="2" strokeLinecap="round"/>
            </svg>
            <input
              value={busca}
              onChange={e => { setBusca(e.target.value); setExpandido(null); }}
              placeholder="Buscar por descrição ou categoria..."
              style={{
                flex: 1, background: 'none', border: 'none', outline: 'none',
                fontSize: 14, color: T.text, fontFamily: T.font, fontWeight: 500, padding: '13px 0',
              }}
            />
            {busca && (
              <button onClick={() => setBusca('')} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 0, display: 'flex' }}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <circle cx="12" cy="12" r="9" fill={T.sep}/>
                  <path d="M9 9l6 6M15 9l-6 6" stroke={T.textTer} strokeWidth="2" strokeLinecap="round"/>
                </svg>
              </button>
            )}
          </div>
        </div>
      )}

      {transacoes.length === 0 && (
        <div style={{ textAlign: 'center', padding: '72px 24px 32px' }}>
          <div style={{ fontSize: 48, marginBottom: 16 }}>📭</div>
          <div style={{ fontSize: 17, fontWeight: 800, color: T.text, marginBottom: 6 }}>Nenhum movimento ainda</div>
          <div style={{ fontSize: 14, color: T.textSec, lineHeight: 1.5 }}>Use os botões na tela principal<br/>para registrar gastos ou entradas.</div>
        </div>
      )}

      {transacoes.length > 0 && transacoesFiltradas.length === 0 && (
        <div style={{ textAlign: 'center', padding: '48px 24px 32px' }}>
          <div style={{ fontSize: 36, marginBottom: 12 }}>🔍</div>
          <div style={{ fontSize: 15, fontWeight: 700, color: T.text, marginBottom: 4 }}>Nada encontrado</div>
          <div style={{ fontSize: 13, color: T.textSec }}>Tente outra descrição ou categoria.</div>
        </div>
      )}

      {Object.entries(grupos).map(([data, items]) => (
        <div key={data} style={{ padding: '14px 16px 0' }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: T.textTer, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 8 }}>{data}</div>
          <Card>
            {items.map((t, i) => {
              const isGasto = t.tipo === 'gasto';
              const cat = isGasto ? getCat(t.categoria) : (t.categoria ? getIncomeCat(t.categoria) : null);
              const aberto = expandido === t.id;
              return (
                <div key={t.id}>
                  {i > 0 && <Divider left={66} />}
                  <div
                    onClick={() => { haptic('light'); setExpandido(p => p === t.id ? null : t.id); setConfirmandoId(null); }}
                    style={{
                      display: 'flex', alignItems: 'center', gap: 12, padding: '14px 16px',
                      cursor: 'pointer', background: aberto ? T.bg : 'transparent',
                      transition: 'background 0.15s',
                    }}
                  >
                    <div style={{
                      width: 44, height: 44, borderRadius: 13, flexShrink: 0,
                      background: isGasto ? T.redLight : T.greenLight,
                      display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20,
                    }}>{cat ? cat.emoji : '💚'}</div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 14, fontWeight: 600, color: T.text, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                        {t.descricao || (cat ? cat.label : 'Recebimento')}
                      </div>
                      <div style={{ fontSize: 12, color: T.textTer, marginTop: 2 }}>
                        {cat ? cat.label : 'Entrada'} · {fmtTime(t.data)}
                      </div>
                    </div>
                    <div style={{ textAlign: 'right' }}>
                      <div style={{ fontSize: 14, fontWeight: 700, color: isGasto ? T.red : T.green }}>
                        {isGasto ? '−' : '+'}{fmt(t.valor)}
                      </div>
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" style={{ marginTop: 4, transform: aberto ? 'rotate(90deg)' : 'none', transition: 'transform 0.2s ease' }}>
                        <path d="M9 6l6 6-6 6" stroke={aberto ? T.blue : T.textTer} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
                      </svg>
                    </div>
                  </div>
                  {aberto && (
                    <div className="fade-in" style={{ display: 'flex', gap: 8, padding: '0 16px 14px' }}>
                      {confirmandoId !== t.id ? (
                        <>
                          <button onClick={() => { haptic('light'); onEditar(t); }} style={{
                            flex: 1, height: 40, borderRadius: T.r12,
                            border: `1.5px solid rgba(47,111,237,0.2)`, background: T.blueLight, color: T.blue,
                            fontSize: 13, fontWeight: 700, fontFamily: T.font, cursor: 'pointer',
                            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 5,
                          }}>
                            <IcoEdit /> Editar
                          </button>
                          <button onClick={() => { haptic('light'); setConfirmandoId(t.id); }} style={{
                            flex: 1, height: 40, borderRadius: T.r12,
                            border: `1.5px solid rgba(216,36,50,0.2)`, background: T.redLight, color: T.red,
                            fontSize: 13, fontWeight: 700, fontFamily: T.font, cursor: 'pointer',
                            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 5,
                          }}>
                            <IcoTrash /> Excluir
                          </button>
                        </>
                      ) : (
                        <>
                          <button onClick={() => { haptic('light'); setConfirmandoId(null); }} style={{
                            flex: 1, height: 40, borderRadius: T.r12,
                            border: `1.5px solid rgba(15,23,42,0.08)`, background: T.bg, color: T.textSec,
                            fontSize: 13, fontWeight: 700, fontFamily: T.font, cursor: 'pointer',
                          }}>
                            Cancelar
                          </button>
                          <button onClick={() => { haptic('error'); onExcluir(t.id); setExpandido(null); setConfirmandoId(null); }} style={{
                            flex: 1, height: 40, borderRadius: T.r12,
                            border: 'none', background: T.red, color: '#fff',
                            fontSize: 13, fontWeight: 700, fontFamily: T.font, cursor: 'pointer',
                            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 5,
                            boxShadow: '0 4px 12px rgba(227,93,106,0.35)',
                          }}>
                            <IcoTrash c="#fff" /> Confirmar exclusão
                          </button>
                        </>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </Card>
        </div>
      ))}
      <div style={{ height: 28 }} />
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// TELA 6 — Análise (gráfico de evolução + calendário 7 dias)
// ═══════════════════════════════════════════════════════════════
function TelaAnalise({ state, onVoltar }) {
  const stats = calcStats(state);
  const hoje = new Date();
  const inicioDate = new Date(state.dataInicio);

  // ── Gráfico de evolução: saldo acumulado por dia (O(n) otimizado) ────────────
  const diasDecorridos = stats.diaAtual;
  const inicioMidnight = new Date(inicioDate);
  inicioMidnight.setHours(0, 0, 0, 0);
  const gastosPorDia = new Array(diasDecorridos).fill(0);
  const extrasPorDia = new Array(diasDecorridos).fill(0);
  state.transacoes.forEach(t => {
    const td = new Date(t.data);
    td.setHours(0, 0, 0, 0);
    const idx = Math.floor((td - inicioMidnight) / 86400000);
    if (idx >= 0 && idx < diasDecorridos) {
      if (t.tipo === 'gasto') gastosPorDia[idx] += t.valor;
      else extrasPorDia[idx] += t.valor;
    }
  });
  const maxGasto = Math.max(...gastosPorDia, stats.valorDiarioBase * 1.5, 1);
  const fmtY = v => v >= 1000 ? `${(v / 1000).toFixed(1).replace('.0', '')}k` : `${Math.round(v)}`;

  // ── Próximos 7 dias: projeção com ritmo real ──────────────────
  // delta diário = base − média gasta → reflete velocidade atual de consumo
  const saldoAtual = stats.disponivelHoje;
  const deltaLiquido = stats.valorDiarioBase - stats.mediaGastoPorDia;
  const proximos7 = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(hoje);
    d.setDate(hoje.getDate() + i + 1);
    const diaProj = i + 1;
    const projecao = saldoAtual + deltaLiquido * diaProj;
    const diaSemana = d.toLocaleDateString('pt-BR', { weekday: 'short' }).replace('.', '');
    const diaNum = d.getDate();
    return { diaNum, diaSemana, projecao };
  });

  const projecaoDiff = stats.projecaoDiff;
  const projecaoPos = projecaoDiff >= 0;
  const highlightColor = projecaoPos ? T.blue : T.red;

  return (
    <div style={{ background: T.bg, minHeight: '100%', paddingBottom: 28 }} className="screen-enter">
      <ScreenHeader title="Análise do mês" onBack={onVoltar} />

      {/* ── Projeção do mês — insight principal ──────────────── */}
      <div style={{ margin: '14px 16px 0' }}>
        <div style={{
          background: projecaoPos
            ? 'linear-gradient(135deg, #EAF7F0 0%, #FFFFFF 100%)'
            : 'linear-gradient(135deg, #FDECEF 0%, #FFFFFF 100%)',
          borderRadius: 22, padding: '18px 20px',
          border: `1px solid ${projecaoPos ? 'rgba(49,164,108,0.18)' : 'rgba(227,93,106,0.18)'}`,
          boxShadow: '0 8px 24px rgba(15,23,42,0.07)',
          display: 'flex', alignItems: 'center', gap: 16,
        }}>
          <div style={{
            width: 48, height: 48, borderRadius: 14, flexShrink: 0,
            background: projecaoPos ? T.greenLight : T.redLight,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            <IcoTrend c={highlightColor} up={projecaoPos} />
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: T.textSec, textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 4 }}>
              Como o mês deve terminar
            </div>
            <div style={{ fontSize: 22, fontWeight: 800, color: highlightColor, letterSpacing: -0.5, lineHeight: 1, marginBottom: 6 }}>
              {projecaoPos ? '+' : ''}{fmt(projecaoDiff)}
            </div>
            <div style={{ fontSize: 13, fontWeight: 500, color: T.textSec, lineHeight: 1.4 }}>
              {projecaoPos
                ? 'No ritmo atual, você deve terminar no positivo.'
                : 'No ritmo atual, você passa do orçamento. Ainda dá tempo de ajustar.'}
            </div>
            {stats.diaAtual < 5 && (
              <div style={{ fontSize: 11, color: T.textTer, marginTop: 5, fontStyle: 'italic' }}>
                * Projeção baseada em menos de 5 dias — pode variar.
              </div>
            )}
          </div>
        </div>
      </div>

      {/* ── Resumo rápido ─────────────────────────────────────── */}
      <div style={{ margin: '10px 16px 0', display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 8 }}>
        {[
          { label: 'Média/dia', value: fmt(stats.mediaGastoPorDia), color: T.red },
          { label: 'Meta/dia',  value: fmt(stats.valorDiarioBase),  color: T.blue },
          { label: 'Diferença', value: fmt(stats.valorDiarioBase - stats.mediaGastoPorDia), color: stats.mediaGastoPorDia <= stats.valorDiarioBase ? T.green : T.red },
        ].map(c => (
          <div key={c.label} style={{ background: T.card, borderRadius: T.r14, padding: '12px 12px', boxShadow: T.shadow, border: T.border }}>
            <div style={{ fontSize: 10, color: T.textSec, fontWeight: 600, marginBottom: 5, textTransform: 'uppercase', letterSpacing: 0.4 }}>{c.label}</div>
            <div style={{ fontSize: 14, fontWeight: 800, color: c.color }}>{c.value}</div>
          </div>
        ))}
      </div>

      {/* ── Gráfico: gasto por dia ────────────────────────────── */}
      <div style={{ margin: '12px 16px 0' }}>
        <Card>
          <div style={{ padding: '16px 16px 18px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 3 }}>
              <span style={{ fontSize: 15, fontWeight: 800, color: T.text }}>Gasto por dia</span>
              <span style={{ fontSize: 12, color: T.textTer, fontWeight: 600 }}>dias 1–{diasDecorridos}</span>
            </div>
            <div style={{ fontSize: 13, color: T.textSec, marginBottom: 14, fontWeight: 500 }}>
              Comparado à sua meta diária
            </div>

            {diasDecorridos === 0 ? (
              <div style={{ textAlign: 'center', padding: '24px 0', color: T.textTer, fontSize: 13 }}>
                Nenhum dado ainda. Registre gastos para ver a evolução.
              </div>
            ) : (() => {
              const CHART_H = 110;
              const metaPct = Math.min(stats.valorDiarioBase / maxGasto, 1);
              const avgPct  = stats.diaAtual > 0 ? Math.min(stats.mediaGastoPorDia / maxGasto, 1) : 0;
              const metaBottom = `${metaPct * 100}%`;
              const avgBottom  = `${avgPct  * 100}%`;
              function barCor(g) {
                if (g > stats.valorDiarioBase) return T.red;
                if (g > stats.valorDiarioBase * 0.75) return T.yellow;
                return T.green;
              }
              return (
                <div>
                  <div style={{ display: 'flex', gap: 0, alignItems: 'stretch' }}>
                    {/* Y-axis labels */}
                    <div style={{ width: 36, flexShrink: 0, height: CHART_H, position: 'relative' }}>
                      <span style={{ position: 'absolute', top: 0, right: 4, fontSize: 9, color: T.textTer, fontWeight: 600, lineHeight: 1 }}>
                        {fmtY(maxGasto)}
                      </span>
                      <span style={{ position: 'absolute', top: '50%', right: 4, fontSize: 9, color: T.textTer, fontWeight: 600, transform: 'translateY(-50%)', lineHeight: 1 }}>
                        {fmtY(maxGasto / 2)}
                      </span>
                      <span style={{ position: 'absolute', bottom: 0, right: 4, fontSize: 9, color: T.textTer, fontWeight: 600, lineHeight: 1 }}>
                        0
                      </span>
                    </div>
                    {/* Chart area */}
                    <div style={{ flex: 1, height: CHART_H, position: 'relative' }}>
                      {/* Grid lines */}
                      {[0, 50, 100].map(p => (
                        <div key={p} style={{ position: 'absolute', left: 0, right: 0, bottom: `${p}%`, height: 1, background: 'rgba(15,23,42,0.05)' }} />
                      ))}
                      {/* Meta line (solid, blue) */}
                      <div style={{ position: 'absolute', left: 0, right: 0, bottom: metaBottom, height: 1.5, background: T.blue, opacity: 0.55, zIndex: 2 }} />
                      <span style={{
                        position: 'absolute', left: 2, bottom: metaBottom,
                        fontSize: 8, fontWeight: 700, color: T.blue, lineHeight: 1,
                        transform: 'translateY(-2px)', zIndex: 3,
                      }}>Meta</span>
                      {/* Média line (dashed) */}
                      {stats.diaAtual > 0 && (
                        <>
                          <div style={{ position: 'absolute', left: 0, right: 30, bottom: avgBottom, height: 0, borderTop: '1.5px dashed rgba(100,116,139,0.55)', zIndex: 2 }} />
                          <span style={{
                            position: 'absolute', right: 0, bottom: avgBottom,
                            background: '#334155', color: '#fff', fontSize: 8, fontWeight: 700,
                            borderRadius: 4, padding: '2px 4px', transform: 'translateY(50%)', zIndex: 3, whiteSpace: 'nowrap',
                          }}>~{fmtY(stats.mediaGastoPorDia)}</span>
                        </>
                      )}
                      {/* Bars */}
                      <div style={{ display: 'flex', alignItems: 'flex-end', gap: 2, height: '100%', paddingBottom: 1 }}>
                        {gastosPorDia.map((g, i) => {
                          const barH = Math.max((g / maxGasto) * (CHART_H - 2), g > 0 ? 5 : 2);
                          const isHoje = i === diasDecorridos - 1;
                          const cor = barCor(g);
                          return (
                            <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'flex-end', height: '100%' }}>
                              <div style={{
                                borderRadius: '3px 3px 0 0', height: barH,
                                background: g === 0 ? 'rgba(15,23,42,0.08)' : cor,
                                opacity: isHoje ? 1 : 0.65,
                                boxShadow: isHoje && g > 0 ? `0 2px 8px ${cor}55` : 'none',
                              }} />
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                  {/* X-axis */}
                  <div style={{ display: 'flex', marginLeft: 36, gap: 2, marginTop: 5 }}>
                    {gastosPorDia.map((_, i) => (
                      <div key={i} style={{ flex: 1, textAlign: 'center' }}>
                        <span style={{ fontSize: 8, color: i === diasDecorridos - 1 ? T.blue : T.textTer, fontWeight: i === diasDecorridos - 1 ? 700 : 400 }}>
                          {i + 1}
                        </span>
                      </div>
                    ))}
                  </div>
                  {/* Legend */}
                  <div style={{ display: 'flex', gap: 10, marginTop: 10, flexWrap: 'wrap' }}>
                    {[
                      { bg: T.green, label: 'Abaixo da meta' },
                      { bg: T.yellow, label: 'Próximo da meta' },
                      { bg: T.red,   label: 'Acima da meta'  },
                    ].map(x => (
                      <div key={x.label} style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                        <div style={{ width: 8, height: 8, borderRadius: 2, background: x.bg }} />
                        <span style={{ fontSize: 9, color: T.textSec }}>{x.label}</span>
                      </div>
                    ))}
                    <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                      <div style={{ width: 14, height: 0, borderTop: '1.5px dashed rgba(100,116,139,0.6)' }} />
                      <span style={{ fontSize: 9, color: T.textSec }}>Média atual</span>
                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                      <div style={{ width: 14, height: 1.5, background: T.blue, opacity: 0.55 }} />
                      <span style={{ fontSize: 9, color: T.textSec }}>Meta/dia</span>
                    </div>
                  </div>
                </div>
              );
            })()}
          </div>
        </Card>
      </div>

      {/* ── Gastos por categoria ─────────────────────────────── */}
      {(() => {
        const gastosPorCat = {};
        state.transacoes.filter(t => t.tipo === 'gasto').forEach(t => {
          gastosPorCat[t.categoria] = (gastosPorCat[t.categoria] || 0) + t.valor;
        });
        const catItems = CATS.map(c => ({ ...c, total: gastosPorCat[c.id] || 0 })).filter(c => c.total > 0).sort((a, b) => b.total - a.total);
        if (catItems.length === 0) return null;
        const maxCat = catItems[0].total;
        const totalCat = catItems.reduce((s, c) => s + c.total, 0);
        return (
          <div style={{ margin: '12px 16px 0' }}>
            <Card>
              <div style={{ padding: '16px 16px 12px' }}>
                <div style={{ fontSize: 15, fontWeight: 800, color: T.text, marginBottom: 3 }}>Gastos por categoria</div>
                <div style={{ fontSize: 13, color: T.textSec, marginBottom: 14, fontWeight: 500 }}>Distribuição dos seus gastos no ciclo</div>
                {catItems.map((c, i) => {
                  const pct = totalCat > 0 ? Math.round((c.total / totalCat) * 100) : 0;
                  const barPct = maxCat > 0 ? (c.total / maxCat) * 100 : 0;
                  return (
                    <div key={c.id}>
                      {i > 0 && <Divider left={0} />}
                      <div style={{ padding: '10px 0', display: 'flex', alignItems: 'center', gap: 12 }}>
                        <div style={{ width: 36, height: 36, borderRadius: 10, flexShrink: 0, background: `${c.cor}20`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18 }}>{c.emoji}</div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                            <span style={{ fontSize: 13, fontWeight: 600, color: T.text }}>{c.label}</span>
                            <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                              <span style={{ fontSize: 10, fontWeight: 600, color: T.textTer }}>{pct}%</span>
                              <span style={{ fontSize: 13, fontWeight: 800, color: T.text }}>{fmt(c.total)}</span>
                            </div>
                          </div>
                          <div style={{ height: 5, background: T.bg, borderRadius: 100, overflow: 'hidden' }}>
                            <div style={{ height: '100%', borderRadius: 100, background: c.cor, width: `${barPct}%`, transition: 'width 0.5s ease' }} />
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </Card>
          </div>
        );
      })()}

      {/* ── Calendário próximos 7 dias ────────────────────────── */}
      <div style={{ margin: '12px 16px 0' }}>
        <Card>
          <div style={{ padding: '16px 16px 8px' }}>
            <div style={{ fontSize: 15, fontWeight: 800, color: T.text, marginBottom: 3 }}>Próximos 7 dias</div>
